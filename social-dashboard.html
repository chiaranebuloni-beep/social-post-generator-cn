// ─── Calendar Widget Component ─────────────────────────────────
function CalendarWidget({posts=[]}){
  const[month,setMonth]=useState(new Date().getMonth());
  const[year,setYear]=useState(new Date().getFullYear());
  const today=new Date();
  const currentMonth=today.getMonth();
  const currentYear=today.getFullYear();
  const isCurrentMonth=month===currentMonth&&year===currentYear;
  const daysInMonth=(m,y)=>new Date(y,m+1,0).getDate();
  const firstDay=(m,y)=>new Date(y,m,1).getDay();
  const days=daysInMonth(month,year);
  const first=firstDay(month,year);
  const dayStart=first===0?6:first-1;
  const postDates=new Set(posts.map(p=>new Date(p.date).toDateString()));
  const cells=[];
  for(let i=0;i<dayStart;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  const handlePrev=()=>{if(month===0){setMonth(11);setYear(year-1);}else setMonth(month-1);};
  const handleNext=()=>{if(month===11){setMonth(0);setYear(year+1);}else setMonth(month+1);};
  return(
    <div style={{background:"#fff",borderRadius:16,padding:20,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>{MONTHS_IT[month]} {year}</h3>
        <div style={{display:"flex",gap:6}}>
          <button onClick={handlePrev} style={{width:28,height:28,borderRadius:6,border:"none",background:"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Icons.ChevLeft size={16} color="#64748b"/>
          </button>
          <button onClick={handleNext} style={{width:28,height:28,borderRadius:6,border:"none",background:"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Icons.ChevRight size={16} color="#64748b"/>
          </button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:16}}>
        {DAYS_IT.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#94a3b8",padding:6}}>{d}</div>)}
        {cells.map((d,i)=>{
          const isToday=isCurrentMonth&&d===today.getDate();
          const hasPost=d&&postDates.has(new Date(year,month,d).toDateString());
          return(
            <div key={i} style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",borderRadius:6,background:isToday?"#6366f1":"transparent",color:isToday?"#fff":"#64748b",fontSize:13,fontWeight:500}}>
              {d?<>{d}{hasPost&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:"50%",background:isToday?"#fff":"#6366f1"}}/>}</>:null}
            </div>
          );
        })}
      </div>
      <div style={{borderTop:"1px solid #e2e8f0",paddingTop:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>Oggi: <strong style={{color:"#1e293b"}}>{today.toLocaleDateString("it-IT",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</strong></div>
      </div>
    </div>
  );
}

function loadData(key,fallback){try{const d=localStorage.getItem(STORAGE_KEY+key);return d?JSON.parse(d):fallback;}catch(e){return fallback;}}

function generatePost(client,date,postIndex,customTheme,graphicStyle,templatePrompt){
  const tone=client.tone||"Professionale";
  const tpl=COPY_TEMPLATES[tone]||COPY_TEMPLATES["Professionale"];
  const sector=client.sector||"Consulenza";
  const htags=HASHTAG_SETS[sector]||HASHTAG_SETS["Altro"];
  const type=POST_TYPES[Math.floor(Math.random()*POST_TYPES.length)];
  const imgStyle=IMAGE_STYLES[Math.floor(Math.random()*IMAGE_STYLES.length)];

  let idea;
  if(customTheme){
    // Tema personalizzato dal cliente
    idea={theme:customTheme,body:customTheme};
  } else {
    // Pick a UNIQUE content idea for this post
    const ideas=CONTENT_IDEAS[sector]||CONTENT_IDEAS["Altro"];
    if(!usedIdeasMap[client.id])usedIdeasMap[client.id]=[];
    let availableIdeas=ideas.filter((_,i)=>!usedIdeasMap[client.id].includes(i));
    if(availableIdeas.length===0){usedIdeasMap[client.id]=[];availableIdeas=ideas;}
    const ideaIdx=Math.floor(Math.random()*availableIdeas.length);
    idea=availableIdeas[ideaIdx];
    const realIdx=ideas.indexOf(idea);
    usedIdeasMap[client.id].push(realIdx);
  }

  const opening=tpl.openings[Math.floor(Math.random()*tpl.openings.length)];
  const cta=tpl.ctas[Math.floor(Math.random()*tpl.ctas.length)];
  const selHash=[...htags].sort(()=>0.5-Math.random()).slice(0,5+Math.floor(Math.random()*4));
  const brandTag="#"+client.name.replace(/\s+/g,"").toLowerCase();

  // Build unique body using the idea
  const body=`${opening}\n\n${idea.body}\n\n${cta}\n\n${[brandTag,...selHash].join(" ")}`;

  const fontInfo=client.fontHeading?` Font titoli: ${client.fontHeading}.${client.fontBody?" Font corpo: "+client.fontBody+".":""}`:""

  // If canvaStyle exists, adapt CTA and body to match the reference style
  let finalBody=body;
  let finalCta=cta;
  if(client.canvaStyle){
    const styleNote=client.canvaStyle.toLowerCase();
    if(styleNote.includes("dialett")||styleNote.includes("napoletan")){
      finalCta=["Prenota il tuo tavolo!","Ti aspettiamo!","Vieni a trovarci!","Non perderti questa!","Chiama ora e prenota!"][Math.floor(Math.random()*5)];
    }
  }

  // Build image prompt — schema gerarchico (titolo, sottotitolo, logo, sfondo, stile)
  let imagePrompt, imageSuggestion;

  const paletteColors=client.palette?.colors||["#212529","#495057","#ADB5BD","#F8F9FA"];
  const bgColor=paletteColors[0]||"#212529";
  const textColor=paletteColors[1]||paletteColors[3]||"#F8F9FA";
  const accentColor=paletteColors[2]||"#ADB5BD";
  const fontName=client.fontHeading||"Montserrat";
  const fontBodyName=client.fontBody||"Open Sans";
  const logoInstruction=client.logo?"Include the client logo in the top-right corner, proportional to the layout.":"";
  const driveNote=client.driveFolder?" Reference photos may be available in the client's Drive folder.":"";
  const toneDesc=tone.toLowerCase();

  const hasStylePhoto=graphicStyle&&(graphicStyle.toLowerCase().includes("foto")||graphicStyle.toLowerCase().includes("photo")||graphicStyle.toLowerCase().includes("immagine"));

  const aspectRatio=type==="Carosello"?"4:5 portrait (1080x1350px)":"1:1 square (1080x1080px)";

  imagePrompt=`You are an elite graphic designer creating a BACKGROUND-ONLY graphic for a social media post. The text will be added separately with real fonts — DO NOT include ANY text, letters, words, numbers, or typography in the image.

CANVAS: ${aspectRatio}. Fill the ENTIRE canvas edge-to-edge.

BRAND CONTEXT: "${client.name}" — ${sector}. Tone: ${toneDesc}.

⚠️ CRITICAL: Generate ONLY the visual background/artwork. DO NOT render any text, titles, subtitles, brand names, or lettering of any kind. The image must be a pure visual design — text will be overlaid programmatically with real fonts afterward.

DESIGN REQUIREMENTS:
- Visual depth: use layering, shadows, overlays, gradients, or transparency effects. NO flat amateur designs.
- Color harmony: palette ${paletteColors.join(", ")} — use these as inspiration, create gradients, overlays, and tints from them.
- Composition: follow the rule of thirds. Leave visual space for text overlay (roughly center area for headline, lower area for subtitle).
- Decorative elements: geometric shapes, lines, dots, abstract patterns, bokeh effects, organic textures, gradient meshes — make it visually rich.
- The design should feel like a premium Canva Pro or Adobe Express template background.

${templatePrompt?`LAYOUT DIRECTION (background only, no text):\n${templatePrompt.replace(/title|headline|subtitle|tagline|brand name|text/gi,"visual element")}`:""}
${graphicStyle?`CREATIVE DIRECTION FROM USER: "${graphicStyle}"\nThis is the #1 priority — adapt the background to this style. Still NO TEXT.`:`${!templatePrompt?`STYLE:\n- Create a visually rich, multi-layered background composition using the brand colors\n- Add subtle texture, gradient mesh, or abstract geometric decoration\n- Think premium social media template background — NOT a plain colored rectangle`:""}`}
${hasStylePhoto?`
PHOTO INTEGRATION (CRITICAL): The attached photo MUST fill the ENTIRE canvas as the background — edge-to-edge, no borders, no margins. Apply a cinematic color grade + semi-transparent gradient overlay (darker at bottom for future text readability). DO NOT add any text on the photo.`:""}
${client.canvaStyle&&!graphicStyle&&!templatePrompt?"BRAND STYLE REFERENCE: "+client.canvaStyle:""}

FINAL REMINDER: This image must contain ZERO text, ZERO letters, ZERO typography. Only visual design elements, colors, shapes, photos, textures, and patterns. Text will be added programmatically.`;

  imageSuggestion=`Grafica ${toneDesc} per ${client.name} (${sector}). Titolo: "${idea.theme}". Sottotitolo: "${finalCta}". Sfondo: ${bgColor}, testo: ${textColor}. Font: ${fontName}/${fontBodyName}. Palette: ${client.palette?.name||"Custom"}.${client.canvaStyle?" Stile: "+client.canvaStyle:""}${client.logo?" Con logo.":""}`;

  return{id:genId(),clientId:client.id,date,type,body:finalBody,imageStyle:imgStyle,theme:idea.theme,
    imageSuggestion,imagePrompt,graphicStyle:graphicStyle||"",
    hashtags:[brandTag,...selHash],cta:finalCta,status:"bozza",fontHeading:client.fontHeading,fontBody:client.fontBody,generatedImage:null};
}

// ─── Helper: fetch image URL → base64 (for Gemini multimodal) ──
async function imageUrlToBase64(url) {
  try {
    // For data: URLs (already base64), extract directly
    if (url.startsWith("data:")) {
      const parts = url.split(",");
      const mimeMatch = url.match(/data:([^;]+);/);
      if (parts[1] && mimeMatch) return { base64: parts[1], mimeType: mimeMatch[1] };
      return null;
    }

    // Try fetching with multiple approaches
    const attempts = [
      () => fetch(url, { signal: AbortSignal.timeout(8000) }),
      () => fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) }),
      () => fetch("https://corsproxy.io/?" + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) })
    ];

    for (const tryFetch of attempts) {
      try {
        const res = await tryFetch();
        if (!res.ok) continue;
        const blob = await res.blob();
        if (!blob.type.startsWith("image/") && blob.size < 1000) continue;
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const dataUrl = reader.result;
            const base64 = dataUrl.split(",")[1];
            const mimeType = blob.type || "image/jpeg";
            resolve({ base64, mimeType });
          };
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(blob);
        });
      } catch(e) { continue; }
    }
    return null;
  } catch(e) {
    console.warn("imageUrlToBase64 failed:", e.message);
    return null;
  }
}

// ─── Gemini API (multimodal: testo + immagini di riferimento) ───
async function generateImageWithGemini(apiKey, prompt, referenceImages) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-pro-image-preview:generateContent?key=${apiKey}`;

  // Build parts: text prompt + optional reference images
  const parts = [{ text: prompt }];

  if (referenceImages && referenceImages.length > 0) {
    // Add up to 5 reference images for richer context
    for (const refImg of referenceImages.slice(0, 5)) {
      if (refImg.base64 && refImg.mimeType) {
        parts.push({ inlineData: { mimeType: refImg.mimeType, data: refImg.base64 } });
      }
    }
    // Add instruction to use reference images creatively
    if (parts.length > 1) {
      parts[0].text += "\n\nPHOTO INTEGRATION RULES: The attached photos are real brand photos. Use them AS-IS (do not redraw or recreate). Integrate them into the graphic design:\n- As full-bleed background with text overlay and cinematic color grading\n- As a prominent focal element with designed frame, border, or mask shape\n- With professional color correction to match the brand palette\nThe final result must look like a professionally designed social media post where the photo and graphic elements work together seamlessly — like a Canva Pro template.";
    }
  }

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { responseModalities: ["IMAGE","TEXT"] }
    })
  });
  if (!res.ok) { const err = await res.text(); throw new Error(`Gemini API error: ${err}`); }
  const data = await res.json();
  const resParts = data?.candidates?.[0]?.content?.parts || [];
  const imgPart = resParts.find(p => p.inlineData);
  if (imgPart) return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
  throw new Error("Nessuna immagine generata. Riprova.");
}

// ─── Google Fonts dynamic loader ────────────────────────────
const __loadedFonts = new Set();
async function loadGoogleFont(fontName) {
  if (!fontName || __loadedFonts.has(fontName)) return;
  try {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(fontName) + ":wght@300;400;500;600;700;800;900&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
    await document.fonts.load('900 48px "' + fontName + '"');
    __loadedFonts.add(fontName);
    console.log("[SocialDash] Font loaded:", fontName);
  } catch(e) { console.warn("Font load failed:", fontName, e); }
}

// ─── Canvas compositing: Gemini BG + real font text overlay ──
async function compositeGraphic(bgDataUrl, textConfig, width, height) {
  const { headline, tagline, brand, fontHeading, fontBody, colors, template } = textConfig;

  // Load fonts
  await Promise.all([loadGoogleFont(fontHeading), loadGoogleFont(fontBody)]);

  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");

  // Draw Gemini background, stretched to exact dimensions
  const bgImg = new Image();
  bgImg.src = bgDataUrl;
  await new Promise((resolve, reject) => { bgImg.onload = resolve; bgImg.onerror = reject; });
  ctx.drawImage(bgImg, 0, 0, width, height);

  // Detect if background is dark or light (sample center pixels)
  const sampleData = ctx.getImageData(Math.floor(width/4), Math.floor(height/2), Math.floor(width/2), 10).data;
  let totalBrightness = 0;
  for (let i = 0; i < sampleData.length; i += 4) {
    totalBrightness += (sampleData[i] * 0.299 + sampleData[i+1] * 0.587 + sampleData[i+2] * 0.114);
  }
  const avgBrightness = totalBrightness / (sampleData.length / 4);
  const isDark = avgBrightness < 128;
  const textColor = isDark ? "#FFFFFF" : "#1a1a2e";
  const shadowColor = isDark ? "rgba(0,0,0,0.7)" : "rgba(255,255,255,0.7)";
  const accentColor = colors?.[2] || (isDark ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.3)");

  // Text sizing based on canvas dimensions
  const headlineSize = Math.round(width * 0.085);
  const taglineSize = Math.round(width * 0.038);
  const brandSize = Math.round(width * 0.03);
  const pad = Math.round(width * 0.08);

  // Helper: draw text with shadow/outline for readability
  const drawText = (text, x, y, font, size, color, align, maxW, weight) => {
    ctx.save();
    ctx.font = (weight || "700") + " " + size + "px '" + font + "', sans-serif";
    ctx.textAlign = align || "center";
    ctx.textBaseline = "middle";
    // Multi-layer shadow for readability
    ctx.shadowColor = shadowColor;
    ctx.shadowBlur = Math.round(size * 0.25);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = Math.round(size * 0.05);
    ctx.fillStyle = color;
    // Word wrap
    const words = text.split(" ");
    const lines = [];
    let currentLine = "";
    const mw = maxW || (width - pad * 2);
    for (const word of words) {
      const test = currentLine ? currentLine + " " + word : word;
      if (ctx.measureText(test).width > mw && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else { currentLine = test; }
    }
    if (currentLine) lines.push(currentLine);
    const lineHeight = size * 1.15;
    const totalH = lines.length * lineHeight;
    const startY = y - totalH / 2 + lineHeight / 2;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], x, startY + i * lineHeight);
    }
    ctx.restore();
    return { startY, totalH, lineHeight, lines };
  };

  // ── Layout logic based on template ──
  const tpl = template || "bold-center";
  const cx = width / 2;

  if (tpl === "split-layout") {
    // Text on the right side
    const rx = width * 0.72;
    const mw = width * 0.4;
    // Semi-transparent panel on right
    ctx.fillStyle = isDark ? "rgba(0,0,0,0.4)" : "rgba(255,255,255,0.5)";
    ctx.fillRect(width * 0.5, 0, width * 0.5, height);
    drawText(headline, rx, height * 0.35, fontHeading, headlineSize * 0.85, textColor, "center", mw, "800");
    drawText(tagline, rx, height * 0.55, fontBody, taglineSize, textColor, "center", mw, "400");
    drawText(brand, rx, height * 0.78, fontBody, brandSize, accentColor, "center", mw, "600");
  } else if (tpl === "magazine") {
    // Editorial: title top, line, subtitle below
    drawText(headline, cx, height * 0.28, fontHeading, headlineSize * 1.1, textColor, "center", width - pad * 2, "800");
    // Decorative line
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(width * 0.25, height * 0.46);
    ctx.lineTo(width * 0.75, height * 0.46);
    ctx.stroke();
    drawText(tagline, cx, height * 0.58, fontBody, taglineSize * 1.1, textColor, "center", width - pad * 2, "300");
    drawText("— " + brand + " —", cx, height * 0.82, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else if (tpl === "card-style") {
    // Floating card effect
    const cardPad = width * 0.1;
    const cardX = cardPad;
    const cardY = height * 0.15;
    const cardW = width - cardPad * 2;
    const cardH = height * 0.7;
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.25)";
    ctx.shadowBlur = 30;
    ctx.fillStyle = isDark ? "rgba(30,30,50,0.85)" : "rgba(255,255,255,0.88)";
    ctx.beginPath();
    ctx.roundRect(cardX, cardY, cardW, cardH, 20);
    ctx.fill();
    ctx.restore();
    drawText(headline, cx, cardY + cardH * 0.35, fontHeading, headlineSize * 0.9, textColor, "center", cardW - 40, "800");
    drawText(tagline, cx, cardY + cardH * 0.58, fontBody, taglineSize, textColor, "center", cardW - 40, "400");
    drawText(brand, cx, cardY + cardH * 0.8, fontBody, brandSize, accentColor, "center", cardW - 40, "600");
  } else if (tpl === "gradient-big") {
    // Huge title centered
    drawText(headline, cx, height * 0.38, fontHeading, headlineSize * 1.4, textColor, "center", width - pad, "900");
    drawText(tagline, cx, height * 0.6, fontBody, taglineSize * 1.1, textColor, "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.84, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else if (tpl === "duotone") {
    // Title top, subtitle bottom section
    drawText(headline, cx, height * 0.32, fontHeading, headlineSize, textColor, "center", width - pad * 2, "800");
    drawText(tagline, cx, height * 0.72, fontBody, taglineSize * 1.1, textColor, "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.92, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else if (tpl === "photo-overlay") {
    // Cinematic: gradient overlay at bottom, text in lower third
    const grad = ctx.createLinearGradient(0, height * 0.4, 0, height);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(0.5, "rgba(0,0,0,0.4)");
    grad.addColorStop(1, "rgba(0,0,0,0.85)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, height * 0.4, width, height * 0.6);
    drawText(headline, cx, height * 0.68, fontHeading, headlineSize, "#FFFFFF", "center", width - pad * 2, "800");
    drawText(tagline, cx, height * 0.82, fontBody, taglineSize, "rgba(255,255,255,0.85)", "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.94, fontBody, brandSize, "rgba(255,255,255,0.5)", "center", width - pad * 2, "500");
  } else if (tpl === "minimal-line") {
    // Clean minimal with accent line
    drawText(headline, cx, height * 0.35, fontHeading, headlineSize * 0.85, textColor, "center", width - pad * 2, "700");
    // Accent line
    ctx.strokeStyle = colors?.[2] || colors?.[0] || "#6366f1";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(width * 0.35, height * 0.48);
    ctx.lineTo(width * 0.65, height * 0.48);
    ctx.stroke();
    drawText(tagline, cx, height * 0.58, fontBody, taglineSize, textColor, "center", width - pad * 2, "300");
    drawText(brand, cx, height * 0.82, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else {
    // Default: bold-center
    drawText(headline, cx, height * 0.38, fontHeading, headlineSize, textColor, "center", width - pad * 2, "800");
    drawText(tagline, cx, height * 0.58, fontBody, taglineSize, textColor, "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.82, fontBody, brandSize, accentColor, "center", width - pad * 2, "600");
  }

  return canvas.toDataURL("image/png");
}

// ─── Canvas compositing with custom positions (word-wrap enabled) ──
async function compositeGraphicCustom(bgDataUrl, layersArr, width, height) {
  // layersArr = [{text, font, size, weight, color, x, y, align}]
  const fonts = [...new Set(layersArr.map(l=>l.font).filter(Boolean))];
  await Promise.all(fonts.map(f=>loadGoogleFont(f)));

  const canvas = document.createElement("canvas");
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext("2d");

  const bgImg = new Image(); bgImg.src = bgDataUrl;
  await new Promise((res,rej)=>{bgImg.onload=res;bgImg.onerror=rej;});
  ctx.drawImage(bgImg,0,0,width,height);

  const sampleData = ctx.getImageData(Math.floor(width/4),Math.floor(height/2),Math.floor(width/2),10).data;
  let totalB=0;
  for(let i=0;i<sampleData.length;i+=4) totalB+=(sampleData[i]*0.299+sampleData[i+1]*0.587+sampleData[i+2]*0.114);
  const isDark = totalB/(sampleData.length/4)<128;
  const shadowColor = isDark?"rgba(0,0,0,0.7)":"rgba(255,255,255,0.7)";

  for(const layer of layersArr){
    if(!layer.text) continue;
    const {text, font, size, weight, color, x, y, align} = layer;
    ctx.save();
    ctx.font = (weight||"700")+" "+size+"px '"+font+"', sans-serif";
    ctx.textAlign = align||"center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = shadowColor;
    ctx.shadowBlur = Math.round(size*0.25);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = Math.round(size*0.05);
    ctx.fillStyle = color;
    // Word wrap
    const maxW = width*0.85;
    const words = text.split(" ");
    const lines = []; let cur = "";
    for(const w of words){
      const test = cur?cur+" "+w:w;
      if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else{cur=test;}
    }
    if(cur)lines.push(cur);
    const lh = size*1.15;
    const startY = y - (lines.length*lh)/2 + lh/2;
    for(let i=0;i<lines.length;i++) ctx.fillText(lines[i], x, startY+i*lh);
    ctx.restore();
  }
  return canvas.toDataURL("image/png");
}

// ─── Fetch tramite proxy CORS (con fallback multipli) ─────────
async function fetchViaProxy(targetUrl) {
  const proxies = [
    (u) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
    (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
    (u) => "https://corsproxy.io/?" + encodeURIComponent(u)
  ];
  for (const makeUrl of proxies) {
    try {
      const res = await fetch(makeUrl(targetUrl), { signal: AbortSignal.timeout(12000) });
      if (res.ok) return await res.text();
    } catch(e) { console.warn("Proxy failed, trying next..."); }
  }
  throw new Error("All proxies failed for " + targetUrl);
}

// ─── Scraping immagini dal sito web ────────────────────────────
async function scrapeWebsiteImages(url) {
  if (!url) return [];
  try {
    const fullUrl = url.startsWith("http") ? url : "https://" + url;
    const html = await fetchViaProxy(fullUrl);

    const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
    const bgRegex = /background(?:-image)?:\s*url\(["']?([^"')]+)["']?\)/gi;
    const ogRegex = /<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/gi;
    const srcsetRegex = /srcset=["']([^"']+)["']/gi;

    const images = new Set();
    let match;

    while ((match = ogRegex.exec(html)) !== null) images.add(match[1]);
    while ((match = imgRegex.exec(html)) !== null) {
      const src = match[1];
      if (src && !src.includes("data:") && !src.endsWith(".svg") && !src.includes("favicon") && !src.includes("icon") && !src.includes("pixel") && !src.includes("1x1") && !src.includes("tracking")) images.add(src);
    }
    while ((match = srcsetRegex.exec(html)) !== null) {
      const firstSrc = match[1].split(",")[0].trim().split(" ")[0];
      if (firstSrc && firstSrc.startsWith("http")) images.add(firstSrc);
    }
    while ((match = bgRegex.exec(html)) !== null) {
      const src = match[1];
      if (src && !src.includes("data:") && !src.endsWith(".svg")) images.add(src);
    }

    const baseUrl = new URL(fullUrl);
    const resolved = [...images].map(img => {
      try {
        if (img.startsWith("//")) return "https:" + img;
        if (img.startsWith("/")) return baseUrl.origin + img;
        if (!img.startsWith("http")) return baseUrl.origin + "/" + img;
        // Force HTTPS to avoid mixed content blocking
        return img.replace(/^http:\/\//i, "https://");
      } catch(e) { return img; }
    }).filter(img => img.startsWith("https://"));

    console.log("[SocialDash] Scraped", resolved.length, "images from", fullUrl);
    return resolved.slice(0, 20);
  } catch (e) {
    console.warn("Website scraping failed:", e.message);
    return [];
  }
}

// ─── Scraping immagini da Google Drive (cartelle pubbliche) ────
async function scrapeDriveImages(driveUrl) {
  if (!driveUrl) return [];
  try {
    const folderMatch = driveUrl.match(/folders\/([a-zA-Z0-9_-]+)/);
    if (!folderMatch) { console.warn("Not a Drive folder URL"); return []; }
    const folderId = folderMatch[1];

    // Use embeddedfolderview — renders file IDs in HTML (works for public folders)
    const embedUrl = "https://drive.google.com/embeddedfolderview?id=" + folderId;
    const html = await fetchViaProxy(embedUrl);

    // Extract all file IDs (25+ char alphanumeric strings unique to Drive)
    const idRegex = /[a-zA-Z0-9_-]{25,}/g;
    const allIds = new Set();
    let match;
    while ((match = idRegex.exec(html)) !== null) {
      const id = match[0];
      if (id !== folderId && !id.includes("____") && id.length < 50) allIds.add(id);
    }

    // Use thumbnail URLs (work without auth for public files, good quality)
    const imageUrls = [...allIds].map(id => "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000");
    console.log("[SocialDash] Found", imageUrls.length, "files in Drive folder");
    return imageUrls.slice(0, 30);
  } catch (e) {
    console.warn("Drive scraping failed:", e.message);
    return [];
  }
}

// ─── File Upload Component ─────────────────────────────────────
function FileUploader({files=[],onChange,labelStyle}){
  const inputRef=useRef(null);
  const handleFiles=(e)=>{
    const newFiles=[...e.target.files].map(f=>({
      id:genId(), name:f.name, type:f.type, size:f.size,
      dataUrl: null, file: f
    }));
    // read each file
    newFiles.forEach((nf,i)=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        nf.dataUrl=ev.target.result;
        if(i===newFiles.length-1) onChange([...files,...newFiles]);
      };
      reader.readAsDataURL(nf.file);
    });
    if(newFiles.length===0) return;
    // if single file, still trigger
    if(newFiles.length===1){
      const reader=new FileReader();
      reader.onload=(ev)=>{newFiles[0].dataUrl=ev.target.result;onChange([...files,...newFiles]);};
      reader.readAsDataURL(newFiles[0].file);
    }
    e.target.value="";
  };
  const removeFile=(id)=>onChange(files.filter(f=>f.id!==id));
  const isImage=(f)=>f.type?.startsWith("image/");
  const isPdf=(f)=>f.type==="application/pdf";
  const formatSize=(bytes)=>{if(bytes<1024)return bytes+"B";if(bytes<1048576)return(bytes/1024).toFixed(1)+"KB";return(bytes/1048576).toFixed(1)+"MB";};

  return(
    <div>
      <label style={labelStyle}>Materiali (foto, menu, PDF)</label>
      <div onClick={()=>inputRef.current?.click()} style={{border:"2px dashed #e2e8f0",borderRadius:12,padding:20,textAlign:"center",cursor:"pointer",background:"#fafbfc",marginBottom:files.length>0?12:16,transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"} onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}>
        <Icons.Upload size={24} color="#94a3b8"/>
        <p style={{fontSize:13,color:"#94a3b8",marginTop:6}}>Clicca o trascina per caricare foto, menu o PDF</p>
        <p style={{fontSize:11,color:"#cbd5e1"}}>JPG, PNG, PDF — max 10MB per file</p>
        <input ref={inputRef} type="file" multiple accept="image/*,.pdf" onChange={handleFiles}/>
      </div>
      {files.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8,marginBottom:16}}>
        {files.map(f=><div key={f.id} style={{position:"relative",borderRadius:10,border:"1px solid #e2e8f0",overflow:"hidden",background:"#f8fafc"}}>
          {isImage(f)&&f.dataUrl?<img src={f.dataUrl} style={{width:"100%",height:100,objectFit:"cover"}}/>
          :isPdf(f)?<div style={{height:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}><Icons.File size={28} color="#ef4444"/><span style={{fontSize:10,color:"#ef4444",fontWeight:600}}>PDF</span></div>
          :<div style={{height:100,display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.File size={28} color="#94a3b8"/></div>}
          <div style={{padding:"6px 8px"}}>
            <div style={{fontSize:10,fontWeight:600,color:"#334155",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.name}</div>
            <div style={{fontSize:9,color:"#94a3b8"}}>{formatSize(f.size)}</div>
          </div>
          <button onClick={(e)=>{e.stopPropagation();removeFile(f.id);}} style={{position:"absolute",top:4,right:4,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,.5)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>)}
      </div>}
    </div>
  );
}

  const colors=["#6366f1","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316"];

          {activeClient.tone&&<span style={{display:"inline-block",padding:"3px 10px",background:"#f0fdf4",color:"#166534",borderRadius:12,fontSize:11,fontWeight:600}}>{activeClient.tone}</span>}

      {/* Stats */}
      <div style={{background:"#f8fafc",borderRadius:12,padding:12,marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}}>

            <div style={{fontSize:10,color:"#64748b",fontWeight:500}}>Generati</div>

          <div>
            <div style={{fontSize:18,fontWeight:800,color:"#10b981"}}>{stats.approvati}</div>
            <div style={{fontSize:10,color:"#64748b",fontWeight:500}}>Approvati</div>
          </div>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:"#8b5cf6"}}>{stats.pubblicati}</div>
            <div style={{fontSize:10,color:"#64748b",fontWeight:500}}>Pubblicati</div>
          </div>
        </div>
      </div>
      {/* Recent Posts */}
      {recentPosts.length>0&&<div style={{marginBottom:16}}>
        <h4 style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#64748b"}}>Ultimi post</h4>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {recentPosts.map(post=>(
            <div key={post.id} style={{padding:8,background:"#f8fafc",borderRadius:8,fontSize:11,color:"#64748b"}}>
              <div style={{fontWeight:600,color:"#1e293b",marginBottom:2}}>{new Date(post.date).toLocaleDateString("it-IT")}</div>
              <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post.body.split("\n")[0]}</div>
            </div>
          ))}
        </div>
      </div>}
      {/* Action Buttons */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={()=>onViewChange("generate")} style={{width:"100%",padding:"10px 16px",background:"#6366f1",color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <Icons.Sparkles size={14}/> Genera post
        </button>
        <button onClick={onEditClient} style={{width:"100%",padding:"10px 16px",background:"#fff",color:"#6366f1",border:"2px solid #6366f1",borderRadius:12,fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <Icons.Edit size={14}/> Modifica
        </button>
      </div>
    </div>
  );
}

// ─── Main Dashboard ────────────────────────────────────────────
function SocialDashboard(){
  const[clients,setClients]=useState(()=>loadData("clients",[]));
  const[activeClientId,setActiveClientId]=useState(()=>loadData("activeClientId",null));
  const[posts,setPosts]=useState(()=>loadData("posts",[]));
  const[view,setView]=useState("clients");
  const[selectedPost,setSelectedPost]=useState(null);
  const[showNewClient,setShowNewClient]=useState(false);
  const[searchQuery,setSearchQuery]=useState("");
  const[genConfig,setGenConfig]=useState({postCount:5});
  const[copyMsg,setCopyMsg]=useState("");
  const[geminiKey,setGeminiKey]=useState(()=>loadData("geminiKey",""));
  const[canvaToken,setCanvaToken]=useState(()=>loadData("canvaToken",""));
  const[canvaBrandKitsDyn,setCanvaBrandKitsDyn]=useState(()=>{
    try{localStorage.removeItem("social_dash_canvaBrandKitsDyn");}catch(e){}
    const fetched=loadData("canvaBrandKitsFetched",null);
    if(fetched&&fetched.length>0) return fetched;
    return CANVA_BRAND_KITS;
  });
  const[canvaLoading,setCanvaLoading]=useState(false);
  const[showSettings,setShowSettings]=useState(false);

  // Auto-save to localStorage
  useEffect(()=>{saveData("clients",clients);},[clients]);
  useEffect(()=>{saveData("posts",posts);},[posts]);
  useEffect(()=>{saveData("activeClientId",activeClientId);},[activeClientId]);
  useEffect(()=>{saveData("geminiKey",geminiKey);},[geminiKey]);
  useEffect(()=>{saveData("canvaToken",canvaToken);},[canvaToken]);
  useEffect(()=>{saveData("canvaBrandKitsFetched",canvaBrandKitsDyn);},[canvaBrandKitsDyn]);

  const refreshCanvaBrandKits=async()=>{
    if(!canvaToken){alert("Inserisci il Canva Access Token nelle impostazioni (icona ingranaggio).");return;}
    setCanvaLoading(true);
    try{
      let allKits=[];
      let continuation=null;
      do{
        const url="https://api.canva.com/rest/v1/brand-kits"+(continuation?"?continuation="+encodeURIComponent(continuation):"");
        const res=await fetch(url,{headers:{"Authorization":"Bearer "+canvaToken}});
        if(!res.ok){const err=await res.text();throw new Error("Canva API error "+res.status+": "+err);}
        const data=await res.json();
        if(data.items)allKits=allKits.concat(data.items);
        continuation=data.continuation||null;
      }while(continuation);
      const mapped=[{id:"",name:"— Nessuno —",thumb:""},...allKits.map(bk=>({id:bk.id,name:bk.name,thumb:bk.thumbnail?.url||""}))];
      setCanvaBrandKitsDyn(mapped);
      console.log("[SocialDash] Canva brand kits refreshed:",mapped.length-1,"kits");
    }catch(e){
      console.error("[SocialDash] Canva refresh error:",e);
      alert("Errore aggiornamento Canva: "+e.message+"\n\nVerifica il token nelle impostazioni.");
    }finally{setCanvaLoading(false);}
  };

  // Always start on homepage

  const activeClient=clients.find(c=>c.id===activeClientId);

  const addClient=(client)=>{const nc={...client,id:genId()};setClients(p=>[...p,nc]);setActiveClientId(nc.id);setShowNewClient(false);setView("generate");};
  const updateClient=(id,updates)=>{setClients(p=>p.map(c=>c.id===id?{...c,...updates}:c));};
  const deleteClient=(id)=>{setClients(p=>p.filter(c=>c.id!==id));setPosts(p=>p.filter(pp=>pp.clientId!==id));if(activeClientId===id){setActiveClientId(clients.length>1?clients.find(c=>c.id!==id)?.id:null);setView("clients");}};

  const[isGenerating,setIsGenerating]=useState(false);
  const[scrapingResult,setScrapingResult]=useState("");
  const generatePosts=async(customThemes, graphicStyle, templatePrompt)=>{
    if(!activeClient)return;
    setIsGenerating(true);

    // Scrape images from client website if available
    let scrapedImages=[];
    const websiteUrl=activeClient.website;
    if(websiteUrl){
      if(scrapedImagesCache[activeClient.id+"_site"]){
        scrapedImages=scrapedImagesCache[activeClient.id+"_site"];
      } else {
        try{
          scrapedImages=await scrapeWebsiteImages(websiteUrl);
          scrapedImagesCache[activeClient.id+"_site"]=scrapedImages;
        }catch(e){console.warn("Website scraping error:",e);}
      }
    }

    // Scrape images from Google Drive folder if available
    let driveImages=[];
    const driveUrl=activeClient.driveFolder;
    if(driveUrl){
      if(scrapedImagesCache[activeClient.id+"_drive"]){
        driveImages=scrapedImagesCache[activeClient.id+"_drive"];
      } else {
        try{
          driveImages=await scrapeDriveImages(driveUrl);
          scrapedImagesCache[activeClient.id+"_drive"]=driveImages;
        }catch(e){console.warn("Drive scraping error:",e);}
      }
    }

    // Also collect uploaded client images
    const clientImages=(activeClient.files||[]).filter(f=>f.type?.startsWith("image/")).map(f=>f.dataUrl).filter(Boolean);
    const allImages=[...clientImages,...driveImages,...scrapedImages];

    console.log("[SocialDash] Website images:",scrapedImages.length,"Drive images:",driveImages.length,"Uploaded:",clientImages.length,"Total:",allImages.length);

    const np=[];const sd=new Date();
    usedIdeasMap[activeClient.id]=[];
    const count=customThemes&&customThemes.length>0?customThemes.length:(genConfig.postCount||5);
    for(let i=0;i<count;i++){
      const dt=new Date(sd);dt.setDate(dt.getDate()+i);const ds=dt.toISOString().split("T")[0];
      const post=generatePost(activeClient,ds,i,customThemes&&customThemes[i]?customThemes[i]:null,graphicStyle,templatePrompt);
      // Assign a scraped/uploaded image to this post
      if(allImages.length>0){
        post.scrapedImage=allImages[i%allImages.length];
      }
      np.push(post);
    }
    setPosts(p=>[...p.filter(pp=>pp.clientId!==activeClient.id),...np]);
    setIsGenerating(false);
    const parts=[];
    if(scrapedImages.length>0) parts.push(scrapedImages.length+" dal sito");
    if(driveImages.length>0) parts.push(driveImages.length+" da Drive");
    if(clientImages.length>0) parts.push(clientImages.length+" caricate");
    if(parts.length>0){
      setScrapingResult("Immagini trovate: "+parts.join(", ")+" — verranno usate come riferimento per Gemini");
    } else if(websiteUrl||driveUrl){
      setScrapingResult("Non sono riuscito a recuperare immagini. Assicurati che il sito sia online e la cartella Drive sia condivisa pubblicamente.");
    }
    setTimeout(()=>setScrapingResult(""),5000);
  };
  const updatePost=(pid,upd)=>{setPosts(p=>p.map(pp=>pp.id===pid?{...pp,...upd}:pp));};
  const deletePost=(pid)=>{setPosts(p=>p.filter(pp=>pp.id!==pid));if(selectedPost?.id===pid)setSelectedPost(null);};

  const clientPosts=useMemo(()=>posts.filter(p=>p.clientId===activeClientId),[posts,activeClientId]);
  const stats=useMemo(()=>{const cp=clientPosts;return{total:cp.length,bozze:cp.filter(p=>p.status==="bozza").length,approvati:cp.filter(p=>p.status==="approvato").length,pubblicati:cp.filter(p=>p.status==="pubblicato").length};},[clientPosts]);

  const copyToClipboard=(text)=>{navigator.clipboard.writeText(text).then(()=>{setCopyMsg("Copiato!");setTimeout(()=>setCopyMsg(""),1500);});};

  return(
    <div className="dashboard-container">
      {copyMsg&&<div style={{position:"fixed",top:20,right:20,background:"#10b981",color:"#fff",padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>{copyMsg}</div>}

      {/* ──── LEFT SIDEBAR (NAVIGATION) ──── */}
      <NavSidebar view={view} onViewChange={setView} onToggleSettings={()=>setShowSettings(!showSettings)} showSettings={showSettings} activeClient={activeClient}/>

      {/* ──── MAIN CONTENT AREA ──── */}

        {/* Header with logo and settings */}
        <div className="content-header">
          <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>{setView("clients");setShowNewClient(false);}}>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.Sparkles size={20} color="#fff"/></div>
            <div><h1 style={{margin:0,fontSize:18,fontWeight:700,color:"#1e293b"}}>Social Post Generator</h1><p style={{margin:0,fontSize:12,color:"#94a3b8"}}>Dashboard multi-cliente</p></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <button style={{width:36,height:36,borderRadius:8,border:"none",background:"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="#e2e8f0"} onMouseLeave={e=>e.currentTarget.style.background="#f1f5f9"}>
              <Icons.Bell size={18} color="#64748b"/>
            </button>
            <button style={{width:36,height:36,borderRadius:8,border:"none",background:"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="#e2e8f0"} onMouseLeave={e=>e.currentTarget.style.background="#f1f5f9"}>
              <Icons.Settings size={18} color="#64748b"/>
            </button>
            <div style={{width:36,height:36,borderRadius:8,background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700}}>C</div>
          </div>
        </div>

        {/* Settings Panel */}
        {showSettings&&<div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"16px 24px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

        {/* ══════════════ POST GRID VIEW ══════════════ */}
        {view==="calendar"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div><h2 style={{margin:0,fontSize:22,fontWeight:700,color:"#1e293b"}}>Tutti i post</h2><p style={{margin:"4px 0 0",fontSize:13,color:"#94a3b8"}}>{posts.length} post totali · {clients.length} clienti</p></div>
          </div>
          {/* Barra di ricerca */}
          <div style={{marginBottom:20}}>
            <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="🔍 Cerca cliente per nome..." style={{...inputStyle,marginBottom:0,fontSize:14,padding:"12px 16px",borderRadius:12,background:"#fff",border:"1px solid #e2e8f0",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}/>
          </div>
          {(()=>{
            const q=searchQuery.toLowerCase().trim();
            const filteredClients=q?clients.filter(c=>c.name.toLowerCase().includes(q)):clients;
            const clientsWithPosts=filteredClients.filter(c=>posts.some(p=>p.clientId===c.id));
            const clientsEmpty=filteredClients.filter(c=>!posts.some(p=>p.clientId===c.id));
            if(filteredClients.length===0)return <div style={{textAlign:"center",padding:40,color:"#94a3b8",fontSize:14}}>Nessun cliente trovato per "{searchQuery}"</div>;
            return <div>
              {clientsWithPosts.map(cl=>{
                const clPosts=posts.filter(p=>p.clientId===cl.id);
                const clStats={total:clPosts.length,bozze:clPosts.filter(p=>p.status==="bozza").length,approvati:clPosts.filter(p=>p.status==="approvato").length,pubblicati:clPosts.filter(p=>p.status==="pubblicato").length};
                return <div key={cl.id} style={{marginBottom:32}}>
                  {/* Intestazione cartella cliente */}
                  <div onClick={()=>{setActiveClientId(cl.id);}} style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"12px 16px",background:"#fff",borderRadius:12,border:activeClientId===cl.id?"2px solid #6366f1":"1px solid #e2e8f0",cursor:"pointer",transition:"all .15s"}}>
                    {cl.logo?<img src={cl.logo} style={{width:32,height:32,borderRadius:8,objectFit:"contain",border:"1px solid #e2e8f0",background:"#fff"}}/>
                    :<div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,"+(cl.palette?.colors?.[0]||"#6366f1")+","+(cl.palette?.colors?.[1]||"#a855f7")+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff"}}>{cl.name?.charAt(0)||"?"}</div>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>{cl.name}</div>
                      <div style={{fontSize:12,color:"#94a3b8"}}>{cl.sector} · {cl.tone}{cl.website?<span> · <a href={cl.website.startsWith("http")?cl.website:"https://"+cl.website} target="_blank" style={{color:"#6366f1",textDecoration:"none"}}>{cl.website.replace(/^https?:\/\//,"")}</a></span>:""}</div>
                    </div>
                    <div style={{display:"flex",gap:8,fontSize:11}}>
                      <Badge color="#6366f1">{clStats.total} post</Badge>
                      {clStats.bozze>0&&<Badge color="#f59e0b">{clStats.bozze} bozze</Badge>}
                      {clStats.approvati>0&&<Badge color="#10b981">{clStats.approvati} approvati</Badge>}
                      {clStats.pubblicati>0&&<Badge color="#8b5cf6">{clStats.pubblicati} pubblicati</Badge>}
                    </div>
                  </div>
                  {/* Griglia post del cliente */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16,paddingLeft:16}}>
                    {clPosts.map((post,idx)=>{const bgColors=["#eff6ff","#f5f3ff","#fdf2f8","#ecfdf5","#fffbeb","#f8fafc"];const bgColor=bgColors[idx%bgColors.length];return(
                      <div key={post.id} onClick={()=>{setActiveClientId(cl.id);setSelectedPost(post);setView("post-detail");}} style={{background:bgColor,borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",cursor:"pointer",transition:"all .2s",display:"flex",minHeight:160}}>
                        <div style={{width:100,padding:12,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:6,borderRight:"1px solid rgba(0,0,0,.05)",background:"rgba(255,255,255,.4)"}}>
                          {(post.generatedImage||post.scrapedImage)?<img src={post.generatedImage||post.scrapedImage} style={{width:"100%",height:70,objectFit:"cover",borderRadius:8}} onError={e=>{e.target.style.display="none";}}/>
                          :<div style={{width:"100%",height:70,background:"rgba(99,102,241,.1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#6366f1",fontWeight:600,textAlign:"center",padding:4}}>{post.theme||post.type}</div>}
                        </div>
                        <div style={{flex:1,padding:12,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:6}}>Post del {new Date(post.date).toLocaleDateString("it-IT")}</div>
                            <div style={{fontSize:13,color:"#1e293b",lineHeight:"1.4",overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",marginBottom:8}}>{post.body.split("\n")[0]}</div>
                            {post.hashtags&&post.hashtags.length>0&&<div style={{fontSize:11,color:"#6366f1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post.hashtags.slice(0,3).join(" ")}</div>}
                          </div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
                            {post.theme&&<Badge color="#6366f1" style={{padding:"3px 8px",fontSize:10}}>{post.theme}</Badge>}
                            <Badge color={post.status==="bozza"?"#f59e0b":post.status==="approvato"?"#10b981":"#8b5cf6"} style={{padding:"3px 8px",fontSize:10}}>{post.status}</Badge>
                          </div>
                        </div>
                      </div>
                    );})}
                  </div>
                </div>;
              })}
              {clientsEmpty.length>0&&<div style={{marginTop:16,padding:16,background:"#f8fafc",borderRadius:12,border:"1px dashed #e2e8f0"}}>
                <div style={{fontSize:13,color:"#94a3b8",marginBottom:8}}>Clienti senza post:</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {clientsEmpty.map(cl=><Badge key={cl.id} color="#94a3b8" onClick={()=>{setActiveClientId(cl.id);setView("generate");}} style={{cursor:"pointer",padding:"4px 12px"}}>{cl.name}</Badge>)}
                </div>
              </div>}
            </div>;
          })()}
        </div>}

        {/* ══════════════ GENERATE VIEW ══════════════ */}
        {view==="generate"&&activeClient&&<GenerateView activeClient={activeClient} genConfig={genConfig} setGenConfig={setGenConfig} generatePosts={generatePosts} isGenerating={isGenerating} scrapingResult={scrapingResult} posts={posts} setPosts={setPosts} labelStyle={labelStyle} inputStyle={inputStyle} setView={setView} setSelectedPost={setSelectedPost} canvaBrandKitsDyn={canvaBrandKitsDyn} refreshCanvaBrandKits={refreshCanvaBrandKits} canvaLoading={canvaLoading}/>}

        {/* ══════════════ CLIENT EDIT VIEW ══════════════ */}
        {view==="client-edit"&&activeClient&&<ClientEditView client={activeClient} onUpdate={(upd)=>updateClient(activeClient.id,upd)} onDelete={()=>{deleteClient(activeClient.id);setView("clients");}} onBack={()=>setView("generate")} labelStyle={labelStyle} inputStyle={inputStyle} canvaBrandKitsDyn={canvaBrandKitsDyn}/>}

            {/* ══════════════ POST DETAIL VIEW ══════════════ */}
            {view==="post-detail"&&selectedPost&&<PostDetail post={selectedPost} client={activeClient} geminiKey={geminiKey} onBack={()=>setView("generate")} onUpdate={(upd)=>{updatePost(selectedPost.id,upd);setSelectedPost({...selectedPost,...upd});}} onDelete={()=>{deletePost(selectedPost.id);setView("generate");}} onCopy={copyToClipboard} labelStyle={labelStyle}/>}
          </div>

          {/* ──── RIGHT SIDEBAR ──── */}
          {view==="clients"?<CalendarWidget posts={posts}/>:<ClientSidebar activeClient={activeClient} posts={posts} onEditClient={()=>setView("client-edit")} onGeneratePost={()=>setView("generate")} onViewChange={setView}/>}
        </div>
      </div>
    </div>
  );
}

// ─── Generate View (Auto + contenuti cliente) ──────────────────────────
function GenerateView({activeClient,genConfig,setGenConfig,generatePosts,isGenerating,scrapingResult,posts,setPosts,labelStyle,inputStyle,setView,setSelectedPost,canvaBrandKitsDyn,refreshCanvaBrandKits,canvaLoading}){
  const[customThemes,setCustomThemes]=useState([]);
  const[newTheme,setNewTheme]=useState("");
  const[galleryImages,setGalleryImages]=useState([]);
  const[galleryLoading,setGalleryLoading]=useState(false);
  const[galleryLoaded,setGalleryLoaded]=useState(null);
  const[selectedGalleryIdxs,setSelectedGalleryIdxs]=useState(new Set());
  const[convertingSelected,setConvertingSelected]=useState(false);
  const[graphicStyle,setGraphicStyle]=useState("");
  const[selectedTemplate,setSelectedTemplate]=useState(activeClient.canvaBrandKit||null);
  const[brandKitSearch,setBrandKitSearch]=useState("");
  const[pedSelection,setPedSelection]=useState(new Set());
  const[pedGenerating,setPedGenerating]=useState(false);

  const togglePed=(postId)=>{
    setPedSelection(prev=>{const next=new Set(prev);if(next.has(postId))next.delete(postId);else next.add(postId);return next;});
  };

  const generaPED=async()=>{
    if(pedSelection.size===0)return;
    setPedGenerating(true);
    try{
      const W=2560,H=1440;
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:"landscape",unit:"px",format:[W,H],compress:true});

      const brandColors=activeClient.palette?.colors||["#6366f1","#a855f7","#f59e0b","#10b981"];
      const primary=brandColors[0]||"#6366f1";
      const secondary=brandColors[1]||"#a855f7";
      const hexToRgb=(hex)=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];};

      // Helper: draw text with word wrap on canvas, return as image for PDF
      const makeSlideCanvas=(drawFn)=>{
        const c=document.createElement("canvas");c.width=W;c.height=H;
        const ctx=c.getContext("2d");
        drawFn(ctx,W,H);
        return c.toDataURL("image/jpeg",0.92);
      };

      // ── PAGE 1: Cover ──
      const coverImg=makeSlideCanvas((ctx,w,h)=>{
        // Background
        const grad=ctx.createLinearGradient(0,0,w,h);
        grad.addColorStop(0,primary);grad.addColorStop(1,secondary);
        ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
        // PED title
        ctx.fillStyle="#FFFFFF";
        ctx.font="800 180px 'Inter',sans-serif";ctx.textBaseline="top";
        ctx.fillText("PED",120,320);
        // Accent bar
        ctx.fillStyle=secondary;ctx.fillRect(120,560,300,8);
        // Client name
        ctx.fillStyle="rgba(255,255,255,0.9)";
        ctx.font="600 72px 'Inter',sans-serif";
        ctx.fillText(activeClient.name,120,620);
        // Sector + tone
        ctx.fillStyle="rgba(255,255,255,0.5)";
        ctx.font="400 36px 'Inter',sans-serif";
        ctx.fillText((activeClient.sector||"")+" · "+(activeClient.tone||""),120,720);
        // Date
        ctx.fillStyle="rgba(255,255,255,0.3)";
        ctx.font="400 28px 'Inter',sans-serif";
        ctx.fillText(new Date().toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"}),120,800);
      });
      pdf.addImage(coverImg,0,0,W,H);

      // ── PAGES 2+: Post content ──
      const selectedPosts=clientPosts.filter(p=>pedSelection.has(p.id));
      for(let i=0;i<selectedPosts.length;i++){
        const post=selectedPosts[i];
        pdf.addPage([W,H],"landscape");

        const pageImg=makeSlideCanvas((ctx,w,h)=>{
          // White background
          ctx.fillStyle="#FFFFFF";ctx.fillRect(0,0,w,h);
          // Left accent bar
          ctx.fillStyle=primary;ctx.fillRect(40,60,6,h-120);

          // LEFT SIDE: Copy (x:80 to w*0.48)
          const maxTextW=w*0.44;
          // Post number
          ctx.fillStyle=primary;ctx.font="700 22px 'Inter',sans-serif";ctx.textBaseline="top";
          ctx.fillText("Post "+(i+1)+" / "+selectedPosts.length,80,70);
          // Date
          ctx.fillStyle="#94a3b8";ctx.font="400 20px 'Inter',sans-serif";
          ctx.fillText(post.date||"",80,105);
          // Theme title
          ctx.fillStyle="#1e293b";ctx.font="800 42px 'Inter',sans-serif";
          const title=post.theme||post.designLayers?.headline||"";
          // Word wrap title
          const wrapText=(text,x,y,maxW,lineH,font)=>{
            ctx.font=font;
            const words=text.split(" ");const lines=[];let cur="";
            for(const wd of words){const test=cur?cur+" "+wd:wd;if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=wd;}else{cur=test;}}
            if(cur)lines.push(cur);
            for(let j=0;j<lines.length;j++)ctx.fillText(lines[j],x,y+j*lineH);
            return y+lines.length*lineH;
          };
          let curY=wrapText(title,80,160,maxTextW,52,"800 42px 'Inter',sans-serif");
          curY+=20;

          // Body copy
          ctx.fillStyle="#334155";
          const body=(post.body||"").substring(0,1200);
          curY=wrapText(body,80,curY,maxTextW,30,"400 20px 'Inter',sans-serif");
          curY+=20;

          // Hashtags
          if(post.hashtags&&post.hashtags.length>0){
            ctx.fillStyle=primary;ctx.globalAlpha=0.7;
            ctx.font="400 16px 'Inter',sans-serif";
            ctx.fillText(post.hashtags.slice(0,8).join("  "),80,Math.min(curY,h-140));
            ctx.globalAlpha=1;
          }
          // CTA badge
          if(post.cta){
            const ctaY=Math.min(curY+30,h-90);
            const [cr,cg,cb]=hexToRgb(primary);
            ctx.fillStyle=primary;
            const ctaW=Math.min(ctx.measureText(post.cta).width+60,maxTextW);
            ctx.beginPath();ctx.roundRect(80,ctaY,ctaW,50,12);ctx.fill();
            ctx.fillStyle="#FFFFFF";ctx.font="700 20px 'Inter',sans-serif";
            ctx.textBaseline="middle";ctx.fillText(post.cta,110,ctaY+25);ctx.textBaseline="top";
          }

          // RIGHT SIDE: Image (x: w*0.5 to w-40)
          const imgSrc=post.generatedImage||post.scrapedImage;
          if(imgSrc){
            const img=new Image();img.src=imgSrc;
            try{
              const imgX=w*0.5,imgY=40,imgW=w*0.5-40,imgH=h-80;
              // Rounded rect clip
              ctx.save();ctx.beginPath();ctx.roundRect(imgX,imgY,imgW,imgH,20);ctx.clip();
              ctx.drawImage(img,imgX,imgY,imgW,imgH);
              ctx.restore();
            }catch(e){}
          }else{
            const [sr,sg,sb]=hexToRgb(secondary);
            ctx.fillStyle=secondary+"20";
            ctx.beginPath();ctx.roundRect(w*0.5,40,w*0.5-40,h-80,20);ctx.fill();
            ctx.fillStyle=primary;ctx.font="500 28px 'Inter',sans-serif";
            ctx.textAlign="center";ctx.fillText("Genera la grafica",w*0.75,h/2-20);
            ctx.fillText("per questo post",w*0.75,h/2+20);ctx.textAlign="left";
          }
        });
        pdf.addImage(pageImg,0,0,W,H);
      }

      pdf.save("PED_"+activeClient.name.replace(/\s+/g,"_")+"_"+(new Date().toISOString().split("T")[0])+".pdf");
    }catch(e){
      console.error("PED generation error:",e);
      alert("Errore nella generazione del PED: "+e.message);
    }
    setPedGenerating(false);
  };

  const TEMPLATES=[
    {id:"bold-center",name:"Testo bold centrato",desc:"Titolo grande e bold al centro su sfondo pieno colore. Minimal e d'impatto.",
     preview:{bg:"linear-gradient(135deg,#1e293b,#334155)",elements:[{type:"text",text:"TITOLO",x:"50%",y:"40%",size:22,bold:true,color:"#fff"},{type:"text",text:"Sottotitolo qui",x:"50%",y:"58%",size:11,color:"#94a3b8"},{type:"text",text:"Brand",x:"50%",y:"80%",size:9,color:"#64748b"}]},
     prompt:"Layout: BOLD CENTERED statement piece. The headline is MASSIVE (60%+ of canvas width), ultra-bold weight, centered vertically. Background is a rich gradient mesh or color-shifting gradient (not flat solid). Add subtle noise texture or grain overlay for depth. Subtitle in thin/light weight below with generous letter-spacing. Brand name small at bottom. Add a subtle decorative element — a thin line, geometric accent, or abstract shape — to elevate the design. Think premium brand announcement poster."},
    {id:"split-layout",name:"Split: colore + testo",desc:"Metà grafica con colore/pattern, metà con testo allineato.",
     preview:{bg:"linear-gradient(90deg,#6366f1 50%,#fff 50%)",elements:[{type:"text",text:"TITOLO",x:"75%",y:"35%",size:16,bold:true,color:"#1e293b"},{type:"text",text:"Sottotitolo",x:"75%",y:"52%",size:10,color:"#64748b"},{type:"text",text:"Brand",x:"75%",y:"75%",size:9,color:"#6366f1"}]},
     prompt:"Layout: SPLIT COMPOSITION — canvas divided vertically into two halves. Left side: rich gradient, abstract pattern, or color-blocked area with decorative elements (geometric shapes, dots, organic curves). Right side: clean light/white area with headline left-aligned in bold, tagline below in lighter weight, brand at bottom. The split line can be diagonal, curved, or have an interesting shape — NOT a straight boring line. Add subtle shadow or depth where the two halves meet. Think editorial magazine ad."},

     prompt:"Layout: EDITORIAL MAGAZINE spread. Sophisticated white/cream background. Headline at the top in a beautiful serif typeface, VERY large, with refined letter-spacing. Below: a thin gold or colored decorative line/divider with small ornamental details. Tagline in italic or light weight below the divider. Brand name at bottom flanked by em-dashes. Add subtle typographic details: a drop cap, pull-quote styling, or a thin border frame around the edges. This should look like a page from Vogue, Elle, or a luxury lifestyle magazine."},
    {id:"duotone",name:"Duotone / Bicolore",desc:"Due colori forti della palette del brand, geometria semplice.",
