// ─── Calendar Widget Component — Horizontal Week Strip ─────────────────
function CalendarWidget({posts=[]}){
  const[weekOffset,setWeekOffset]=useState(0);
  const today=new Date();
  const todayStr=today.toDateString();
  const postDates={};
  posts.forEach(p=>{const ds=new Date(p.date).toDateString();postDates[ds]=(postDates[ds]||0)+1;});
  // Get Monday of the current week + offset
  const getMonday=(dt,off)=>{const d=new Date(dt);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1)+(off*7);d.setDate(diff);d.setHours(0,0,0,0);return d;};
  const monday=getMonday(today,weekOffset);
  const weekDays=[];
  const dayLabels=["Lu","Ma","Me","Gi","Ve","Sa","Do"];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);weekDays.push(d);}
  const monthLabel=weekDays[0].toLocaleDateString("it-IT",{month:"long",year:"numeric"});
  return(
    <div style={{background:"#fff",borderRadius:20,padding:"20px 16px",boxShadow:"0 4px 24px rgba(0,0,0,.07)"}}>
      {/* Month header + nav arrows */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,padding:"0 4px"}}>
        <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#1e293b",textTransform:"capitalize"}}>{monthLabel}</h3>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setWeekOffset(weekOffset-1)} style={{width:28,height:28,borderRadius:8,border:"none",background:"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}} onMouseOver={e=>e.currentTarget.style.background="#e2e8f0"} onMouseOut={e=>e.currentTarget.style.background="#f1f5f9"}>
            <Icons.ChevLeft size={14} color="#64748b"/>
          </button>
          {weekOffset!==0&&<button onClick={()=>setWeekOffset(0)} style={{height:28,borderRadius:8,border:"none",background:"#6366f1",color:"#fff",cursor:"pointer",padding:"0 10px",fontSize:10,fontWeight:700,transition:"opacity .15s"}}>Oggi</button>}
          <button onClick={()=>setWeekOffset(weekOffset+1)} style={{width:28,height:28,borderRadius:8,border:"none",background:"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}} onMouseOver={e=>e.currentTarget.style.background="#e2e8f0"} onMouseOut={e=>e.currentTarget.style.background="#f1f5f9"}>
            <Icons.ChevRight size={14} color="#64748b"/>
          </button>
        </div>
      </div>
      {/* Week strip */}
      <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
        {weekDays.map((d,i)=>{
          const isToday=d.toDateString()===todayStr;
          const postCount=postDates[d.toDateString()]||0;
          return(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"default"}}>
              <span style={{fontSize:11,fontWeight:600,color:isToday?"#6366f1":"#94a3b8",letterSpacing:".3px"}}>{dayLabels[i]}</span>
              <div style={{
                width:44,height:56,borderRadius:14,
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
                background:isToday?"linear-gradient(135deg,#6366f1,#7c3aed)":"transparent",
                boxShadow:isToday?"0 4px 16px rgba(99,102,241,.35)":"none",
                transition:"all .2s",position:"relative"
              }}>
                <span style={{fontSize:18,fontWeight:700,color:isToday?"#fff":"#334155",lineHeight:1}}>{d.getDate()}</span>
                {postCount>0&&<div style={{width:5,height:5,borderRadius:"50%",background:isToday?"#fff":"#f59e0b",boxShadow:isToday?"0 0 4px rgba(255,255,255,.5)":"0 0 4px rgba(245,158,11,.4)"}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Today's summary */}
      <div style={{marginTop:18,padding:"14px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #f1f5f9"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:2}}>Oggi</div>
            <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{today.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{background:"linear-gradient(135deg,#6366f1,#7c3aed)",color:"#fff",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700}}>
            {postDates[todayStr]||0} post
          </div>
        </div>
      </div>

      {/* Weekly post activity bars */}
      {(()=>{
        const maxCount=Math.max(...weekDays.map(d=>postDates[d.toDateString()]||0),1);
        const totalWeek=weekDays.reduce((s,d)=>s+(postDates[d.toDateString()]||0),0);
        return(
          <div style={{marginTop:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:11,fontWeight:700,color:"#1e293b"}}>Attività settimana</span>
              <span style={{fontSize:11,fontWeight:600,color:"#6366f1"}}>{totalWeek} post</span>
            </div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:48}}>
              {weekDays.map((d,i)=>{
                const c=postDates[d.toDateString()]||0;
                const isToday=d.toDateString()===todayStr;
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:"100%",height:Math.max(c/maxCount*40,c>0?6:2),
                      background:c>0?(isToday?"linear-gradient(180deg,#6366f1,#7c3aed)":"linear-gradient(180deg,#c4b5fd,#a78bfa)"):"#e2e8f0",
                      borderRadius:4,transition:"height .3s"}}/>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function getTeamForUser(name){
  if(!name) return null;
  for(const[teamName,info] of Object.entries(TEAMS)){
    if(info.members.some(m=>m.toLowerCase()===name.toLowerCase())) return {name:teamName,...info};
  }
  return null;
}

// Dynamic cache: overrides fallback when fonts are fetched from Canva API
let _bkFontsCache = {};

// Helper: get fonts — checks dynamic cache first, then static fallback, then client settings
function getBrandKitFonts(client){
  if(client.canvaBrandKit){
    // 1. Dynamic cache (fetched from API)
    if(_bkFontsCache[client.canvaBrandKit]){
      const bkf=_bkFontsCache[client.canvaBrandKit];
      return {heading:bkf.h,body:bkf.b};
    }
    // 2. Static fallback map
    if(BRAND_KIT_FONTS_FALLBACK[client.canvaBrandKit]){
      const bkf=BRAND_KIT_FONTS_FALLBACK[client.canvaBrandKit];
      return {heading:bkf.h,body:bkf.b};
    }
  }
  return {heading:client.fontHeading||"Montserrat",body:client.fontBody||"Open Sans"};
}

// Global function to update font cache from any component (used by BrandKitGrid)
function updateBkFontsCache(bkId, fonts){
  if(!bkId||!fonts||fonts.length===0) return;
  _bkFontsCache[bkId]={h:fonts[0], b:fonts.length>1?fonts[1]:fonts[0]};
  // Also update fallback for next session
  try{_idbSave("bkFontsCache",_bkFontsCache);}catch(e){}
  console.log("[BKFonts] Cached fonts for",bkId,":",_bkFontsCache[bkId]);
}

// Fetch font info for a single brand kit from Canva API
async function _fetchBkFonts(bkId,token){
  try{
    const r=await fetch("https://api.canva.com/rest/v1/brand-kits/"+bkId,{
      headers:{"Authorization":"Bearer "+token}
    });
    if(!r.ok) return null;
    const d=await r.json();
    const kit=d.brand_kit||d;
    const allFonts=(kit.fonts||[]).flatMap(g=>(g.fonts||[]).map(f=>f.name||f.family)).filter(Boolean);
    if(allFonts.length===0) return null;
    // First font = heading, second font (or first if only one) = body
    return {h:allFonts[0], b:allFonts.length>1?allFonts[1]:allFonts[0]};
  }catch(e){console.warn("[BKFonts] Error fetching",bkId,e);return null;}
}

// Fetch fonts for all brand kits used by clients (+ all known kits)
async function fetchAllBrandKitFonts(clients,brandKits,token){
  if(!token) return _bkFontsCache;
  // Collect all unique brand kit IDs from clients + known kits
  const ids=new Set();
  (clients||[]).forEach(c=>{if(c.canvaBrandKit) ids.add(c.canvaBrandKit);});
  (brandKits||[]).forEach(bk=>{if(bk.id) ids.add(bk.id);});
  if(ids.size===0) return _bkFontsCache;

  // Try to load cached results from IndexedDB first
  let cached=await _idbLoad("bkFontsCache");
  if(cached&&typeof cached==="object") _bkFontsCache={..._bkFontsCache,...cached};

  // Determine which IDs are missing from cache
  const missing=[...ids].filter(id=>!_bkFontsCache[id]);
  if(missing.length===0) return _bkFontsCache;

  console.log("[BKFonts] Fetching fonts for",missing.length,"brand kits...");
  // Fetch in batches of 5 to avoid rate limits
  for(let i=0;i<missing.length;i+=5){
    const batch=missing.slice(i,i+5);
    const results=await Promise.all(batch.map(id=>_fetchBkFonts(id,token)));
    batch.forEach((id,idx)=>{
      if(results[idx]) _bkFontsCache[id]=results[idx];
    });
  }

  // Persist to IndexedDB
  _idbSave("bkFontsCache",_bkFontsCache);
  console.log("[BKFonts] Cache updated:",Object.keys(_bkFontsCache).length,"kits");
  return _bkFontsCache;
}

const usedIdeasMap = {};

// ─── Persistence (triple-layer: localStorage + IndexedDB + window.name) ─────
const STORAGE_KEY="social_dash_";
let _idbInstance=null;

// ── window.name backup — survives refresh on ANY browser/protocol ──
function _wnLoad(){
  try{
    if(!window.name||!window.name.startsWith("{")) return {};
    return JSON.parse(window.name);
  }catch(e){return {};}
}
function _wnSave(key,data){
  try{
    const store=_wnLoad();
    store[STORAGE_KEY+key]=data;
    window.name=JSON.stringify(store);
  }catch(e){}
}
function _wnGet(key){
  try{
    const store=_wnLoad();
    return store[STORAGE_KEY+key]||null;
  }catch(e){return null;}
}

// ── IndexedDB ──
function _getIDB(){
  return new Promise((resolve,reject)=>{
    if(_idbInstance){resolve(_idbInstance);return;}
    try{
      const req=indexedDB.open("social_dash_v2",1);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains("data")) db.createObjectStore("data");
      };
      req.onsuccess=e=>{_idbInstance=e.target.result;resolve(_idbInstance);};
      req.onerror=()=>reject(new Error("IDB open failed"));
    }catch(e){reject(e);}
  });
}
function _idbSave(key,data){
  _getIDB().then(db=>{
    try{const tx=db.transaction("data","readwrite");tx.objectStore("data").put(data,key);}catch(e){}
  }).catch(()=>{});
}
function _idbLoad(key){
  return _getIDB().then(db=>{
    return new Promise(resolve=>{
      try{
        const tx=db.transaction("data","readonly");
        const get=tx.objectStore("data").get(key);
        get.onsuccess=()=>resolve(get.result||null);
        get.onerror=()=>resolve(null);
      }catch(e){resolve(null);}
    });
  }).catch(()=>null);
}
function _idbLoadLegacy(key){
  return new Promise(resolve=>{
    try{
      const req=indexedDB.open("social_dash_backup",1);
      req.onupgradeneeded=e=>{e.target.result.createObjectStore("data");};
      req.onsuccess=e=>{
        const db=e.target.result;
        const tx=db.transaction("data","readonly");
        const get=tx.objectStore("data").get(key);
        get.onsuccess=()=>resolve(get.result||null);
        get.onerror=()=>resolve(null);
      };
      req.onerror=()=>resolve(null);
    }catch(e){resolve(null);}
  });
}

// ── Main load/save — tries all 3 layers ──
function loadData(key,fallback){
  try{
    // 1. localStorage
    const ls=localStorage.getItem(STORAGE_KEY+key);
    if(ls&&ls!=="[]"&&ls!=="null"&&ls!=="\"\"") return JSON.parse(ls);
    // 2. window.name (instant, survives refresh)
    const wn=_wnGet(key);
    if(wn&&(Array.isArray(wn)?wn.length>0:wn)){
      // Restore to localStorage too
      try{localStorage.setItem(STORAGE_KEY+key,JSON.stringify(wn));}catch(e){}
      return wn;
    }
    return fallback;
  }catch(e){return fallback;}
}

// Strip heavy base64 data for localStorage/window.name (keep under 5MB)
function _slimForLS(key,data){
  if(key!=="clients"||!Array.isArray(data)) return data;
  return data.map(c=>{
    const slim={...c};
    if(slim.logo&&typeof slim.logo==="string"&&slim.logo.length>500){
      slim.logo="__IDB__"; // marker: full logo is in IndexedDB
    }
    if(slim.files&&slim.files.length>0){
      slim.files=slim.files.map(f=>{
        if(f.data&&typeof f.data==="string"&&f.data.length>500) return {...f,data:"__IDB__"};
        return f;
      });
    }
    return slim;
  });
}

function saveData(key,data){
  // Always save FULL data to IndexedDB first (large storage, async)
  _idbSave(key,data);
  // Save slim version to localStorage + window.name (fast, sync, but limited)
  const slim=_slimForLS(key,data);
  try{localStorage.setItem(STORAGE_KEY+key,JSON.stringify(slim));}catch(e){
    console.warn("[SocialDash] localStorage save failed for",key,":",e.message);
    if(e.name==="QuotaExceededError"||e.code===22||e.code===1014){
      window._socialDashSaveError=true;
    }
  }
  _wnSave(key,slim);
}

// Helper: check if a logo value is a real displayable image (not a __IDB__ marker)
function hasLogo(logo){return logo&&typeof logo==="string"&&logo!=="__IDB__"&&logo.startsWith("data:");}

// ── Resize images to max 256px to avoid localStorage quota issues ──
function resizeImageBase64(base64,maxSize){
  maxSize=maxSize||256;
  return new Promise((resolve)=>{
    try{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w<=maxSize&&h<=maxSize){resolve(base64);return;}
        if(w>h){h=Math.round(h*(maxSize/w));w=maxSize;}
        else{w=Math.round(w*(maxSize/h));h=maxSize;}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        const ctx=c.getContext("2d");ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/png",0.85));
      };
      img.onerror=()=>resolve(base64);
      img.src=base64;
    }catch(e){resolve(base64);}
  });
}

// On app start: load FULL data from IndexedDB (which has logos/files), merge with localStorage
// Returns {key: data} for all keys that had richer data in IDB
async function recoverFromBackup(){
  const keys=["clients","posts","geminiKey","canvaToken","activeClientId"];
  const result={};
  let anyRecovered=false;
  for(const key of keys){
    const lsData=loadData(key,null);
    let idbData=await _idbLoad(key);
    if(!idbData||(Array.isArray(idbData)&&idbData.length===0)){
      idbData=await _idbLoadLegacy(key);
    }
    if(key==="clients"&&Array.isArray(lsData)&&Array.isArray(idbData)){
      // Merge: IDB has full logos, LS might have __IDB__ markers or be stale
      // Use IDB as base (it has full data), but prefer LS for non-binary fields if LS is newer
      const idbMap=new Map(idbData.map(c=>[c.id,c]));
      const merged=lsData.map(lsClient=>{
        const idbClient=idbMap.get(lsClient.id);
        if(!idbClient) return lsClient; // new client only in LS
        // Start with IDB (has full binary data), overlay LS non-binary changes
        const out={...idbClient};
        for(const [k,v] of Object.entries(lsClient)){
          if(v==="__IDB__") continue; // skip markers, keep IDB version
          if(k==="files"&&Array.isArray(v)){
            out.files=v.map((f,i)=>{
              if(f.data==="__IDB__"&&idbClient.files?.[i]) return idbClient.files[i];
              return f;
            });
            continue;
          }
          out[k]=v; // LS has the latest non-binary edits
        }
        idbMap.delete(lsClient.id);
        return out;
      });
      // Add clients only in IDB (not in LS)
      for(const idbOnly of idbMap.values()) merged.push(idbOnly);
      result[key]=merged;
      anyRecovered=true;
    } else if(idbData&&(Array.isArray(idbData)?idbData.length>0:idbData)){
      if(!lsData||(Array.isArray(lsData)&&lsData.length===0)){
        result[key]=idbData;
        anyRecovered=true;
      }
    }
  }
  return anyRecovered?result:null;
}

function mergeSeedClients(storedClients){
  const merged=[...storedClients];
  const names=new Set(merged.map(c=>c.name.toLowerCase().trim()));
  for(const seed of SEED_CLIENTS){

}

// ─── Helper: fetch image URL → base64 (for Gemini multimodal) ──
async function imageUrlToBase64(url) {
  try {
    // For data: URLs (already base64), extract directly
    if (url.startsWith("data:")) {
      const parts = url.split(",");
      const mimeMatch = url.match(/data:([^;]+);/);
      if (parts[1] && mimeMatch) return { base64: parts[1], mimeType: mimeMatch[1] };
      return null;
    }

    // Try fetching with multiple approaches
    const attempts = [
      () => fetch(url, { signal: AbortSignal.timeout(8000) }),
      () => fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) }),
      () => fetch("https://corsproxy.io/?" + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) })
    ];

    for (const tryFetch of attempts) {
      try {
        const res = await tryFetch();
        if (!res.ok) continue;
        const blob = await res.blob();
        if (!blob.type.startsWith("image/") && blob.size < 1000) continue;
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const dataUrl = reader.result;
            const base64 = dataUrl.split(",")[1];
            const mimeType = blob.type || "image/jpeg";
            resolve({ base64, mimeType });
          };
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(blob);
        });
      } catch(e) { continue; }
    }
    return null;
  } catch(e) {
    console.warn("imageUrlToBase64 failed:", e.message);
    return null;
  }
}

// ─── Gemini API (multimodal: testo + immagini di riferimento) ───
async function generateImageWithGemini(apiKey, prompt, referenceImages) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-pro-image-preview:generateContent?key=${apiKey}`;

  // Build parts: text prompt + optional reference images
  const parts = [{ text: prompt }];

  if (referenceImages && referenceImages.length > 0) {
    // Add up to 5 reference images for richer context
    for (const refImg of referenceImages.slice(0, 5)) {
      if (refImg.base64 && refImg.mimeType) {
        parts.push({ inlineData: { mimeType: refImg.mimeType, data: refImg.base64 } });
      }
    }
    // Add instruction to use reference images creatively
    if (parts.length > 1) {
      parts[0].text += "\n\nPHOTO INTEGRATION RULES: The attached photos are real brand photos. Use them AS-IS (do not redraw or recreate). Integrate them into the graphic design:\n- As full-bleed background with text overlay and cinematic color grading\n- As a prominent focal element with designed frame, border, or mask shape\n- With professional color correction to match the brand palette\nThe final result must look like a professionally designed social media post where the photo and graphic elements work together seamlessly — like a Canva Pro template.";
    }
  }

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { responseModalities: ["IMAGE","TEXT"] }
    })
  });
  if (!res.ok) { const err = await res.text(); throw new Error(`Gemini API error: ${err}`); }
  const data = await res.json();
  const resParts = data?.candidates?.[0]?.content?.parts || [];
  const imgPart = resParts.find(p => p.inlineData);
  if (imgPart) return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
  throw new Error("Nessuna immagine generata. Riprova.");
}

// ─── Google Fonts dynamic loader ────────────────────────────
const __loadedFonts = new Set();
async function loadGoogleFont(fontName) {
  if (!fontName || __loadedFonts.has(fontName)) return;
  try {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=" + encodeURIComponent(fontName) + ":wght@300;400;500;600;700;800;900&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
    await document.fonts.load('900 48px "' + fontName + '"');
    __loadedFonts.add(fontName);
    console.log("[SocialDash] Font loaded:", fontName);
  } catch(e) { console.warn("Font load failed:", fontName, e); }
}

// ─── Iconify API — free icon search (Material Design, Font Awesome, Flaticon, etc.) ──
const _iconCache={};
async function searchIcons(query, limit=24){
  const cacheKey=query+"_"+limit;
  if(_iconCache[cacheKey]) return _iconCache[cacheKey];
  try{
    const res=await fetch(`https://api.iconify.design/search?query=${encodeURIComponent(query)}&limit=${limit}`);
    if(!res.ok) return [];
    const data=await res.json();
    const icons=(data.icons||[]).slice(0,limit);
    _iconCache[cacheKey]=icons;
    return icons;
  }catch(e){console.warn("[Icons] Search error:",e);return [];}
}
async function getIconSvg(iconName, color="#000000", size=64){
  // iconName format: "prefix:name" e.g. "mdi:heart"
  try{
    const res=await fetch(`https://api.iconify.design/${iconName}.svg?color=${encodeURIComponent(color)}&width=${size}&height=${size}`);
    if(!res.ok) return null;
    return await res.text();
  }catch(e){return null;}
}
async function iconSvgToImage(svgText, size=64){
  return new Promise((resolve)=>{
    const blob=new Blob([svgText],{type:"image/svg+xml"});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{URL.revokeObjectURL(url);resolve(img);};
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

// ─── Canvas compositing: Gemini BG + real font text overlay ──
async function compositeGraphic(bgDataUrl, textConfig, width, height) {
  const { headline, tagline, brand, fontHeading, fontBody, colors, template } = textConfig;

  // Load fonts
  await Promise.all([loadGoogleFont(fontHeading), loadGoogleFont(fontBody)]);

  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");

  // Draw Gemini background, stretched to exact dimensions
  const bgImg = new Image();
  bgImg.src = bgDataUrl;
  await new Promise((resolve, reject) => { bgImg.onload = resolve; bgImg.onerror = reject; });
  ctx.drawImage(bgImg, 0, 0, width, height);

  // Detect if background is dark or light (sample center pixels)
  const sampleData = ctx.getImageData(Math.floor(width/4), Math.floor(height/2), Math.floor(width/2), 10).data;
  let totalBrightness = 0;
  for (let i = 0; i < sampleData.length; i += 4) {
    totalBrightness += (sampleData[i] * 0.299 + sampleData[i+1] * 0.587 + sampleData[i+2] * 0.114);
  }
  const avgBrightness = totalBrightness / (sampleData.length / 4);
  const isDark = avgBrightness < 128;
  const textColor = isDark ? "#FFFFFF" : "#1a1a2e";
  const shadowColor = isDark ? "rgba(0,0,0,0.7)" : "rgba(255,255,255,0.7)";
  const accentColor = colors?.[2] || (isDark ? "rgba(255,255,255,0.5)" : "rgba(0,0,0,0.3)");

  // Text sizing based on canvas dimensions
  const headlineSize = Math.round(width * 0.085);
  const taglineSize = Math.round(width * 0.038);
  const brandSize = Math.round(width * 0.03);
  const pad = Math.round(width * 0.08);

  // Helper: draw text with shadow/outline for readability
  const drawText = (text, x, y, font, size, color, align, maxW, weight) => {
    ctx.save();
    ctx.font = (weight || "700") + " " + size + "px '" + font + "', sans-serif";
    ctx.textAlign = align || "center";
    ctx.textBaseline = "middle";
    // Multi-layer shadow for readability
    ctx.shadowColor = shadowColor;
    ctx.shadowBlur = Math.round(size * 0.25);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = Math.round(size * 0.05);
    ctx.fillStyle = color;
    // Word wrap
    const words = text.split(" ");
    const lines = [];
    let currentLine = "";
    const mw = maxW || (width - pad * 2);
    for (const word of words) {
      const test = currentLine ? currentLine + " " + word : word;
      if (ctx.measureText(test).width > mw && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else { currentLine = test; }
    }
    if (currentLine) lines.push(currentLine);
    const lineHeight = size * 1.15;
    const totalH = lines.length * lineHeight;
    const startY = y - totalH / 2 + lineHeight / 2;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], x, startY + i * lineHeight);
    }
    ctx.restore();
    return { startY, totalH, lineHeight, lines };
  };

  // ── Layout logic based on template ──
  const tpl = template || "bold-center";
  const cx = width / 2;

  if (tpl === "split-layout") {
    // Text on the right side
    const rx = width * 0.72;
    const mw = width * 0.4;
    // Semi-transparent panel on right
    ctx.fillStyle = isDark ? "rgba(0,0,0,0.4)" : "rgba(255,255,255,0.5)";
    ctx.fillRect(width * 0.5, 0, width * 0.5, height);
    drawText(headline, rx, height * 0.35, fontHeading, headlineSize * 0.85, textColor, "center", mw, "800");
    drawText(tagline, rx, height * 0.55, fontBody, taglineSize, textColor, "center", mw, "400");
    drawText(brand, rx, height * 0.78, fontBody, brandSize, accentColor, "center", mw, "600");
  } else if (tpl === "magazine") {
    // Editorial: title top, line, subtitle below
    drawText(headline, cx, height * 0.28, fontHeading, headlineSize * 1.1, textColor, "center", width - pad * 2, "800");
    // Decorative line
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(width * 0.25, height * 0.46);
    ctx.lineTo(width * 0.75, height * 0.46);
    ctx.stroke();
    drawText(tagline, cx, height * 0.58, fontBody, taglineSize * 1.1, textColor, "center", width - pad * 2, "300");
    drawText("— " + brand + " —", cx, height * 0.82, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else if (tpl === "card-style") {
    // Floating card effect
    const cardPad = width * 0.1;
    const cardX = cardPad;
    const cardY = height * 0.15;
    const cardW = width - cardPad * 2;
    const cardH = height * 0.7;
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.25)";
    ctx.shadowBlur = 30;
    ctx.fillStyle = isDark ? "rgba(30,30,50,0.85)" : "rgba(255,255,255,0.88)";
    ctx.beginPath();
    ctx.roundRect(cardX, cardY, cardW, cardH, 20);
    ctx.fill();
    ctx.restore();
    drawText(headline, cx, cardY + cardH * 0.35, fontHeading, headlineSize * 0.9, textColor, "center", cardW - 40, "800");
    drawText(tagline, cx, cardY + cardH * 0.58, fontBody, taglineSize, textColor, "center", cardW - 40, "400");
    drawText(brand, cx, cardY + cardH * 0.8, fontBody, brandSize, accentColor, "center", cardW - 40, "600");
  } else if (tpl === "gradient-big") {
    // Huge title centered
    drawText(headline, cx, height * 0.38, fontHeading, headlineSize * 1.4, textColor, "center", width - pad, "900");
    drawText(tagline, cx, height * 0.6, fontBody, taglineSize * 1.1, textColor, "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.84, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else if (tpl === "duotone") {
    // Title top, subtitle bottom section
    drawText(headline, cx, height * 0.32, fontHeading, headlineSize, textColor, "center", width - pad * 2, "800");
    drawText(tagline, cx, height * 0.72, fontBody, taglineSize * 1.1, textColor, "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.92, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else if (tpl === "photo-overlay") {
    // Cinematic: gradient overlay at bottom, text in lower third
    const grad = ctx.createLinearGradient(0, height * 0.4, 0, height);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(0.5, "rgba(0,0,0,0.4)");
    grad.addColorStop(1, "rgba(0,0,0,0.85)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, height * 0.4, width, height * 0.6);
    drawText(headline, cx, height * 0.68, fontHeading, headlineSize, "#FFFFFF", "center", width - pad * 2, "800");
    drawText(tagline, cx, height * 0.82, fontBody, taglineSize, "rgba(255,255,255,0.85)", "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.94, fontBody, brandSize, "rgba(255,255,255,0.5)", "center", width - pad * 2, "500");
  } else if (tpl === "minimal-line") {
    // Clean minimal with accent line
    drawText(headline, cx, height * 0.35, fontHeading, headlineSize * 0.85, textColor, "center", width - pad * 2, "700");
    // Accent line
    ctx.strokeStyle = colors?.[2] || colors?.[0] || "#6366f1";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(width * 0.35, height * 0.48);
    ctx.lineTo(width * 0.65, height * 0.48);
    ctx.stroke();
    drawText(tagline, cx, height * 0.58, fontBody, taglineSize, textColor, "center", width - pad * 2, "300");
    drawText(brand, cx, height * 0.82, fontBody, brandSize, accentColor, "center", width - pad * 2, "500");
  } else {
    // Default: bold-center
    drawText(headline, cx, height * 0.38, fontHeading, headlineSize, textColor, "center", width - pad * 2, "800");
    drawText(tagline, cx, height * 0.58, fontBody, taglineSize, textColor, "center", width - pad * 2, "400");
    drawText(brand, cx, height * 0.82, fontBody, brandSize, accentColor, "center", width - pad * 2, "600");
  }

  return canvas.toDataURL("image/png");
}

// ─── Canvas compositing with custom positions (word-wrap enabled) ──
async function compositeGraphicCustom(bgDataUrl, layersArr, width, height) {
  // layersArr = [{text, font, size, weight, color, x, y, align}]
  const fonts = [...new Set(layersArr.map(l=>l.font).filter(Boolean))];
  await Promise.all(fonts.map(f=>loadGoogleFont(f)));

  const canvas = document.createElement("canvas");
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext("2d");

  const bgImg = new Image(); bgImg.src = bgDataUrl;
  await new Promise((res,rej)=>{bgImg.onload=res;bgImg.onerror=rej;});
  ctx.drawImage(bgImg,0,0,width,height);

  const sampleData = ctx.getImageData(Math.floor(width/4),Math.floor(height/2),Math.floor(width/2),10).data;
  let totalB=0;
  for(let i=0;i<sampleData.length;i+=4) totalB+=(sampleData[i]*0.299+sampleData[i+1]*0.587+sampleData[i+2]*0.114);
  const isDark = totalB/(sampleData.length/4)<128;
  const shadowColor = isDark?"rgba(0,0,0,0.7)":"rgba(255,255,255,0.7)";

  for(const layer of layersArr){
    if(!layer.text) continue;
    const {text, font, size, weight, color, x, y, align} = layer;
    ctx.save();
    ctx.font = (weight||"700")+" "+size+"px '"+font+"', sans-serif";
    ctx.textAlign = align||"center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = shadowColor;
    ctx.shadowBlur = Math.round(size*0.25);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = Math.round(size*0.05);
    ctx.fillStyle = color;
    // Word wrap
    const maxW = width*0.85;
    const words = text.split(" ");
    const lines = []; let cur = "";
    for(const w of words){
      const test = cur?cur+" "+w:w;
      if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else{cur=test;}
    }
    if(cur)lines.push(cur);
    const lh = size*1.15;
    const startY = y - (lines.length*lh)/2 + lh/2;
    for(let i=0;i<lines.length;i++) ctx.fillText(lines[i], x, startY+i*lh);
    ctx.restore();
  }
  return canvas.toDataURL("image/png");
}

// ─── Fetch tramite proxy CORS (con fallback multipli) ─────────
async function fetchViaProxy(targetUrl) {
  const proxies = [
    (u) => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
    (u) => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
    (u) => "https://corsproxy.io/?" + encodeURIComponent(u)
  ];
  for (const makeUrl of proxies) {
    try {
      const res = await fetch(makeUrl(targetUrl), { signal: AbortSignal.timeout(12000) });
      if (res.ok) return await res.text();
    } catch(e) { console.warn("Proxy failed, trying next..."); }
  }
  throw new Error("All proxies failed for " + targetUrl);
}

// ─── Scraping immagini dal sito web ────────────────────────────
async function scrapeWebsiteImages(url) {
  if (!url) return [];
  try {
    const fullUrl = url.startsWith("http") ? url : "https://" + url;
    const html = await fetchViaProxy(fullUrl);

    const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
    const bgRegex = /background(?:-image)?:\s*url\(["']?([^"')]+)["']?\)/gi;
    const ogRegex = /<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/gi;
    const srcsetRegex = /srcset=["']([^"']+)["']/gi;

    const images = new Set();
    let match;

    while ((match = ogRegex.exec(html)) !== null) images.add(match[1]);
    while ((match = imgRegex.exec(html)) !== null) {
      const src = match[1];
      if (src && !src.includes("data:") && !src.endsWith(".svg") && !src.includes("favicon") && !src.includes("icon") && !src.includes("pixel") && !src.includes("1x1") && !src.includes("tracking")) images.add(src);
    }
    while ((match = srcsetRegex.exec(html)) !== null) {
      const firstSrc = match[1].split(",")[0].trim().split(" ")[0];
      if (firstSrc && firstSrc.startsWith("http")) images.add(firstSrc);
    }
    while ((match = bgRegex.exec(html)) !== null) {
      const src = match[1];
      if (src && !src.includes("data:") && !src.endsWith(".svg")) images.add(src);
    }

    const baseUrl = new URL(fullUrl);
    const resolved = [...images].map(img => {
      try {
        if (img.startsWith("//")) return "https:" + img;
        if (img.startsWith("/")) return baseUrl.origin + img;
        if (!img.startsWith("http")) return baseUrl.origin + "/" + img;
        // Force HTTPS to avoid mixed content blocking
        return img.replace(/^http:\/\//i, "https://");
      } catch(e) { return img; }
    }).filter(img => img.startsWith("https://"));

    console.log("[SocialDash] Scraped", resolved.length, "images from", fullUrl);
    return resolved.slice(0, 20);
  } catch (e) {
    console.warn("Website scraping failed:", e.message);
    return [];
  }
}

// ─── Scraping immagini da Google Drive (cartelle pubbliche) ────
async function scrapeDriveImages(driveUrl) {
  if (!driveUrl) return [];
  try {
    const folderMatch = driveUrl.match(/folders\/([a-zA-Z0-9_-]+)/);
    if (!folderMatch) { console.warn("Not a Drive folder URL"); return []; }
    const folderId = folderMatch[1];

    // Use embeddedfolderview — renders file IDs in HTML (works for public folders)
    const embedUrl = "https://drive.google.com/embeddedfolderview?id=" + folderId;
    const html = await fetchViaProxy(embedUrl);

    // Extract all file IDs (25+ char alphanumeric strings unique to Drive)
    const idRegex = /[a-zA-Z0-9_-]{25,}/g;
    const allIds = new Set();
    let match;
    while ((match = idRegex.exec(html)) !== null) {
      const id = match[0];
      if (id !== folderId && !id.includes("____") && id.length < 50) allIds.add(id);
    }

    // Use thumbnail URLs (work without auth for public files, good quality)
    const imageUrls = [...allIds].map(id => "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000");
    console.log("[SocialDash] Found", imageUrls.length, "files in Drive folder");
    return imageUrls.slice(0, 30);
  } catch (e) {
    console.warn("Drive scraping failed:", e.message);
    return [];
  }
}

// Unsplash free search — returns array of image URLs
const _unsplashCache = {};
async function searchStockPhotos(query, count=12){
  const cacheKey=query+"_"+count;
  if(_unsplashCache[cacheKey]) return _unsplashCache[cacheKey];
  try{
    // Unsplash Source/API — free tier (50 req/hour)
    // Using the public search endpoint that returns HTML with image URLs
    const searchUrl=`https://unsplash.com/napi/search/photos?query=${encodeURIComponent(query)}&per_page=${count}&orientation=squarish`;
    const res=await fetch(searchUrl,{headers:{"Accept":"application/json"},signal:AbortSignal.timeout(8000)});
    if(!res.ok) throw new Error("Unsplash API error: "+res.status);
    const data=await res.json();
    const urls=(data.results||[]).map(r=>r.urls?.regular||r.urls?.small||"").filter(Boolean);
    if(urls.length>0){
      _unsplashCache[cacheKey]=urls;
      console.log("[StockPhotos] Found",urls.length,"photos for:",query);
      return urls;
    }
    return [];
  }catch(e){
    console.warn("[StockPhotos] Unsplash error:",e.message,". Trying Pexels fallback...");
    // Fallback: Pexels (no auth needed for embed URLs)
    try{
      const pxUrl=`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=${count}&size=medium`;
      // Pexels needs API key — use free demo key or direct image URLs
      // Alternative: use Lorem Picsum or direct Unsplash source URLs
      const directUrls=[];
      for(let i=0;i<Math.min(count,6);i++){
        directUrls.push(`https://source.unsplash.com/800x800/?${encodeURIComponent(query)}&sig=${Date.now()+i}`);
      }
      _unsplashCache[cacheKey]=directUrls;
      return directUrls;
    }catch(e2){return [];}
  }
}

    // read each file

      reader.onload=(ev)=>{
        nf.dataUrl=ev.target.result;
        if(i===newFiles.length-1) onChange([...files,...newFiles]);

      reader.readAsDataURL(nf.file);

// ─── Canva Design References Panel ──────────────────────────────
function CanvaToolsPanel({clientName,clientBrandKit}){
  const[expanded,setExpanded]=useState(true);
  const[activeRefs,setActiveRefs]=useState(()=>{
    // All designs active by default
    const clientKey=clientName.toLowerCase().trim();
    const designs=CANVA_DESIGNS_CACHE[clientKey]||[];
    return designs.map((_,i)=>i);
  });
  const[previewId,setPreviewId]=useState(null);

  const clientKey=clientName.toLowerCase().trim();
  const cachedDesigns=CANVA_DESIGNS_CACHE[clientKey]||[];

  // Store active refs globally so handleGenerateBackgrounds can filter
  useEffect(()=>{
    window.__canvaActiveRefs=window.__canvaActiveRefs||{};
    window.__canvaActiveRefs[clientKey]=activeRefs;
  },[activeRefs,clientKey]);

  const toggleRef=(idx)=>{
    setActiveRefs(prev=>prev.includes(idx)?prev.filter(i=>i!==idx):[...prev,idx]);
  };
  const allActive=activeRefs.length===cachedDesigns.length;
  const toggleAll=()=>{
    if(allActive) setActiveRefs([]);
    else setActiveRefs(cachedDesigns.map((_,i)=>i));
  };

  const[showLinkPopup,setShowLinkPopup]=useState(false);
  const[linkInput,setLinkInput]=useState("");
  const[titleInput,setTitleInput]=useState("");
  const[addingLink,setAddingLink]=useState(false);

  const handleAddCanvaLink=()=>{
    if(!linkInput.trim()) return;
    setAddingLink(true);
    const url=linkInput.trim();
    // Extract design ID from Canva URL (e.g. canva.com/design/DAGxxxx/... or canva.com/d/xxxx)
    let designId="custom_"+Date.now();
    const mDesign=url.match(/\/design\/([A-Za-z0-9_-]+)/);
    const mShort=url.match(/canva\.com\/d\/([A-Za-z0-9_-]+)/);
    if(mDesign) designId=mDesign[1];
    else if(mShort) designId=mShort[1];
    const title=titleInput.trim()||("Design "+designId.substring(0,8));
    const newDesign={id:designId,title:title,thumb:"",view:url,pages:1};
    // Add to CANVA_DESIGNS_CACHE dynamically
    if(!CANVA_DESIGNS_CACHE[clientKey]) CANVA_DESIGNS_CACHE[clientKey]=[];
    CANVA_DESIGNS_CACHE[clientKey].push(newDesign);
    // Save dynamic cache to persistence
    saveData("canvaDesignsCache",CANVA_DESIGNS_CACHE);
    setActiveRefs(prev=>[...prev,CANVA_DESIGNS_CACHE[clientKey].length-1]);
    setLinkInput("");
    setTitleInput("");
    setShowLinkPopup(false);
    setAddingLink(false);
  };

  const linkPopupModal=showLinkPopup&&(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowLinkPopup(false)}>
      <div style={{background:"#fff",borderRadius:16,padding:24,width:380,maxWidth:"90vw",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:"#1e293b"}}>Collega design Canva</h3>
        <p style={{margin:"0 0 16px",fontSize:12,color:"#94a3b8"}}>Incolla il link del design Canva da collegare a <strong style={{color:"#5c4db7"}}>{clientName}</strong></p>
        <label style={{fontSize:11,fontWeight:600,color:"#475569",display:"block",marginBottom:4}}>Link Canva *</label>
        <input type="text" placeholder="https://www.canva.com/design/DAGxx..." value={linkInput} onChange={e=>setLinkInput(e.target.value)}
          style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #e2e8f0",fontSize:13,marginBottom:12,outline:"none"}}
          onFocus={e=>e.target.style.borderColor="#6366f1"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}
          onKeyDown={e=>{if(e.key==="Enter"&&linkInput.trim()) handleAddCanvaLink();}}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
          <button onClick={()=>setShowLinkPopup(false)}
            style={{padding:"8px 16px",borderRadius:8,background:"#f1f5f9",color:"#64748b",border:"none",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            Annulla
          </button>
          <button onClick={handleAddCanvaLink} disabled={!linkInput.trim()||addingLink}
            style={{padding:"8px 20px",borderRadius:8,background:linkInput.trim()?"linear-gradient(135deg,#7d2ae8,#00c4cc)":"#e2e8f0",
              color:linkInput.trim()?"#fff":"#94a3b8",border:"none",fontSize:12,fontWeight:700,cursor:linkInput.trim()?"pointer":"not-allowed"}}>
            {addingLink?"Aggiunta...":"Collega design"}
          </button>
        </div>
      </div>
    </div>
  );

  if(cachedDesigns.length===0) return(
    <div style={{marginTop:20,borderTop:"1px solid #e2e8f0",paddingTop:16}}>
      {linkPopupModal}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
        <div style={{width:22,height:22,borderRadius:6,background:"linear-gradient(135deg,#7d2ae8,#00c4cc)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{color:"#fff",fontSize:12,fontWeight:800}}>C</span>
        </div>
        <h4 style={{margin:0,fontSize:12,fontWeight:700,color:"#64748b",letterSpacing:"0.5px",textTransform:"uppercase"}}>Riferimenti Canva</h4>
      </div>
      <div style={{textAlign:"center",padding:"16px 8px",background:"#f8fafc",borderRadius:12,border:"1px dashed #cbd5e1"}}>
        <div style={{fontSize:20,marginBottom:6}}>🎨</div>
        <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.4,marginBottom:10}}>Nessun design Canva<br/>collegato a <strong style={{color:"#64748b"}}>{clientName}</strong></div>
        <button onClick={()=>setShowLinkPopup(true)} style={{padding:"8px 16px",borderRadius:8,background:"linear-gradient(135deg,#7d2ae8,#00c4cc)",color:"#fff",border:"none",fontSize:11,fontWeight:700,cursor:"pointer",transition:"transform .12s"}}
          onMouseOver={e=>e.currentTarget.style.transform="scale(1.05)"}
          onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
          Incolla link Canva
        </button>
      </div>
    </div>
  );

  return(
    <div style={{marginTop:20,borderTop:"1px solid #e2e8f0",paddingTop:16}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,cursor:"pointer"}} onClick={()=>setExpanded(!expanded)}>
        <div style={{width:22,height:22,borderRadius:6,background:"linear-gradient(135deg,#7d2ae8,#00c4cc)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{color:"#fff",fontSize:12,fontWeight:800}}>C</span>
        </div>
        <h4 style={{margin:0,fontSize:12,fontWeight:700,color:"#64748b",letterSpacing:"0.5px",textTransform:"uppercase",flex:1}}>Riferimenti Canva</h4>
        <span style={{background:"#6366f1",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:10}}>
          {activeRefs.length}/{cachedDesigns.length}
        </span>
        <span style={{fontSize:10,color:"#94a3b8"}}>{expanded?"▲":"▼"}</span>
      </div>

      {expanded&&<div>
        {/* Toggle all */}
        <button onClick={toggleAll}
          style={{width:"100%",padding:"5px 10px",marginBottom:8,background:allActive?"#eef2ff":"#fff",
            border:"1px solid "+(allActive?"#6366f1":"#e2e8f0"),borderRadius:8,fontSize:10,fontWeight:600,
            color:allActive?"#6366f1":"#94a3b8",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:14,height:14,borderRadius:4,border:"2px solid "+(allActive?"#6366f1":"#cbd5e1"),
            background:allActive?"#6366f1":"transparent",display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:9,color:"#fff",fontWeight:800,flexShrink:0}}>{allActive?"✓":""}</span>
          {allActive?"Tutti attivi come riferimento":"Attiva tutti come riferimento"}
        </button>

        {/* Design Grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:8}}>
          {cachedDesigns.map((d,i)=>{
            const isActive=activeRefs.includes(i);
            const isPreviewing=previewId===i;
            return(
              <div key={d.id} style={{borderRadius:10,overflow:"hidden",
                border:isActive?"2px solid #6366f1":"2px solid #e2e8f0",
                opacity:isActive?1:0.55,transition:"all .2s",position:"relative",
                background:"#f8fafc"}}>
                {/* Thumbnail */}
                <div style={{position:"relative",cursor:"pointer"}} onClick={()=>toggleRef(i)}>
                  <img src={d.thumb} style={{width:"100%",height:80,objectFit:"cover",display:"block"}}
                    onError={e=>{e.target.style.display="none";e.target.parentElement.style.minHeight="80px";e.target.parentElement.style.background="#e2e8f0";}}/>
                  {/* Active badge */}
                  <div style={{position:"absolute",top:4,left:4,width:18,height:18,borderRadius:5,
                    background:isActive?"#6366f1":"rgba(255,255,255,0.85)",border:isActive?"none":"1.5px solid #cbd5e1",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:10,color:isActive?"#fff":"transparent",fontWeight:800,
                    boxShadow:"0 1px 3px rgba(0,0,0,0.15)"}}>
                    {isActive?"✓":""}
                  </div>
                  {/* Pages badge */}
                  {d.pages>1&&<span style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",
                    color:"#fff",fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:4}}>
                    {d.pages}p
                  </span>}
                  {/* Active glow */}
                  {isActive&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:3,
                    background:"linear-gradient(90deg,#6366f1,#a78bfa)"}}/>}
                </div>
                {/* Title + actions */}
                <div style={{padding:"4px 5px",display:"flex",alignItems:"center",gap:3}}>
                  <div style={{flex:1,fontSize:8,fontWeight:600,color:isActive?"#4338ca":"#94a3b8",
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {d.title}
                  </div>
                  {d.view&&<a href={d.view} target="_blank" rel="noopener"
                    onClick={e=>e.stopPropagation()}
                    style={{width:18,height:18,borderRadius:4,background:"#f1f5f9",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:9,color:"#64748b",textDecoration:"none",flexShrink:0}}
                    title="Apri in Canva">↗</a>}
                </div>
              </div>
            );
          })}
        </div>

        {/* Add link button */}
        <button onClick={()=>setShowLinkPopup(true)}
          style={{width:"100%",padding:"6px 10px",marginBottom:8,background:"#fff",border:"1px dashed #6366f1",borderRadius:8,
            fontSize:10,fontWeight:600,color:"#6366f1",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
          <span style={{fontSize:14,lineHeight:1}}>+</span> Aggiungi link Canva
        </button>

        {/* Status bar */}
        <div style={{background:activeRefs.length>0?"#eef2ff":"#fef2f2",borderRadius:8,padding:"6px 10px",
          display:"flex",alignItems:"center",gap:6,fontSize:10,fontWeight:600,
          color:activeRefs.length>0?"#4338ca":"#dc2626"}}>
          <span style={{fontSize:14}}>{activeRefs.length>0?"🎯":"⚠️"}</span>
          {activeRefs.length>0
            ?<span>{activeRefs.length} design usati come riferimento per Gemini</span>
            :<span>Nessun riferimento attivo — Gemini genererà senza stile Canva</span>}
        </div>
      </div>}
      {linkPopupModal}
    </div>
  );
}

function SocialDashboard(){
  // ── State: start with localStorage (fast, sync) — then async-merge full data from IndexedDB ──
  const[clients,setClients]=useState(()=>mergeSeedClients(loadData("clients",[])));
  const[activeClientId,setActiveClientId]=useState(()=>loadData("activeClientId",null));
  const[posts,setPosts]=useState(()=>loadData("posts",[]));
  const[view,setView]=useState("clients");
  const[selectedPost,setSelectedPost]=useState(null);
  const[showNewClient,setShowNewClient]=useState(false);
  const[searchQuery,setSearchQuery]=useState("");
  const[genConfig,setGenConfig]=useState({postCount:5});
  const[copyMsg,setCopyMsg]=useState("");
  const[geminiKey,setGeminiKey]=useState(()=>loadData("geminiKey",""));
  const[canvaToken,setCanvaToken]=useState(()=>loadData("canvaToken",""));
  const[canvaBrandKitsDyn,setCanvaBrandKitsDyn]=useState(()=>{
    try{localStorage.removeItem("social_dash_canvaBrandKitsDyn");localStorage.removeItem("social_dash_canvaBrandKitsFetched");}catch(e){}
    return CANVA_BRAND_KITS;
  });
  const[canvaLoading,setCanvaLoading]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[showUserArea,setShowUserArea]=useState(false);
  const[currentUser,setCurrentUser]=useState(()=>loadData("currentUser","Chiara"));
  const[saveError,setSaveError]=useState(null);
  const[appReady,setAppReady]=useState(false);

  // ── ASYNC RECOVERY: IndexedDB is the source of truth (has full logos/files) ──
  const saveEnabledRef=useRef(false);
  useEffect(()=>{
    recoverFromBackup().then(recovered=>{
      if(recovered){
        if(recovered.clients){
          const merged=mergeSeedClients(recovered.clients);
          setClients(merged);
          console.log("[SocialDash] Loaded",merged.length,"clients from IndexedDB (with logos)");
        }
        if(recovered.posts&&recovered.posts.length>0) setPosts(recovered.posts);
        if(recovered.geminiKey) setGeminiKey(recovered.geminiKey);
        if(recovered.canvaToken) setCanvaToken(recovered.canvaToken);
        if(recovered.activeClientId) setActiveClientId(recovered.activeClientId);
      }
      // Enable saves AFTER all state is settled
      setTimeout(()=>{saveEnabledRef.current=true;setAppReady(true);},250);
    }).catch(()=>{saveEnabledRef.current=true;setAppReady(true);});
  },[]);

  // ── AUTO-SAVE: saves to IndexedDB (full) + localStorage (slim, no base64) ──
  useEffect(()=>{
    if(!saveEnabledRef.current&&clients.length===0) return;
    saveEnabledRef.current=true;
    window._socialDashSaveError=false;
    saveData("clients",clients);
    if(window._socialDashSaveError){
      setSaveError("Spazio localStorage limitato — dati salvati in IndexedDB. Scarica un backup per sicurezza.");
      setTimeout(()=>setSaveError(null),6000);
    } else { setSaveError(null); }
  },[clients]);
  useEffect(()=>{
    if(!saveEnabledRef.current&&posts.length===0) return;
    saveData("posts",posts);
  },[posts]);
  useEffect(()=>{saveData("activeClientId",activeClientId);},[activeClientId]);
  useEffect(()=>{saveData("geminiKey",geminiKey);},[geminiKey]);
  useEffect(()=>{saveData("canvaToken",canvaToken);},[canvaToken]);
  useEffect(()=>{saveData("currentUser",currentUser);},[currentUser]);
  useEffect(()=>{saveData("canvaBrandKitsFetched",canvaBrandKitsDyn);},[canvaBrandKitsDyn]);

  // ── AUTO-FETCH brand kit fonts from Canva API + load from IndexedDB cache ──
  const[bkFontsCacheVer,setBkFontsCacheVer]=useState(0);
  useEffect(()=>{
    if(!appReady) return;
    // Always try to load cached fonts from IndexedDB (works without token)
    _idbLoad("bkFontsCache").then(cached=>{
      if(cached&&typeof cached==="object"&&Object.keys(cached).length>0){
        _bkFontsCache={..._bkFontsCache,...cached};
        setBkFontsCacheVer(v=>v+1);
        console.log("[BKFonts] Loaded",Object.keys(cached).length,"fonts from IndexedDB cache");
      }
    }).catch(()=>{});
    // If canvaToken available, also fetch fresh data from API
    if(canvaToken){
      fetchAllBrandKitFonts(clients,canvaBrandKitsDyn,canvaToken).then(()=>{
        setBkFontsCacheVer(v=>v+1);
        console.log("[SocialDash] Brand kit fonts cache ready from API");
      });
    } else {
      console.log("[BKFonts] No Canva token — using fallback fonts. Enter token in settings for auto-detection.");
    }
  },[appReady,canvaToken,canvaBrandKitsDyn]);

  const refreshCanvaBrandKits=async()=>{
    if(!canvaToken){alert("Inserisci il Canva Access Token nelle impostazioni (icona ingranaggio).");return;}
    setCanvaLoading(true);
    try{
      let allKits=[];
      let continuation=null;
      do{
        const url="https://api.canva.com/rest/v1/brand-kits"+(continuation?"?continuation="+encodeURIComponent(continuation):"");
        const res=await fetch(url,{headers:{"Authorization":"Bearer "+canvaToken}});
        if(!res.ok){const err=await res.text();throw new Error("Canva API error "+res.status+": "+err);}
        const data=await res.json();
        if(data.items)allKits=allKits.concat(data.items);
        continuation=data.continuation||null;
      }while(continuation);
      const mapped=[{id:"",name:"— Nessuno —",thumb:""},...allKits.map(bk=>({id:bk.id,name:bk.name,thumb:bk.thumbnail?.url||""}))];
      setCanvaBrandKitsDyn(mapped);
      console.log("[SocialDash] Canva brand kits refreshed:",mapped.length-1,"kits");
    }catch(e){
      console.error("[SocialDash] Canva refresh error:",e);
      alert("Errore aggiornamento Canva: "+e.message+"\n\nVerifica il token nelle impostazioni.");
    }finally{setCanvaLoading(false);}
  };

  // Always start on homepage

  const activeClient=clients.find(c=>c.id===activeClientId);

  const addClient=(client)=>{const nc={...client,id:genId()};setClients(p=>[...p,nc]);setActiveClientId(nc.id);setShowNewClient(false);setView("generate");};
  const updateClient=(id,updates)=>{setClients(p=>p.map(c=>c.id===id?{...c,...updates}:c));};
  const deleteClient=(id)=>{setClients(p=>p.filter(c=>c.id!==id));setPosts(p=>p.filter(pp=>pp.clientId!==id));if(activeClientId===id){setActiveClientId(clients.length>1?clients.find(c=>c.id!==id)?.id:null);setView("clients");}};

  const[isGenerating,setIsGenerating]=useState(false);
  const[scrapingResult,setScrapingResult]=useState("");
  const generatePosts=async(customThemes, graphicStyle, templatePrompt)=>{
    if(!activeClient)return;
    setIsGenerating(true);

    // ── 1. FETCH BRAND KIT FONTS on-demand if not cached ──
    if(activeClient.canvaBrandKit&&canvaToken&&!_bkFontsCache[activeClient.canvaBrandKit]){
      console.log("[SocialDash] Fetching brand kit fonts for",activeClient.name,"...");
      const fonts=await _fetchBkFonts(activeClient.canvaBrandKit,canvaToken);
      if(fonts){
        _bkFontsCache[activeClient.canvaBrandKit]=fonts;
        _idbSave("bkFontsCache",_bkFontsCache);
        console.log("[SocialDash] Fetched fonts:",fonts.h,"/",fonts.b);
      }
    }

    // ── 2. COPY — Use built-in CONTENT_ANGLES as primary (Claude-written) ──
    // Gemini AI copy is available as optional enhancement but NOT the default
    const count=customThemes&&customThemes.length>0?customThemes.length:(genConfig.postCount||5);
    let aiIdeas=null;
    // Only use Gemini if user explicitly enabled it in settings AND has API key
    if(geminiKey&&genConfig.useGeminiCopy&&!customThemes){
      console.log("[SocialDash] Generating AI copy for",activeClient.name,"(",count,"posts)...");
      aiIdeas=await generateAICopyIdeas(geminiKey,activeClient,count);
    }

    // ── 3. Scrape images from client website if available ──
    let scrapedImages=[];
    const websiteUrl=activeClient.website;
    if(websiteUrl){
      if(scrapedImagesCache[activeClient.id+"_site"]){
        scrapedImages=scrapedImagesCache[activeClient.id+"_site"];
      } else {
        try{
          scrapedImages=await scrapeWebsiteImages(websiteUrl);
          scrapedImagesCache[activeClient.id+"_site"]=scrapedImages;
        }catch(e){console.warn("Website scraping error:",e);}
      }
    }

    // Scrape images from Google Drive folder if available
    let driveImages=[];
    const driveUrl=activeClient.driveFolder;
    if(driveUrl){
      if(scrapedImagesCache[activeClient.id+"_drive"]){
        driveImages=scrapedImagesCache[activeClient.id+"_drive"];
      } else {
        try{
          driveImages=await scrapeDriveImages(driveUrl);
          scrapedImagesCache[activeClient.id+"_drive"]=driveImages;
        }catch(e){console.warn("Drive scraping error:",e);}
      }
    }

    // Also collect uploaded client images
    const clientImages=(activeClient.files||[]).filter(f=>f.type?.startsWith("image/")).map(f=>f.dataUrl).filter(Boolean);
    let allImages=[...clientImages,...driveImages,...scrapedImages];

    // ── 3b. STOCK PHOTOS FALLBACK — if client has no images, search Unsplash ──
    let stockPhotos=[];
    if(allImages.length===0){
      console.log("[SocialDash] No client images found — searching stock photos for sector:",activeClient.sector);
      setScrapingResult("Cerco foto stock per "+activeClient.name+"...");
      const queries=getStockPhotoQueries(activeClient);
      // Search with first 2 queries to get variety
      for(const q of queries.slice(0,2)){
        try{
          const photos=await searchStockPhotos(q,8);
          stockPhotos.push(...photos);
        }catch(e){console.warn("[StockPhotos] Error:",e);}
      }
      if(stockPhotos.length>0){
        // Remove duplicates
        stockPhotos=[...new Set(stockPhotos)];
        scrapedImagesCache[activeClient.id+"_stock"]=stockPhotos;
        allImages=[...stockPhotos];
        console.log("[SocialDash] Found",stockPhotos.length,"stock photos for",activeClient.name);
      }
    }

    console.log("[SocialDash] Website images:",scrapedImages.length,"Drive images:",driveImages.length,"Uploaded:",clientImages.length,"Stock photos:",stockPhotos.length,"Total:",allImages.length);

    // ── 4. Generate posts (with AI copy if available) ──
    const np=[];const sd=new Date();
    usedIdeasMap[activeClient.id]=[];
    for(let i=0;i<count;i++){
      const dt=new Date(sd);dt.setDate(dt.getDate()+i);const ds=dt.toISOString().split("T")[0];

      let customTheme=customThemes&&customThemes[i]?customThemes[i]:null;
      // If AI generated ideas, inject them as custom themes
      if(!customTheme&&aiIdeas&&aiIdeas[i]){
        customTheme=null; // Let generatePost use aiIdeas directly
      }

      const post=generatePost(activeClient,ds,i,customTheme,graphicStyle,templatePrompt,aiIdeas?aiIdeas[i]:null);
      // Assign a scraped/uploaded image to this post
      if(allImages.length>0){
        post.scrapedImage=allImages[i%allImages.length];
      }
      np.push(post);
    }
    setPosts(p=>[...p.filter(pp=>pp.clientId!==activeClient.id),...np]);
    setIsGenerating(false);
    const parts=[];
    if(scrapedImages.length>0) parts.push(scrapedImages.length+" dal sito");
    if(driveImages.length>0) parts.push(driveImages.length+" da Drive");
    if(clientImages.length>0) parts.push(clientImages.length+" caricate");
    if(aiIdeas) parts.push("copy AI personalizzato");
    if(parts.length>0){
      setScrapingResult((aiIdeas?"✨ Copy generato con AI per "+activeClient.name+". ":"")+(scrapedImages.length+driveImages.length+clientImages.length>0?"Immagini: "+[scrapedImages.length>0?scrapedImages.length+" dal sito":"",driveImages.length>0?driveImages.length+" da Drive":"",clientImages.length>0?clientImages.length+" caricate":""].filter(Boolean).join(", "):""));
    } else if(websiteUrl||driveUrl){
      setScrapingResult("Non sono riuscito a recuperare immagini. Assicurati che il sito sia online e la cartella Drive sia condivisa pubblicamente.");
    }
    setTimeout(()=>setScrapingResult(""),6000);
  };
  const updatePost=(pid,upd)=>{setPosts(p=>p.map(pp=>pp.id===pid?{...pp,...upd}:pp));};
  const deletePost=(pid)=>{setPosts(p=>p.filter(pp=>pp.id!==pid));if(selectedPost?.id===pid)setSelectedPost(null);};

  const clientPosts=useMemo(()=>posts.filter(p=>p.clientId===activeClientId),[posts,activeClientId]);
  const stats=useMemo(()=>{const cp=clientPosts;return{total:cp.length,bozze:cp.filter(p=>p.status==="bozza").length,approvati:cp.filter(p=>p.status==="approvato").length,pubblicati:cp.filter(p=>p.status==="pubblicato").length};},[clientPosts]);

  const copyToClipboard=(text)=>{navigator.clipboard.writeText(text).then(()=>{setCopyMsg("Copiato!");setTimeout(()=>setCopyMsg(""),1500);});};

  const labelStyle={display:"block",fontSize:12,fontWeight:600,color:"#64748b",marginBottom:6};
  const inputStyle={width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:16};

  // ── Loading screen while IndexedDB loads full data ──
  if(!appReady){
    return(<div style={{width:"100vw",height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#f0eef9,#faf5ff)",gap:16}}>
      <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#5c4db7,#7c5cbf)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(92,77,183,.3)"}}><Icons.Sparkles size={26} color="#fff"/></div>
      <div className="spinner" style={{marginTop:8}}/>
      <p style={{fontSize:13,color:"#64748b",fontWeight:500}}>Caricamento dati...</p>
    </div>);
  }

  return(
    <div className="dashboard-container">
      {copyMsg&&<div style={{position:"fixed",top:20,right:20,background:"#10b981",color:"#fff",padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>{copyMsg}</div>}
      {saveError&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#fef2f2",color:"#991b1b",padding:"10px 20px",borderRadius:10,fontSize:12,fontWeight:600,zIndex:999,boxShadow:"0 4px 16px rgba(0,0,0,.15)",border:"1px solid #fecaca",maxWidth:400,textAlign:"center"}}>{saveError}</div>}

      {/* ──── LEFT SIDEBAR (NAVIGATION) ──── */}
      <NavSidebar view={view} onViewChange={setView} onToggleSettings={()=>setShowSettings(!showSettings)} showSettings={showSettings} activeClient={activeClient}/>

      {/* ──── MAIN CONTENT AREA ──── */}
      <div className="main-content">
        {/* Header with logo and settings */}
        <div className="content-header">
          <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>{setView("clients");setShowNewClient(false);}}>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#5c4db7,#7c5cbf)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(92,77,183,.3)"}}><Icons.Sparkles size={20} color="#fff"/></div>
            <div><h1 style={{margin:0,fontSize:18,fontWeight:700,color:"#1e293b"}}>Social Post Generator</h1><p style={{margin:0,fontSize:12,color:"#94a3b8"}}>Dashboard multi-cliente</p></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setShowSettings(!showSettings)} style={{width:36,height:36,borderRadius:8,border:"none",background:showSettings?"#e2e8f0":"#f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="#e2e8f0"} onMouseLeave={e=>{if(!showSettings)e.currentTarget.style.background="#f1f5f9";}}>
              <Icons.Settings size={18} color={showSettings?"#5c4db7":"#64748b"}/>
            </button>
            <button onClick={()=>setShowUserArea(!showUserArea)} style={{width:36,height:36,borderRadius:10,background:showUserArea?"linear-gradient(135deg,#4338ca,#7c3aed)":"linear-gradient(135deg,#5c4db7,#9b6fc6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700,boxShadow:"0 2px 8px rgba(92,77,183,.25)",border:"none",cursor:"pointer",transition:"all .2s"}}>{(currentUser||"U")[0].toUpperCase()}</button>
          </div>
        </div>

        {/* Settings Panel */}
        {showSettings&&<div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"16px 24px"}}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{flex:1}}>
              <label style={{...labelStyle,marginBottom:4}}>API Key Google Gemini (per generare immagini)</label>
              <div style={{display:"flex",gap:8}}>
                <input type="password" placeholder="Incolla qui la tua API key..." value={geminiKey} onChange={e=>setGeminiKey(e.target.value)} style={{...inputStyle,marginBottom:0,flex:1}}/>
                {geminiKey&&<Badge color="#10b981" style={{alignSelf:"center",padding:"6px 12px"}}>Connesso</Badge>}
              </div>
              <p style={{fontSize:11,color:"#94a3b8",marginTop:4}}>Ottienila gratis su <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"#6366f1"}}>aistudio.google.com</a></p>
            </div>
            {/* Backup / Ripristino */}
            <div style={{borderTop:"1px solid #e2e8f0",paddingTop:16}}>
              <label style={{...labelStyle,marginBottom:8}}>Backup & Ripristino dati</label>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>{
                  const data={clients,posts,geminiKey,canvaToken,activeClientId,ts:new Date().toISOString()};
                  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
                  a.download="social_dash_backup_"+(new Date().toISOString().split("T")[0])+".json";
                  a.click();URL.revokeObjectURL(a.href);
                }} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #6366f1",background:"#eef2ff",color:"#6366f1",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  <Icons.Download size={14}/> Esporta backup
                </button>
                <label style={{padding:"8px 16px",borderRadius:8,border:"1px solid #10b981",background:"#ecfdf5",color:"#059669",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  <Icons.Upload size={14}/> Importa backup
                  <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                    const f=e.target.files?.[0];if(!f)return;
                    const reader=new FileReader();
                    reader.onload=ev=>{
                      try{
                        const data=JSON.parse(ev.target.result);
                        if(data.clients){setClients(data.clients);}
                        if(data.posts){setPosts(data.posts);}
                        if(data.geminiKey){setGeminiKey(data.geminiKey);}
                        if(data.canvaToken){setCanvaToken(data.canvaToken);}
                        if(data.activeClientId){setActiveClientId(data.activeClientId);}
                        alert("Backup ripristinato con successo! "+((data.clients||[]).length)+" clienti e "+((data.posts||[]).length)+" post caricati.");
                      }catch(err){alert("Errore nel file di backup: "+err.message);}
                    };
                    reader.readAsText(f);e.target.value="";
                  }}/>
                </label>
              </div>
              <p style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Esporta i dati prima di aggiornare il file. Importa il backup dopo per recuperare clienti e post.</p>
            </div>
          </div>
        </div>}

        {/* User Area Panel */}
        {showUserArea&&(()=>{
          const userTeam=getTeamForUser(currentUser);
          const myClients=clients.filter(c=>(c.graphicDesigner||"").toLowerCase()===(currentUser||"").toLowerCase());
          return <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"24px 28px"}}>
            {/* Header row: avatar + name + user selector */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#5c4db7,#9b6fc6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,fontWeight:700,boxShadow:"0 4px 12px rgba(92,77,183,.25)"}}>{(currentUser||"U")[0].toUpperCase()}</div>
                <div>
                  <h3 style={{margin:0,fontSize:18,fontWeight:700,color:"#1e293b"}}>Area Personale</h3>
                  <p style={{margin:0,fontSize:12,color:"#94a3b8"}}>Il tuo spazio di lavoro</p>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <select value={currentUser} onChange={e=>setCurrentUser(e.target.value)} style={{padding:"8px 14px",borderRadius:10,border:"1px solid #e2e8f0",fontSize:13,fontWeight:600,color:"#5c4db7",background:"#f8fafc",cursor:"pointer"}}>
                  {GRAPHIC_DESIGNERS.filter(g=>g!=="Non assegnato").map(g=><option key={g} value={g}>{g}</option>)}
                </select>
                <button onClick={()=>setShowUserArea(false)} style={{padding:"8px 16px",borderRadius:10,border:"1px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background="#eef2ff";e.currentTarget.style.color="#5c4db7";e.currentTarget.style.borderColor="#c7d2fe";}} onMouseLeave={e=>{e.currentTarget.style.background="#f8fafc";e.currentTarget.style.color="#64748b";e.currentTarget.style.borderColor="#e2e8f0";}}>
                  <Icons.ChevLeft size={14}/> Dashboard
                </button>
              </div>
            </div>

            {/* ── 1. Nome Grafica ── */}
            <div style={{background:"#f8fafc",borderRadius:14,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:12}}>
              <p style={{margin:0,fontSize:11,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Nome Grafica</p>
              <p style={{margin:0,fontSize:20,fontWeight:700,color:"#1e293b"}}>{currentUser}</p>
            </div>

            {/* ── 2. Clienti assegnati ── */}
            <div style={{background:"#f8fafc",borderRadius:14,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:12}}>
              <p style={{margin:0,fontSize:11,color:"#94a3b8",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Clienti assegnati</p>
              {myClients.length===0
                ?<p style={{margin:0,fontSize:13,color:"#94a3b8",fontStyle:"italic"}}>Nessun cliente assegnato a {currentUser}</p>
