     prompt:"Layout: CINEMATIC PHOTO OVERLAY — the attached photo (or a stunning relevant photo) fills the ENTIRE canvas edge-to-edge as the background. Apply a cinematic gradient overlay: dark at bottom fading to transparent at top (like a movie poster). The headline is large, bold, white, positioned in the lower-third area with a subtle text shadow or glow. Tagline below in lighter weight. Brand name small at bottom-corner. The photo should be clearly visible and beautiful — the overlay only darkens enough for text readability. Add a subtle lens flare, light leak, or vignette effect for a professional photography feel. Think National Geographic meets Instagram luxury brand."},
    {id:"minimal-line",name:"Minimal con accento",desc:"Sfondo bianco, una linea di accento colorata, testo pulito.",
     preview:{bg:"#fff",elements:[{type:"rect",x:"0",y:"45%",w:"30%",h:"3px",fill:"#6366f1"},{type:"text",text:"TITOLO",x:"50%",y:"35%",size:18,bold:true,color:"#1e293b"},{type:"text",text:"Sottotitolo pulito",x:"50%",y:"58%",size:11,color:"#64748b"},{type:"text",text:"Brand",x:"50%",y:"80%",size:9,color:"#94a3b8"}]},
     prompt:"Layout: MINIMAL LUXE — pristine white or very light background. A single elegant accent element in brand color: a vertical bar on the left, a thin underline below the title, or a corner accent shape. Headline in medium-weight, well-kerned type — elegant, not loud. Tagline in soft gray, generous spacing. Brand name very subtle at bottom. Lots of intentional white space. Add ONE sophisticated detail: a small icon, a thin border, or a subtle watermark pattern. This should feel like Apple or Aesop branding — minimal but expensive-looking. Scandinavian design meets luxury fashion."}
  ];

  const toggleGallerySelect=(idx)=>{
    setSelectedGalleryIdxs(prev=>{
      const next=new Set(prev);
      if(next.has(idx)) next.delete(idx); else next.add(idx);
      return next;
    });
  };

  // When selection changes, pre-convert selected images to base64 for Gemini
  useEffect(()=>{
    if(selectedGalleryIdxs.size===0){
      window.__selectedGalleryBase64=[];
      return;
    }
    let cancelled=false;
    const convert=async()=>{
      setConvertingSelected(true);
      const results=[];
      for(const idx of selectedGalleryIdxs){
        if(cancelled)break;
        const img=galleryImages[idx];
        if(!img)continue;
        try{
          const b64=await imageUrlToBase64(img.url);
          if(b64) results.push(b64);
        }catch(e){}
      }
      if(!cancelled){
        window.__selectedGalleryBase64=results;
        setConvertingSelected(false);
        console.log("[SocialDash] Converted",results.length,"selected gallery images to base64");
      }
    };
    convert();
    return()=>{cancelled=true;};
  },[selectedGalleryIdxs,galleryImages]);

  // Auto-load gallery images when client opens
  useEffect(()=>{
    if(!activeClient||galleryLoaded===activeClient.id)return;
    let cancelled=false;
    const loadGallery=async()=>{
      setGalleryLoading(true);
      const imgs=[];

      // 1. Uploaded client images
      (activeClient.files||[]).filter(f=>f.type?.startsWith("image/")&&f.dataUrl).forEach(f=>imgs.push({url:f.dataUrl,source:"upload",name:f.name}));

      // 2. Scrape from website
      if(activeClient.website){
        try{
          const cacheKey=activeClient.id+"_site";
          let siteImgs=scrapedImagesCache[cacheKey];
          if(!siteImgs){siteImgs=await scrapeWebsiteImages(activeClient.website);scrapedImagesCache[cacheKey]=siteImgs;}
          siteImgs.forEach(u=>imgs.push({url:u,source:"website"}));
        }catch(e){}
      }

      // 3. Scrape from Drive
      if(activeClient.driveFolder){
        try{
          const cacheKey=activeClient.id+"_drive";
          let driveImgs=scrapedImagesCache[cacheKey];
          if(!driveImgs){driveImgs=await scrapeDriveImages(activeClient.driveFolder);scrapedImagesCache[cacheKey]=driveImgs;}
          driveImgs.forEach(u=>imgs.push({url:u,source:"drive"}));
        }catch(e){}
      }

      if(!cancelled){
        setGalleryImages(imgs);
        setGalleryLoaded(activeClient.id);
        console.log("[SocialDash] Gallery loaded:",imgs.length,"images for",activeClient.name);

        // Pre-convert first 8 images to base64 for Gemini (in background)
        const convertForGemini=async()=>{
          const b64cache=[];
          for(const img of imgs.slice(0,8)){
            if(cancelled)break;
            try{
              const b64=await imageUrlToBase64(img.url);
              if(b64){b64cache.push(b64);console.log("[SocialDash] Pre-cached base64 for",img.source,"image");}
            }catch(e){}
          }
          if(!cancelled){
            window.__galleryBase64Cache=window.__galleryBase64Cache||{};
            window.__galleryBase64Cache[activeClient.id]=b64cache;
            console.log("[SocialDash] Pre-cached",b64cache.length,"base64 images for Gemini");
          }
          setGalleryLoading(false);
        };
        convertForGemini();
      }
    };
    loadGallery();
    return()=>{cancelled=true;};
  },[activeClient?.id]);
  const addTheme=()=>{if(newTheme.trim()){setCustomThemes(p=>[...p,newTheme.trim()]);setNewTheme("");}};
  const removeTheme=(i)=>setCustomThemes(p=>p.filter((_,idx)=>idx!==i));

  const handleGenerate=()=>{
    if(customThemes.length>0){
      setGenConfig(prev=>({...prev,customThemes}));
    }
    const selBK=selectedTemplate?(canvaBrandKitsDyn||CANVA_BRAND_KITS).find(b=>b.id===selectedTemplate):null;
    const tplPrompt=selBK?`Use the visual identity of the Canva brand kit "${selBK.name}". Match the brand's style, colors, mood, and design language. Create a background that feels native to this brand's existing Canva designs.`:"";
    generatePosts(customThemes, graphicStyle, tplPrompt);
  };

  const clientPosts=posts.filter(p=>p.clientId===activeClient.id);

  return(
    <div style={{maxWidth:900,margin:"0 auto"}}>
      {/* ── Client Header with Scheda Button ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {activeClient.logo?<img src={activeClient.logo} style={{width:44,height:44,borderRadius:12,objectFit:"contain",border:"2px solid #e2e8f0",background:"#fff"}}/>
          :<div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,"+(activeClient.palette?.colors?.[0]||"#6366f1")+","+(activeClient.palette?.colors?.[1]||"#a855f7")+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:"#fff"}}>{activeClient.name?.charAt(0)||"?"}</div>}
          <div>
            <h2 style={{margin:0,fontSize:22,fontWeight:700,color:"#1e293b"}}>{activeClient.name}</h2>
            <p style={{margin:"2px 0 0",fontSize:12,color:"#94a3b8"}}>{activeClient.sector} · {activeClient.tone} · {clientPosts.length} post</p>
          </div>
        </div>
        <button onClick={()=>setView("client-edit")} style={{padding:"10px 20px",borderRadius:10,border:"1px solid #e2e8f0",background:"#fff",color:"#1e293b",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:8,transition:"all .15s",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}} onMouseEnter={e=>{e.currentTarget.style.background="#f8fafc";e.currentTarget.style.borderColor="#6366f1";}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#e2e8f0";}}>
          <Icons.Edit size={15} color="#6366f1"/>
          Visualizza scheda cliente
        </button>
      </div>

      <p style={{color:"#94a3b8",fontSize:13,margin:"0 0 20px"}}>Genera automaticamente oppure inserisci i contenuti specifici richiesti dal cliente.</p>

      {/* ── Contenuti personalizzati dal cliente ── */}
      <div style={{background:"#fff",borderRadius:16,padding:28,border:"1px solid #e2e8f0",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <Icons.Edit size={18} color="#6366f1"/>
          <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>Contenuti del cliente</h3>
          <Badge color="#6366f1">Opzionale</Badge>
        </div>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>Inserisci i temi o argomenti specifici richiesti dal cliente. Se lasci vuoto, il sistema genera idee automaticamente dal settore "{activeClient.sector}".</p>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newTheme} onChange={e=>setNewTheme(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addTheme();}} placeholder="Es. Promo weekend, Nuovo menu primavera, Evento live sabato..." style={{...inputStyle,flex:1,marginBottom:0}}/>
          <button onClick={addTheme} disabled={!newTheme.trim()} style={{padding:"10px 20px",borderRadius:8,border:"none",background:newTheme.trim()?"#6366f1":"#e2e8f0",color:newTheme.trim()?"#fff":"#94a3b8",fontSize:13,fontWeight:600,cursor:newTheme.trim()?"pointer":"not-allowed",whiteSpace:"nowrap"}}>+ Aggiungi</button>
        </div>
        {customThemes.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
          {customThemes.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,background:"#eef2ff",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,color:"#6366f1"}}>
            {t}
            <button onClick={()=>removeTheme(i)} style={{background:"none",border:"none",cursor:"pointer",color:"#6366f1",fontSize:14,lineHeight:1,padding:0}}>×</button>
          </div>)}
        </div>}
        {customThemes.length>0&&<div style={{background:"#f0fdf4",borderRadius:8,padding:10,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Check size={14} color="#10b981"/>
          <span style={{fontSize:11,color:"#166534"}}>{customThemes.length} tema/i personalizzati. Verranno usati al posto delle idee automatiche.</span>
        </div>}
      </div>

      {/* ── Configurazione generazione ── */}
      <div style={{background:"#fff",borderRadius:16,padding:28,border:"1px solid #e2e8f0"}}>
        <label style={labelStyle}>Quanti post vuoi generare?</label>
        <input type="range" min={1} max={20} value={genConfig.postCount||5} onChange={e=>setGenConfig({...genConfig,postCount:+e.target.value})} style={{width:"100%"}}/>
        <div style={{textAlign:"center",fontWeight:700,fontSize:28,color:"#6366f1",margin:"4px 0 20px"}}>{customThemes.length>0?customThemes.length:genConfig.postCount||5} post</div>
        {customThemes.length>0&&<div style={{background:"#f0fdf4",borderRadius:10,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,color:"#166534"}}>Verranno generati <strong>{customThemes.length}</strong> post personalizzati (uno per ogni tema inserito)</div>
        </div>}
        {(activeClient.website||activeClient.driveFolder)&&<div style={{background:"#eef2ff",borderRadius:10,padding:12,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Image size={14} color="#6366f1"/>
          <span style={{fontSize:12,color:"#4338ca"}}>Le immagini verranno prese {activeClient.website&&<>dal sito <strong>{activeClient.website.replace(/^https?:\/\//,"")}</strong></>}{activeClient.website&&activeClient.driveFolder&&" e "}{activeClient.driveFolder&&<>dalla <strong>cartella Google Drive</strong></>}</span>
        </div>}
        {activeClient.files?.filter(f=>f.type?.startsWith("image/")).length>0&&<div style={{background:"#fef3c7",borderRadius:10,padding:12,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Upload size={14} color="#f59e0b"/>
          <span style={{fontSize:12,color:"#92400e"}}>{activeClient.files.filter(f=>f.type?.startsWith("image/")).length} foto caricate dal cliente verranno usate nei post</span>
        </div>}
      </div>

      {/* ── Gallery immagini ── */}
      <div style={{marginTop:28,background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Icons.Image size={18} color="#6366f1"/>
            <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>Gallery immagini</h3>
            {galleryImages.length>0&&<Badge color="#10b981">{galleryImages.length} trovate</Badge>}
            {selectedGalleryIdxs.size>0&&<Badge color="#6366f1">{selectedGalleryIdxs.size} selezionate</Badge>}
            {convertingSelected&&<span style={{fontSize:11,color:"#94a3b8"}}>Preparazione...</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {selectedGalleryIdxs.size>0&&<button onClick={()=>setSelectedGalleryIdxs(new Set())} style={{fontSize:11,color:"#ef4444",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Deseleziona tutto</button>}
            {galleryLoading&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#94a3b8"}}><div className="spinner" style={{width:14,height:14}}/> Caricamento...</div>}
            {!galleryLoading&&galleryLoaded===activeClient.id&&<button onClick={()=>{setGalleryLoaded(null);setSelectedGalleryIdxs(new Set());}} style={{fontSize:11,color:"#6366f1",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Ricarica</button>}
            <label style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:10,border:"1px solid #e2e8f0",background:"#fff",color:"#1e293b",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>
              <Icons.Plus size={14} color="#6366f1"/> Carica foto
              <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{
                const files=Array.from(e.target.files||[]);
                if(!files.length)return;
                files.forEach(f=>{
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    setGalleryImages(prev=>[{url:ev.target.result,source:"upload",name:f.name},...prev]);
                  };
                  reader.readAsDataURL(f);
                });
                e.target.value="";
              }}/>
            </label>
          </div>
        </div>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:12,marginTop:0}}>Clicca sulle immagini per selezionarle — Gemini le userà come riferimento quando generi la grafica.</p>
        {selectedGalleryIdxs.size>0&&<div style={{background:"#eef2ff",borderRadius:10,padding:10,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Check size={14} color="#6366f1"/>
          <span style={{fontSize:12,color:"#4338ca"}}><strong>{selectedGalleryIdxs.size}</strong> immagini selezionate — verranno inviate a Gemini come riferimento visivo per la grafica</span>
        </div>}
        {galleryImages.length===0&&!galleryLoading&&<div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:13,background:"#f8fafc",borderRadius:10}}>
          {activeClient.website||activeClient.driveFolder?"Nessuna immagine trovata. Verifica che il sito sia online e/o la cartella Drive sia condivisa pubblicamente.":"Inserisci il sito web o la cartella Drive nella scheda cliente per raccogliere immagini automaticamente."}
        </div>}
        {galleryImages.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8}}>
          {galleryImages.map((img,i)=>{
            const selected=selectedGalleryIdxs.has(i);
            return <div key={i} onClick={()=>toggleGallerySelect(i)} style={{position:"relative",aspectRatio:"1",borderRadius:8,overflow:"hidden",border:selected?"3px solid #6366f1":"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",transition:"all .15s",transform:selected?"scale(0.95)":"scale(1)",boxShadow:selected?"0 0 0 2px rgba(99,102,241,.3)":"none"}}>
              <img src={img.url} style={{width:"100%",height:"100%",objectFit:"cover",opacity:selected?1:.75}} onError={e=>{e.target.parentElement.style.display="none";}} loading="lazy"/>
              {selected&&<div style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 4px rgba(0,0,0,.3)"}}><Icons.Check size={14} color="#fff"/></div>}
              <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"2px 6px",background:selected?"rgba(99,102,241,.85)":"rgba(0,0,0,.5)",fontSize:9,color:"#fff",textAlign:"center"}}>
                {img.source==="drive"?"Drive":img.source==="website"?"Sito":"Caricata"}
              </div>
            </div>;
          })}
        </div>}
      </div>

      {/* ── Stile grafica ── */}
      <div style={{marginTop:20,background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <Icons.Sparkles size={18} color="#a855f7"/>
          <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>Stile grafica</h3>
        </div>
        <p style={{fontSize:12,color:"#94a3b8",margin:"0 0 12px"}}>Descrivi come vuoi che sia la grafica. Se lasci vuoto, userà lo stile definito nella scheda cliente.</p>
        <textarea value={graphicStyle} onChange={e=>setGraphicStyle(e.target.value)} placeholder={"Descrivi lo stile che vuoi per la grafica, es:\n• Foto di sfondo con scritte sopra in bianco\n• Sfondo pieno rosso scuro con testo grande al centro\n• Collage di foto del locale con titolo sopra\n• Stile minimal, solo testo su sfondo chiaro\n• Foto del piatto a sinistra, testo a destra"} style={{...inputStyle,height:80,resize:"vertical",fontSize:13,lineHeight:1.5}}/>
        {/* Quick style presets */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:-8}}>
          {["Foto sfondo + scritte sopra","Sfondo pieno + testo grande","Collage foto","Minimal solo testo","Foto prodotto + testo laterale"].map(s=><button key={s} onClick={()=>setGraphicStyle(s)} style={{padding:"4px 12px",borderRadius:8,border:"1px solid "+(graphicStyle===s?"#6366f1":"#e2e8f0"),background:graphicStyle===s?"#eef2ff":"#f8fafc",color:graphicStyle===s?"#6366f1":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{s}</button>)}
        </div>
      </div>

      {/* ── Bottone Genera ── */}
      <div style={{marginTop:20}}>
        <button onClick={handleGenerate} disabled={isGenerating||convertingSelected} style={{width:"100%",padding:"16px 0",borderRadius:14,border:"none",background:isGenerating||convertingSelected?"#94a3b8":"linear-gradient(135deg,#6366f1,#a855f7)",color:"#fff",fontSize:16,fontWeight:700,cursor:isGenerating||convertingSelected?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 12px rgba(99,102,241,.3)"}}>
          {isGenerating?<><div className="spinner"/> Recupero immagini e genero post...</>:convertingSelected?<><div className="spinner"/> Preparazione immagini selezionate...</>:<><Icons.Sparkles size={20}/> Genera {customThemes.length>0?customThemes.length+" post personalizzati":(genConfig.postCount||5)+" post"}{selectedGalleryIdxs.size>0?" con "+selectedGalleryIdxs.size+" foto selezionate":""}</>}
        </button>
        {scrapingResult&&<div style={{marginTop:12,padding:12,borderRadius:10,background:scrapingResult.includes("Non sono")?"#fef3c7":"#f0fdf4",display:"flex",alignItems:"center",gap:8}}>
          {scrapingResult.includes("Non sono")?<Icons.X size={14} color="#f59e0b"/>:<Icons.Check size={14} color="#10b981"/>}
          <span style={{fontSize:12,color:scrapingResult.includes("Non sono")?"#92400e":"#166534"}}>{scrapingResult}</span>
        </div>}
      </div>

      {/* ── Post del cliente (PED Builder) ── */}
      {clientPosts.length>0&&<div style={{marginTop:28}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{margin:0,fontSize:18,fontWeight:700,color:"#1e293b"}}>Post di {activeClient.name} ({clientPosts.length})</h3>
          {pedSelection.size>0&&<Badge color="#6366f1" style={{fontSize:13,padding:"6px 16px"}}>{pedSelection.size} / {clientPosts.length} nella presentazione</Badge>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {clientPosts.map((post,idx)=>{
            const img=post.generatedImage||post.scrapedImage||(post.image?.url);
            const inPed=pedSelection.has(post.id);
            const pastelColors=["#eef2ff","#fdf2f8","#ecfdf5","#fefce8","#f0f9ff","#faf5ff","#fff7ed","#f0fdfa"];
            const bgColor=pastelColors[idx%pastelColors.length];
            return <div key={post.id} style={{background:"#fff",borderRadius:16,border:inPed?"2px solid #6366f1":"1px solid #e2e8f0",overflow:"hidden",boxShadow:inPed?"0 0 0 3px rgba(99,102,241,.15)":"0 1px 3px rgba(0,0,0,.04)",transition:"all .2s"}}>
              <div style={{display:"flex",gap:0}}>
                {/* Left: Copy */}
                <div style={{flex:1,padding:20,borderRight:"1px solid #f1f5f9",minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <Badge color="#6366f1" style={{fontSize:11}}>Post {idx+1}</Badge>
                    <span style={{fontSize:12,color:"#94a3b8",fontWeight:500}}>{post.date||"—"}</span>
                    {post.theme&&<Badge color="#f59e0b" style={{fontSize:10}}>{post.theme}</Badge>}
                    <Badge color={post.status==="bozza"?"#f59e0b":post.status==="approvato"?"#10b981":"#8b5cf6"} style={{fontSize:10}}>{post.status}</Badge>
                  </div>
                  <div onClick={()=>{setSelectedPost(post);setView("post-detail");}} style={{fontSize:14,color:"#1e293b",lineHeight:1.7,whiteSpace:"pre-wrap",cursor:"pointer",maxHeight:200,overflow:"auto",padding:12,background:"#f8fafc",borderRadius:10,border:"1px solid #f1f5f9"}}>
                    {post.body||"Nessun testo"}
                  </div>
                  {post.hashtags&&post.hashtags.length>0&&<div style={{marginTop:8,fontSize:12,color:"#6366f1"}}>{post.hashtags.slice(0,6).join(" ")}</div>}
                </div>
                {/* Right: Image preview */}
                <div style={{width:200,flexShrink:0,background:bgColor,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>{setSelectedPost(post);setView("post-detail");}}>
                  {img?<img src={img} style={{width:"100%",height:"100%",objectFit:"cover",minHeight:180}} onError={e=>{e.target.style.display="none";}}/>
                  :<div style={{textAlign:"center",padding:20}}><Icons.Image size={36} color="#cbd5e1"/><div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Genera grafica</div></div>}
                </div>
              </div>
              {/* Bottom: Action buttons */}
              <div style={{display:"flex",gap:8,padding:"12px 20px",borderTop:"1px solid #f1f5f9",background:"#fafbfc"}}>
                <button onClick={()=>{setSelectedPost(post);setView("post-detail");}} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#6366f1",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  <Icons.Sparkles size={14}/> Rigenera
                </button>
                <button onClick={(e)=>{e.stopPropagation();togglePed(post.id);}} style={{padding:"8px 16px",borderRadius:8,border:inPed?"2px solid #6366f1":"1px solid #e2e8f0",background:inPed?"#6366f1":"#fff",color:inPed?"#fff":"#475569",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all .15s"}}>
                  {inPed?<><Icons.Check size={14}/> Aggiunto alla presentazione</>:<><Icons.Plus size={14}/> Aggiungi alla presentazione</>}
                </button>
              </div>
            </div>;
          })}
        </div>

        {/* ── Genera Presentazione PED ── */}
        {pedSelection.size>0&&<div style={{marginTop:24,padding:24,background:"linear-gradient(135deg,#eef2ff,#faf5ff)",borderRadius:16,border:"2px solid #c7d2fe"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>Presentazione PED pronta</div>
              <div style={{fontSize:13,color:"#64748b",marginTop:2}}>{pedSelection.size} post selezionati · File 2560×1440 px · Formato PDF</div>
            </div>
            <button onClick={()=>setPedSelection(new Set())} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,cursor:"pointer"}}>Deseleziona tutti</button>
          </div>
          <button onClick={generaPED} disabled={pedGenerating} style={{width:"100%",padding:"16px 0",borderRadius:12,border:"none",background:pedGenerating?"#94a3b8":"linear-gradient(135deg,#1e293b,#334155)",color:"#fff",fontSize:16,fontWeight:700,cursor:pedGenerating?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 4px 16px rgba(0,0,0,.2)"}}>
            {pedGenerating?<><div className="spinner"/> Generazione PED in corso...</>:<><Icons.Download size={20}/> Genera presentazione PED</>}
          </button>
        </div>}
      </div>}
    </div>
  );
}

// ─── New Client Form ───────────────────────────────────────────
function NewClientForm({onSave,onCancel,labelStyle,inputStyle,canvaBrandKitsDyn}){

    reader.readAsDataURL(file);

              <img src={form.logo} style={{width:72,height:72,borderRadius:12,objectFit:"contain",border:"2px solid #e2e8f0",background:"#f8fafc"}}/>
              <button onClick={()=>{set("logo",null);set("logoName","");}} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:"#ef4444",border:"2px solid #fff",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            :<div onClick={()=>logoRef.current?.click()} style={{width:72,height:72,borderRadius:12,border:"2px dashed #e2e8f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#fafbfc",gap:4,transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"} onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}>
              <Icons.Upload size={20} color="#94a3b8"/>
              <span style={{fontSize:10,color:"#94a3b8"}}>Carica logo</span>
            </div>}
            <input ref={logoRef} type="file" accept="image/*" onChange={handleLogo} style={{display:"none"}}/>
            <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>
              {form.logo?<><strong>{form.logoName||"logo.png"}</strong><br/><span style={{color:"#94a3b8"}}>Clicca × per rimuovere</span></>
              :<>Carica il logo in formato PNG, JPG o SVG<br/><span style={{color:"#94a3b8"}}>Opzionale — apparirà nella scheda cliente</span></>}
            </div>
          </div>
        </div>

        <div><label style={labelStyle}>N. post da realizzare</label><input type="number" min={0} style={inputStyle} placeholder="Es. 12" value={form.postsToCreate||""} onChange={e=>set("postsToCreate",+e.target.value||0)}/></div>
        <div><label style={labelStyle}>N. campagne</label><input type="number" min={0} style={inputStyle} placeholder="Es. 2" value={form.campaigns||""} onChange={e=>set("campaigns",+e.target.value||0)}/></div>
        <div><label style={labelStyle}>Sito web</label><input style={inputStyle} placeholder="https://www.nomebrand.it" value={form.website} onChange={e=>set("website",e.target.value)}/></div>

        <div><label style={labelStyle}>Pagina Facebook</label><input style={inputStyle} placeholder="facebook.com/nomebrand" value={form.facebook} onChange={e=>set("facebook",e.target.value)}/></div>
        <div style={{gridColumn:"1 / -1"}}>

          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>

              <div style={{display:"flex",gap:4,marginBottom:4}}>{pal.colors.map(c=><div key={c} style={{width:24,height:24,borderRadius:"50%",background:c}}/>)}</div>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",textAlign:"center"}}>{pal.name}</div>
            </div>)}
            {/* Custom palette option */}
            <div onClick={()=>set("paletteMode","custom")} style={{cursor:"pointer",padding:8,borderRadius:10,border:form.paletteMode==="custom"?"2px solid #6366f1":"2px solid transparent",background:form.paletteMode==="custom"?"#eef2ff":"#f8fafc",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:80}}>
              <div style={{width:24,height:24,borderRadius:"50%",border:"2px dashed #94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#94a3b8"}}>+</div>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",textAlign:"center",marginTop:4}}>Custom</div>
            </div>
          </div>
          {/* Custom color pickers */}
          {form.paletteMode==="custom"&&<div style={{background:"#f8fafc",borderRadius:12,padding:16,marginBottom:12}}>

              <span style={{fontSize:12,fontWeight:600,color:"#64748b"}}>Inserisci i colori del brand:</span>

            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
              {[0,1,2,3].map(i=><div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{position:"relative",width:44,height:44,borderRadius:10,border:"2px solid #e2e8f0",overflow:"hidden",cursor:"pointer",background:form.customColors?.[i]||"#e2e8f0"}}>
                  <input type="color" value={form.customColors?.[i]||"#6366f1"} onChange={e=>{const cols=[...(form.customColors||["#6366f1","#a855f7","#f59e0b","#10b981"])];cols[i]=e.target.value;set("customColors",cols);set("palette",{name:"Custom",colors:cols});}} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none",padding:0}}/>
                </div>
                <input value={form.customColors?.[i]||""} onChange={e=>{const cols=[...(form.customColors||["#6366f1","#a855f7","#f59e0b","#10b981"])];cols[i]=e.target.value;set("customColors",cols);set("palette",{name:"Custom",colors:cols});}} placeholder="#hex" style={{width:70,fontSize:10,padding:"3px 6px",borderRadius:4,border:"1px solid #e2e8f0",textAlign:"center",fontFamily:"monospace"}}/>
              </div>)}
            </div>
            {/* Brand identity paste - rimosso su richiesta */}
          </div>}
          {/* Preview of selected palette */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <span style={{fontSize:11,color:"#94a3b8"}}>Palette attiva:</span>
            <div style={{display:"flex",gap:4}}>{(form.palette?.colors||[]).map((c,i)=><div key={i} style={{width:20,height:20,borderRadius:6,background:c,border:"1px solid #e2e8f0"}}/>)}</div>
            <span style={{fontSize:11,fontWeight:600,color:"#6366f1"}}>{form.palette?.name||"—"}</span>
          </div>
        </div>
        {/* ── Font Selection ── */}
        <div><label style={labelStyle}>Font titoli</label>
          <select style={{...inputStyle,marginBottom:form.fontHeading==="Personalizzato"?8:16,fontFamily:form.fontHeading!=="Personalizzato"?form.fontHeading:"inherit"}} value={form.fontHeading} onChange={e=>{set("fontHeading",e.target.value);if(e.target.value!=="Personalizzato")set("fontHeadingCustom","");}}>
            {FONT_LIST.map(f=><option key={f} style={{fontFamily:f!=="Personalizzato"?f:"inherit"}}>{f}</option>)}
          </select>
          {form.fontHeading==="Personalizzato"&&<input style={inputStyle} placeholder="Nome del font (es. Archivo Black, Caveat...)" value={form.fontHeadingCustom} onChange={e=>set("fontHeadingCustom",e.target.value)}/>}
        </div>
        <div><label style={labelStyle}>Font corpo testo</label>
          <select style={{...inputStyle,marginBottom:form.fontBody==="Personalizzato"?8:16,fontFamily:form.fontBody!=="Personalizzato"?form.fontBody:"inherit"}} value={form.fontBody} onChange={e=>{set("fontBody",e.target.value);if(e.target.value!=="Personalizzato")set("fontBodyCustom","");}}>
            {FONT_LIST.map(f=><option key={f} style={{fontFamily:f!=="Personalizzato"?f:"inherit"}}>{f}</option>)}
          </select>
          {form.fontBody==="Personalizzato"&&<input style={inputStyle} placeholder="Nome del font (es. Source Sans Pro, DM Sans...)" value={form.fontBodyCustom} onChange={e=>set("fontBodyCustom",e.target.value)}/>}
        </div>
        {/* ── Canva Brand Kit ── */}
        <div style={{gridColumn:"1 / -1"}}>
          <label style={labelStyle}>Brand Kit Canva</label>
          <select style={{...inputStyle,marginBottom:8}} value={form.canvaBrandKit||""} onChange={e=>set("canvaBrandKit",e.target.value)}>

        </div>

        <div style={{gridColumn:"1 / -1"}}>

      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <IconBtn icon={Icons.X} label="Annulla" onClick={onCancel}/>
        <IconBtn icon={Icons.Check} label="Salva cliente" onClick={()=>{if(!form.name.trim())return;const saved={...form,sector:form.sector==="Altro"?(form.customSector.trim()||"Altro"):form.sector,fontHeading:form.fontHeading==="Personalizzato"?(form.fontHeadingCustom.trim()||"Montserrat"):form.fontHeading,fontBody:form.fontBody==="Personalizzato"?(form.fontBodyCustom.trim()||"Open Sans"):form.fontBody,canvaStyle:form.canvaStyle||""};delete saved.customSector;delete saved.fontHeadingCustom;delete saved.fontBodyCustom;delete saved.paletteMode;delete saved.customColors;delete saved.brandColorsPaste;onSave(saved);}} style={{background:"#6366f1",color:"#fff",border:"none",opacity:form.name.trim()?1:0.5}}/>

// ─── Client Card ───────────────────────────────────────────────
function ClientCard({client,active,postCount,onSelect,onDelete}){
  const fileCount=client.files?.length||0;
  return(
    <div onClick={onSelect} style={{background:"#fff",borderRadius:14,padding:20,border:active?"2px solid #6366f1":"1px solid #e2e8f0",cursor:"pointer",transition:"all .15s",position:"relative"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {client.logo?<img src={client.logo} style={{width:36,height:36,borderRadius:8,objectFit:"contain",border:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}/>
          :<div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,"+(client.palette?.colors?.[0]||"#6366f1")+","+(client.palette?.colors?.[1]||"#a855f7")+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff",flexShrink:0}}>{client.name?.charAt(0)||"?"}</div>}
          <div><h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>{client.name}</h3><p style={{margin:"4px 0 0",fontSize:12,color:"#94a3b8"}}>{client.sector}</p></div>
        </div>
        <button onClick={e=>{e.stopPropagation();onDelete();}} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#cbd5e1"}}><Icons.Trash size={16}/></button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        <Badge color="#6366f1">{client.tone}</Badge>
        {client.target&&<Badge color="#10b981">{client.target.split(",")[0].trim().substring(0,20)}</Badge>}
        {client.fontHeading&&<Badge color="#8b5cf6" style={{fontSize:10}}>H: {client.fontHeading}</Badge>}
        {client.fontBody&&<Badge color="#64748b" style={{fontSize:10}}>B: {client.fontBody}</Badge>}
        {fileCount>0&&<Badge color="#f59e0b" style={{fontSize:10}}>{fileCount} file</Badge>}
      </div>
      <div style={{display:"flex",gap:4}}>{client.palette?.colors.map(c=><div key={c} style={{width:16,height:16,borderRadius:4,background:c}}/>)}</div>
      {/* Thumbnail strip of uploaded images */}
      {client.files?.filter(f=>f.type?.startsWith("image/")).length>0&&<div style={{display:"flex",gap:4,marginTop:8}}>
        {client.files.filter(f=>f.type?.startsWith("image/")).slice(0,4).map(f=><img key={f.id} src={f.dataUrl} style={{width:32,height:32,borderRadius:6,objectFit:"cover",border:"1px solid #e2e8f0"}}/>)}
        {client.files.filter(f=>f.type?.startsWith("image/")).length>4&&<div style={{width:32,height:32,borderRadius:6,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,color:"#94a3b8"}}>+{client.files.filter(f=>f.type?.startsWith("image/")).length-4}</div>}
      </div>}
      <div style={{marginTop:8,fontSize:12,color:"#94a3b8"}}>{postCount} post generati</div>
    </div>
  );
}

    config:{bgColor:"#e8d5c4",textColor:"#333333",accentColor:"#c8907a",
      headlineSize:38,brandSize:14,ctaSize:16,infoSize:10,
      headlinePos:{x:0.35,y:0.45},brandPos:{x:0.82,y:0.06},ctaPos:{x:0.28,y:0.88},infoPos:{x:0.35,y:0.12}},
    drawExtras:(ctx,W,H,layers)=>{
      // Top bar
      ctx.fillStyle="rgba(0,0,0,0.15)";ctx.fillRect(0,0,W,H*0.08);
      // Sub-headline in script font
      ctx.fillStyle=layers.accentColor||"#c8907a";
      ctx.font='italic 700 '+Math.round(layers.headlineSize*0.7)+'px "Dancing Script", cursive';
      ctx.textAlign="left";ctx.fillText("microcircolo",W*0.05,H*0.68);ctx.textAlign="center";
      // Price circle
      const cx=W*0.8,cy=H*0.65,r=W*0.1;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle=layers.accentColor||"#e8b4a0";ctx.fill();
      ctx.fillStyle="#fff";ctx.font='700 '+Math.round(r*0.6)+'px Arial';
      ctx.fillText("49€",cx,cy+r*0.15);
      // Old price strikethrough
      ctx.font='400 '+Math.round(r*0.4)+'px Arial';ctx.fillText("90€",cx,cy-r*0.25);
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.beginPath();
      ctx.moveTo(cx-r*0.3,cy-r*0.3);ctx.lineTo(cx+r*0.3,cy-r*0.15);ctx.stroke();
      // CTA button
      ctx.fillStyle=layers.accentColor||"#e8c0b0";ctx.beginPath();
      roundRect(ctx,W*0.05,H*0.84,W*0.45,H*0.06,H*0.03);ctx.fill();
      ctx.fillStyle="#fff";ctx.font='600 '+Math.round(14)+'px Arial';
      ctx.fillText("Lascia il tuo contatto",W*0.275,H*0.878);
    }},

    drawExtras:(ctx,W,H,layers)=>{

      const txt=layers.textColor||"#e06020";
      // Decorative circles (tomatoes)
      ctx.beginPath();ctx.arc(W*0.72,H*0.06,W*0.05,0,Math.PI*2);ctx.fillStyle=accent;ctx.fill();
      ctx.beginPath();ctx.arc(W*0.82,H*0.08,W*0.035,0,Math.PI*2);ctx.fillStyle="#20a040";ctx.fill();
      // Grid rows
      const days=["LUN.","MAR.","MER.","GIO."];
      const offers=["SOCIAL PIZZA","ALL U CAN PIZZA","PRENDI 2 PAGHI 1","SOCIAL PIZZA"];
      const subs=["2 pizze a scelta a 10€","Pizze infinite a 19€","Con prenotazione","2 pizze a scelta a 10€"];
      for(let i=0;i<4;i++){
        const ry=H*0.18+i*H*0.17;
        // Day cell
        ctx.beginPath();roundRect(ctx,W*0.06,ry,W*0.18,H*0.13,8);
        ctx.fillStyle="#fff";ctx.fill();
        ctx.fillStyle=txt;ctx.font='700 16px Arial';ctx.textAlign="center";
        ctx.fillText(days[i],W*0.15,ry+H*0.08);
        // Offer cell
        ctx.beginPath();roundRect(ctx,W*0.28,ry,W*0.66,H*0.13,8);
        ctx.fillStyle="#fff";ctx.fill();
        ctx.fillStyle=txt;ctx.font='800 16px Arial';ctx.textAlign="left";
        ctx.fillText(offers[i],W*0.32,ry+H*0.055);
        ctx.font='400 10px Arial';ctx.fillStyle="#888";
        ctx.fillText(subs[i],W*0.32,ry+H*0.095);
      }
      ctx.textAlign="center";
    }},
];

// Helper: roundRect for canvas
function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── Post Designer (inline editor) ────────────────────────────
function PostDesigner({post,client,onUpdate}){
  const canvasRef=useRef(null);
  const containerRef=useRef(null);
  const[template,setTemplate]=useState("classic");
  const[layers,setLayers]=useState(()=>post.designLayers||{
    bgColor:client?.palette?.colors?.[0]||"#8B1A1A",
    textColor:client?.palette?.colors?.[1]||"#F5E6C8",
    accentColor:client?.palette?.colors?.[2]||"#D4A574",
    headline:post.theme?.toUpperCase()||"HEADLINE",
    brandName:client?.name?.toUpperCase()||"BRAND",
    cta:post.cta||"Scopri di più",
    infoLine:client?.address||"",
    fontFamily:client?.fontHeading||"Arial Black",
    headlineSize:42,brandSize:54,ctaSize:22,infoSize:12,
    showBgImage:false,bgImageData:null,
    // Draggable positions (relative 0-1)
    headlinePos:{x:0.5,y:0.22},
    brandPos:{x:0.5,y:0.52},
    ctaPos:{x:0.5,y:0.78},
    infoPos:{x:0.5,y:0.92},
    // Reference image
    referenceImage:null,referenceDesc:"",
  });
  const[dragging,setDragging]=useState(null);
  const[dragOffset,setDragOffset]=useState({x:0,y:0});
  const[selectedLayer,setSelectedLayer]=useState(null);
  const[showTemplates,setShowTemplates]=useState(false);

  const set=(k,v)=>{const nl={...layers,[k]:v};setLayers(nl);onUpdate({designLayers:nl});};
  const setMulti=(obj)=>{const nl={...layers,...obj};setLayers(nl);onUpdate({designLayers:nl});};

  const tpl=DESIGN_TEMPLATES.find(t=>t.id===template)||DESIGN_TEMPLATES[0];
  const lo=tpl.layout;

  // Hit-test regions for dragging
  const hitRegions=useRef([]);

  const getCanvasScale=()=>{
    const canvas=canvasRef.current;if(!canvas)return 1;
    return canvas.width/canvas.getBoundingClientRect().width;
  };

  // ─── Draw ─────────────────────────────────────
  const draw=useCallback(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    const regions=[];

    const doDrawContent=()=>{
      // Template decorations
      const borderW=lo.borderW||0;
      const accent=layers.accentColor||layers.textColor;

      // Border
      if(borderW>0){
        ctx.strokeStyle=lo.borderColor==="auto"?accent:(lo.borderColor||accent);
        ctx.lineWidth=borderW;
        ctx.strokeRect(borderW/2,borderW/2,W-borderW,H-borderW);
        if(lo.innerBorder){
          ctx.lineWidth=1;
          ctx.strokeRect(borderW+8,borderW+8,W-borderW*2-16,H-borderW*2-16);
        }
      }

      // Accent bar
      if(lo.accentBar){
        ctx.fillStyle=accent;
        ctx.fillRect(0,0,8,H);
      }

      // Banner background
      if(lo.banner){
        ctx.fillStyle=accent;
        ctx.globalAlpha=0.85;
        ctx.fillRect(0,H*lo.bannerY,W,H*lo.bannerH);
        ctx.globalAlpha=1;
      }

      // Split
      if(lo.split){
        ctx.fillStyle=layers.textColor;
        ctx.globalAlpha=0.12;
        ctx.fillRect(0,H*0.45,W,H*0.55);
        ctx.globalAlpha=1;
      }

      // Divider line
      if(lo.dividerLine){
        ctx.strokeStyle=accent;
        ctx.lineWidth=2;
        ctx.beginPath();
        const dw=W*0.3;
        ctx.moveTo(W/2-dw,H*0.42);ctx.lineTo(W/2+dw,H*0.42);
        ctx.moveTo(W/2-dw,H*0.68);ctx.lineTo(W/2+dw,H*0.68);
        ctx.stroke();
      }

      // Logo
      if(lo.logoPos&&client?.logo){
        const logoImg=new Image();
        logoImg.onload=()=>{
          const lh=40;const lw=lh*(logoImg.width/logoImg.height||1);
          let lx=W/2-lw/2,ly=16;
          if(lo.logoPos==="top-right"){lx=W-lw-20;ly=20;}
          else if(lo.logoPos==="top-center"){lx=W/2-lw/2;ly=16;}
          ctx.drawImage(logoImg,lx,ly,lw,lh);
        };
        logoImg.src=client.logo;
      }

      const align=lo.align||"center";
      ctx.textAlign=align;
      const xBase=align==="left"?40:align==="right"?W-40:W/2;

      const hsMult=lo.headlineSizeMult||1;
      const bsMult=lo.brandSizeMult||1;

      // Headline
      const hx=layers.headlinePos.x*W, hy=layers.headlinePos.y*H;
      ctx.fillStyle=layers.textColor;
      const hs=Math.round(layers.headlineSize*hsMult);
      ctx.font=`900 ${hs}px "${layers.fontFamily}", "Arial Black", sans-serif`;
      const hBounds=wrapTextR(ctx,layers.headline,hx,hy,W-60,hs*1.1);
      regions.push({id:"headline",bounds:hBounds,label:"Headline"});

      // Brand
      const bx=layers.brandPos.x*W, by=layers.brandPos.y*H;
      const bs=Math.round(layers.brandSize*bsMult);
      ctx.font=`900 ${bs}px "${layers.fontFamily}", "Arial Black", sans-serif`;
      const bBounds=wrapTextR(ctx,layers.brandName,bx,by,W-40,bs*1.1);
      regions.push({id:"brand",bounds:bBounds,label:"Brand"});

      // CTA
      const cx2=layers.ctaPos.x*W, cy2=layers.ctaPos.y*H;
      ctx.font=`700 ${layers.ctaSize}px "${layers.fontFamily}", "Arial Black", sans-serif`;
      const ctaW=ctx.measureText(layers.cta).width;
      ctx.fillText(layers.cta,cx2,cy2);
      regions.push({id:"cta",bounds:{x:cx2-ctaW/2,y:cy2-layers.ctaSize,w:ctaW,h:layers.ctaSize*1.4},label:"CTA"});

      // Info
      if(layers.infoLine){
        const ix=layers.infoPos.x*W, iy=layers.infoPos.y*H;
        ctx.font=`400 ${layers.infoSize}px "Arial", sans-serif`;
        ctx.globalAlpha=0.8;
        const iW=ctx.measureText(layers.infoLine).width;
        ctx.fillText(layers.infoLine,ix,iy);
        ctx.globalAlpha=1;
        regions.push({id:"info",bounds:{x:ix-iW/2,y:iy-layers.infoSize,w:iW,h:layers.infoSize*1.4},label:"Info"});
      }

      // Selection highlight
      if(selectedLayer){
        const selR=regions.find(r=>r.id===selectedLayer);
        if(selR){
          ctx.strokeStyle="#6366f1";ctx.lineWidth=2;ctx.setLineDash([6,3]);
          ctx.strokeRect(selR.bounds.x-6,selR.bounds.y-6,selR.bounds.w+12,selR.bounds.h+12);
          ctx.setLineDash([]);
          // Corner dots
          const b=selR.bounds;
          [[b.x-6,b.y-6],[b.x+b.w+6,b.y-6],[b.x-6,b.y+b.h+6],[b.x+b.w+6,b.y+b.h+6],[b.x+b.w/2,b.y-6],[b.x+b.w/2,b.y+b.h+6]].forEach(([px,py])=>{
            ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fillStyle="#6366f1";ctx.fill();
          });
        }
      }

      // Visual template extras
      const activeVT=VISUAL_TEMPLATES.find(v=>"visual-"+v.id===template);
      if(activeVT&&activeVT.drawExtras){
        try{activeVT.drawExtras(ctx,W,H,layers);}catch(e){console.warn("drawExtras error:",e);}
      }

      hitRegions.current=regions;
    };

    // Background
    if(layers.showBgImage&&layers.bgImageData){
      const img=new Image();
      img.onload=()=>{
        ctx.drawImage(img,0,0,W,H);
        if(lo.overlay){
          ctx.fillStyle="#000";ctx.globalAlpha=lo.overlayOpacity||0.5;
          ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
        }
        doDrawContent();
      };
      img.src=layers.bgImageData;
    } else {
      ctx.fillStyle=layers.bgColor;
      ctx.fillRect(0,0,W,H);
      doDrawContent();
    }
  },[layers,template,selectedLayer]);

  // Wrap text and return bounds
  const wrapTextR=(ctx,text,x,y,maxW,lineH)=>{
    const words=text.split(" ");let line="";let cy=y;let maxMeasured=0;let startY=y;
    words.forEach(w=>{
      const test=line+w+" ";
      if(ctx.measureText(test).width>maxW&&line){
        const lw=ctx.measureText(line.trim()).width;
        if(lw>maxMeasured)maxMeasured=lw;
        ctx.fillText(line.trim(),x,cy);cy+=lineH;line=w+" ";
      } else line=test;
    });
    const lw=ctx.measureText(line.trim()).width;
    if(lw>maxMeasured)maxMeasured=lw;
    ctx.fillText(line.trim(),x,cy);
    const totalH=cy-startY+lineH;
    return{x:x-maxMeasured/2,y:startY-lineH*0.8,w:maxMeasured,h:totalH+lineH*0.3};
  };

  useEffect(()=>{draw();},[draw]);

  // Load font — use document.fonts API for reliable loading
  useEffect(()=>{
    if(!layers.fontFamily||layers.fontFamily==="Arial Black")return;
    const family=layers.fontFamily;
    // Add stylesheet if not already present
    const linkId="gfont-"+family.replace(/\s+/g,"-");
    if(!document.getElementById(linkId)){
      const link=document.createElement("link");
      link.id=linkId;
      link.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;700;900&display=swap`;
      link.rel="stylesheet";document.head.appendChild(link);
    }
    // Wait for font to actually load, then redraw
    const tryLoad=async()=>{
      try{
        await document.fonts.load(`900 48px "${family}"`);
        await document.fonts.load(`700 24px "${family}"`);
        await document.fonts.load(`400 14px "${family}"`);
        draw();
      }catch(e){
        // Fallback: retry after delay
        setTimeout(draw,800);
        setTimeout(draw,1500);
      }
    };
    tryLoad();
    // Also redraw after a safety delay in case fonts API is slow
    const t1=setTimeout(draw,1000);
    const t2=setTimeout(draw,2000);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[layers.fontFamily]);

  // ─── Mouse dragging ──────────────────────────
  const getMousePos=(e)=>{
    const canvas=canvasRef.current;if(!canvas)return{x:0,y:0};
    const rect=canvas.getBoundingClientRect();
    const scale=getCanvasScale();
    return{x:(e.clientX-rect.left)*scale,y:(e.clientY-rect.top)*scale};
  };

  const handleMouseDown=(e)=>{
    const pos=getMousePos(e);
    const regions=hitRegions.current;
    // Check from top (last drawn = on top)
    for(let i=regions.length-1;i>=0;i--){
      const r=regions[i];const b=r.bounds;
      if(pos.x>=b.x-10&&pos.x<=b.x+b.w+10&&pos.y>=b.y-10&&pos.y<=b.y+b.h+10){
        setDragging(r.id);
        setSelectedLayer(r.id);
        const canvas=canvasRef.current;
        const posKey=r.id==="headline"?"headlinePos":r.id==="brand"?"brandPos":r.id==="cta"?"ctaPos":"infoPos";
        setDragOffset({x:pos.x/canvas.width-layers[posKey].x,y:pos.y/canvas.height-layers[posKey].y});
        e.preventDefault();
        return;
      }
    }
    setSelectedLayer(null);
  };

  const handleMouseMove=(e)=>{
    if(!dragging)return;
    const pos=getMousePos(e);
    const canvas=canvasRef.current;if(!canvas)return;
    const posKey=dragging==="headline"?"headlinePos":dragging==="brand"?"brandPos":dragging==="cta"?"ctaPos":"infoPos";
    const nx=Math.max(0.05,Math.min(0.95,pos.x/canvas.width-dragOffset.x));
    const ny=Math.max(0.05,Math.min(0.95,pos.y/canvas.height-dragOffset.y));
    setMulti({[posKey]:{x:nx,y:ny}});
  };

  const handleMouseUp=()=>{setDragging(null);};

  // Touch support
  const handleTouchStart=(e)=>{
    const touch=e.touches[0];if(!touch)return;
    handleMouseDown({clientX:touch.clientX,clientY:touch.clientY,preventDefault:()=>e.preventDefault()});
  };
  const handleTouchMove=(e)=>{
    const touch=e.touches[0];if(!touch)return;
    handleMouseMove({clientX:touch.clientX,clientY:touch.clientY});
  };

  const handleExport=()=>{
    setSelectedLayer(null);
    setTimeout(()=>{
      const canvas=canvasRef.current;if(!canvas)return;
      const a=document.createElement("a");
      a.download=`${client?.name||"post"}-${post.theme||"design"}.png`;
      a.href=canvas.toDataURL("image/png");a.click();
    },100);
  };

  const handleBgImage=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{setMulti({bgImageData:ev.target.result,showBgImage:true});};
    reader.readAsDataURL(file);e.target.value="";
  };

  const handleReferenceImage=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{set("referenceImage",ev.target.result);};
    reader.readAsDataURL(file);e.target.value="";
  };

  const applyTemplate=(tplId)=>{
    const t=DESIGN_TEMPLATES.find(t=>t.id===tplId);if(!t)return;
    setTemplate(tplId);
    const lo2=t.layout;
    setMulti({
      headlinePos:{x:lo2.align==="left"?0.15:0.5,y:lo2.headlineY},
      brandPos:{x:lo2.align==="left"?0.15:0.5,y:lo2.brandY},
      ctaPos:{x:lo2.align==="left"?0.15:0.5,y:lo2.ctaY},
      infoPos:{x:0.5,y:lo2.infoY},
    });
    setShowTemplates(false);
  };

  const applyVisualTemplate=(vt)=>{
    setTemplate("visual-"+vt.id);
    setMulti({
      ...vt.config,
      headlinePos:vt.config.headlinePos||{x:0.5,y:0.3},
      brandPos:vt.config.brandPos||{x:0.5,y:0.5},
      ctaPos:vt.config.ctaPos||{x:0.5,y:0.75},
      infoPos:vt.config.infoPos||{x:0.5,y:0.92},
    });
    setShowTemplates(false);
  };

  // ─── Custom Templates (per-client) ─────────
  const[customTemplates,setCustomTemplates]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("customTpl_"+(client?.id||"")))||[];}catch(e){return[];}
  });
  const saveCustomTemplates=(list)=>{setCustomTemplates(list);localStorage.setItem("customTpl_"+(client?.id||""),JSON.stringify(list));};
  const tplUploadRef=useRef(null);
  const handleUploadTemplate=(e)=>{
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const newTpl={id:Date.now()+"_"+Math.random().toString(36).slice(2,6),name:file.name.replace(/\.[^.]+$/,""),image:ev.target.result};
        saveCustomTemplates([...customTemplates,newTpl]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };
  const removeCustomTemplate=(id)=>{saveCustomTemplates(customTemplates.filter(t=>t.id!==id));};
  const applyCustomTemplate=(tpl)=>{
    setMulti({bgImageData:tpl.image,showBgImage:true});
    setTemplate("custom-"+tpl.id);
    setShowTemplates(false);

  const[editingTplName,setEditingTplName]=useState(null);

  const bgImgRef=useRef(null);
  const refImgRef=useRef(null);
  const smallLabel={fontSize:10,fontWeight:600,color:"#64748b",marginBottom:3,display:"block"};
  const smallInput={width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:11,boxSizing:"border-box"};

  return(
    <div style={{background:"#fff",borderRadius:16,padding:16,border:"2px solid #a855f7"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <Icons.Palette size={16} color="#a855f7"/>
          <h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Designer <Badge color="#a855f7" style={{fontSize:9}}>Drag & Drop</Badge></h4>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowTemplates(!showTemplates)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:showTemplates?"#f1f5f9":"#fff",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,color:"#6366f1"}}>
            🎨 Template
          </button>
          <button onClick={handleExport} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"#a855f7",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <Icons.Download size={12}/> Esporta PNG
          </button>
        </div>
      </div>

      {/* Template selector */}
      {showTemplates&&<div style={{marginBottom:12,padding:10,background:"#f8fafc",borderRadius:10}}>
        {/* Visual templates from real examples */}
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:6}}>Stili grafici</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
          {VISUAL_TEMPLATES.map(vt=>(
            <div key={vt.id} onClick={()=>applyVisualTemplate(vt)}
              style={{borderRadius:8,overflow:"hidden",border:template===("visual-"+vt.id)?"2px solid #a855f7":"1px solid #e2e8f0",

        {/* Simple layout templates */}

      {/* Canvas preview - DRAGGABLE */}
      <div ref={containerRef} style={{position:"relative",marginBottom:10,cursor:dragging?"grabbing":"default"}}>

          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleMouseUp}
        />
        {!dragging&&<div style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:9,padding:"3px 8px",borderRadius:6,pointerEvents:"none"}}>

      {/* Reference image */}
      <div style={{marginBottom:10,padding:8,background:"#fefce8",borderRadius:8,border:"1px solid #fde68a"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:layers.referenceImage?6:0}}>

          <button onClick={()=>refImgRef.current?.click()} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #fbbf24",background:"#fff",fontSize:10,fontWeight:600,cursor:"pointer",color:"#92400e"}}>
            {layers.referenceImage?"Cambia":"Carica reference"}

          <input ref={refImgRef} type="file" accept="image/*" onChange={handleReferenceImage} style={{display:"none"}}/>
        </div>
        {layers.referenceImage&&<div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <img src={layers.referenceImage} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:"2px solid #fbbf24"}}/>
          <div style={{flex:1}}>
            <textarea value={layers.referenceDesc||""} onChange={e=>set("referenceDesc",e.target.value)}
              placeholder="Descrivi lo stile da copiare (es: font bold rosso su sfondo beige, stile vintage, ecc.)"
              style={{...smallInput,height:50,resize:"vertical",fontSize:10}}/>
            <button onClick={()=>setMulti({referenceImage:null,referenceDesc:""})} style={{marginTop:4,padding:"2px 8px",borderRadius:4,border:"1px solid #fecaca",background:"#fff",fontSize:9,cursor:"pointer",color:"#ef4444"}}>Rimuovi</button>
          </div>
        </div>}

      {/* Controls */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <label style={smallLabel}>Sfondo</label>
          <div style={{display:"flex",gap:4}}>
            <div style={{position:"relative",width:28,height:28,borderRadius:6,overflow:"hidden",border:"1px solid #e2e8f0",background:layers.bgColor,flexShrink:0}}>
              <input type="color" value={layers.bgColor} onChange={e=>set("bgColor",e.target.value)} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none"}}/>
            </div>
            <button onClick={()=>bgImgRef.current?.click()} style={{flex:1,padding:"4px 8px",borderRadius:6,border:"1px dashed #e2e8f0",background:layers.showBgImage?"#f0fdf4":"#fff",fontSize:10,cursor:"pointer",color:"#64748b"}}>
              {layers.showBgImage?"📷 Foto attiva":"📷 Usa foto"}
            </button>
            {layers.showBgImage&&<button onClick={()=>setMulti({showBgImage:false,bgImageData:null})} style={{padding:"4px 6px",borderRadius:6,border:"1px solid #fecaca",background:"#fff",fontSize:10,cursor:"pointer",color:"#ef4444"}}>×</button>}
            <input ref={bgImgRef} type="file" accept="image/*" onChange={handleBgImage} style={{display:"none"}}/>

        <div>
          <label style={smallLabel}>Colore testo</label>
          <div style={{display:"flex",gap:4}}>
            <div style={{position:"relative",width:28,height:28,borderRadius:6,overflow:"hidden",border:"1px solid #e2e8f0",background:layers.textColor}}>
              <input type="color" value={layers.textColor} onChange={e=>set("textColor",e.target.value)} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none"}}/>
            </div>
            <div style={{position:"relative",width:28,height:28,borderRadius:6,overflow:"hidden",border:"1px solid #e2e8f0",background:layers.accentColor||"#D4A574"}}>
              <input type="color" value={layers.accentColor||"#D4A574"} onChange={e=>set("accentColor",e.target.value)} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none"}}/>
            </div>
            <span style={{fontSize:8,color:"#94a3b8",alignSelf:"center"}}>accent</span>
          </div>
        </div>
      </div>

      <div style={{marginBottom:6}}>
        <label style={smallLabel}>Headline</label>
        <input value={layers.headline} onChange={e=>set("headline",e.target.value)} style={smallInput}/>
      </div>
      <div style={{marginBottom:6}}>
        <label style={smallLabel}>Brand name</label>
        <input value={layers.brandName} onChange={e=>set("brandName",e.target.value)} style={smallInput}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
        <div><label style={smallLabel}>CTA</label><input value={layers.cta} onChange={e=>set("cta",e.target.value)} style={smallInput}/></div>
        <div><label style={smallLabel}>Info (indirizzo ecc.)</label><input value={layers.infoLine} onChange={e=>set("infoLine",e.target.value)} style={smallInput}/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        <div><label style={smallLabel}>Font</label><input value={layers.fontFamily} onChange={e=>set("fontFamily",e.target.value)} style={smallInput} placeholder="Arial Black"/></div>
        <div><label style={smallLabel}>Dim. headline</label><input type="number" value={layers.headlineSize} onChange={e=>set("headlineSize",+e.target.value)} style={smallInput} min={12} max={80}/></div>
        <div><label style={smallLabel}>Dim. brand</label><input type="number" value={layers.brandSize} onChange={e=>set("brandSize",+e.target.value)} style={smallInput} min={12} max={100}/></div>

      {/* Quick palette buttons */}
      {client?.palette?.colors&&<div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
        {client.palette.colors.map((c,i)=><div key={i} onClick={()=>set("bgColor",c)} style={{width:20,height:20,borderRadius:4,background:c,cursor:"pointer",border:layers.bgColor===c?"2px solid #1e293b":"1px solid #e2e8f0"}} title={"Sfondo: "+c}/>)}
        <span style={{fontSize:9,color:"#94a3b8",alignSelf:"center",marginLeft:2,marginRight:6}}>← sfondo</span>
        {client.palette.colors.map((c,i)=><div key={"t"+i} onClick={()=>set("textColor",c)} style={{width:20,height:20,borderRadius:4,background:c,cursor:"pointer",border:layers.textColor===c?"2px solid #1e293b":"1px solid #e2e8f0"}} title={"Testo: "+c}/>)}
        <span style={{fontSize:9,color:"#94a3b8",alignSelf:"center",marginLeft:2}}>← testo</span>
