                    <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{cl.sector}{cl.tone?" · "+cl.tone:""}{cl.website?" · "+cl.website.replace(/^https?:\/\//,""):""}</div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                    <div style={{textAlign:"center",padding:"6px 12px",background:"#f5f3ff",borderRadius:10}}>
                      <div style={{fontSize:11,color:"#7c5cbf",fontWeight:600}}>Post</div>
                      <div style={{fontSize:16,fontWeight:800,color:"#5c4db7"}}>{clPosts}{cl.totalPosts?<span style={{fontSize:11,fontWeight:500,color:"#a5a0c8"}}>/{cl.totalPosts}</span>:""}</div>
                    </div>
                    <div style={{textAlign:"center",padding:"6px 12px",background:"#fce4ec",borderRadius:10}}>
                      <div style={{fontSize:11,color:"#e91e63",fontWeight:600}}>ADV</div>
                      <div style={{fontSize:16,fontWeight:800,color:"#c2185b"}}>{clAds}{cl.totalAds?<span style={{fontSize:11,fontWeight:500,color:"#e8a0bf"}}>/{cl.totalAds}</span>:""}</div>
                    </div>
                    <div onClick={e=>e.stopPropagation()}>
                      <select value={cl.accountManager||"Non assegnato"} onChange={e=>{const v=e.target.value;setClients(prev=>prev.map(c=>c.id===cl.id?{...c,accountManager:v}:c));}}
                        style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",fontSize:11,fontWeight:600,color:"#5c4db7",cursor:"pointer",outline:"none"}}>
                        {ACCOUNT_MANAGERS.map(am=><option key={am} value={am}>{am}</option>)}
                      </select>
                    </div>
                    <div onClick={e=>e.stopPropagation()}>
                      <select value={cl.graphicDesigner||"Non assegnato"} onChange={e=>{const v=e.target.value;setClients(prev=>prev.map(c=>c.id===cl.id?{...c,graphicDesigner:v}:c));}}
                        style={{padding:"5px 8px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",fontSize:11,fontWeight:600,color:"#e91e63",cursor:"pointer",outline:"none"}}>
                        {GRAPHIC_DESIGNERS.map(gd=><option key={gd} value={gd}>{gd}</option>)}
                      </select>
                    </div>
                  </div>
                </div>;
              });
            })()}
          </div>
        </div>}

        {/* ══════════════ TEMPLATES & STILI VIEW ══════════════ */}
        {view==="templates"&&<div>
          <h2 style={{margin:"0 0 8px",fontSize:22,fontWeight:700,color:"#1e293b"}}>Template & Stili</h2>
          <p style={{margin:"0 0 24px",fontSize:13,color:"#94a3b8"}}>Stili grafici e template salvati per velocizzare la creazione dei post.</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
            {TEMPLATES.map((t,i)=>(
              <div key={t.id} style={{background:"#fff",borderRadius:16,overflow:"hidden",border:"1px solid #f0eef6",boxShadow:"0 2px 8px rgba(0,0,0,.04)",cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 4px 16px rgba(92,77,183,.12)";}} onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.04)";}}>
                <div style={{height:120,background:t.preview?.bg||"linear-gradient(135deg,#5c4db7,#7c5cbf)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                  <div style={{color:"#fff",fontSize:20,fontWeight:800,textShadow:"0 2px 8px rgba(0,0,0,.3)"}}>{t.preview?.elements?.[0]?.text||"TITOLO"}</div>
                </div>
                <div style={{padding:16}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:4}}>{t.name}</div>
                  <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.4}}>{t.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:32}}>
            <h3 style={{fontSize:16,fontWeight:700,color:"#1e293b",marginBottom:12}}>Palette colori salvate</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
              {COLOR_PALETTES.map((p,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:12,padding:12,border:"1px solid #f0eef6"}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#475569",marginBottom:8}}>{p.name}</div>
                  <div style={{display:"flex",gap:4}}>
                    {p.colors.map((c,j)=><div key={j} style={{flex:1,height:32,borderRadius:6,background:c}} title={c}/>)}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* ══════════════ CANVA HUB VIEW ══════════════ */}
        {view==="canvahub"&&<div>
          <h2 style={{margin:"0 0 8px",fontSize:22,fontWeight:700,color:"#1e293b"}}>Canva Hub</h2>
          <p style={{margin:"0 0 24px",fontSize:13,color:"#94a3b8"}}>Tutti i progetti Canva dei tuoi clienti e i brand kit collegati.</p>

          {/* Brand Kits — compact with expandable detail */}
          <BrandKitGrid brandKits={canvaBrandKitsDyn}/>

          {/* Design per cliente */}
          <h3 style={{fontSize:16,fontWeight:700,color:"#1e293b",marginBottom:12}}>Progetti Canva per cliente</h3>
          {Object.entries(CANVA_DESIGNS_CACHE).map(([clientKey,designs])=>(
            <div key={clientKey} style={{marginBottom:24}}>
              <div style={{fontSize:14,fontWeight:700,color:"#5c4db7",marginBottom:8,textTransform:"capitalize"}}>{clientKey}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
                {designs.map((d,i)=>(
                  <div key={d.id} style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #f0eef6",cursor:"pointer"}} onClick={()=>{if(d.view)window.open(d.view,"_blank");}}>
                    <img src={d.thumb} style={{width:"100%",height:70,objectFit:"cover",display:"block"}} onError={e=>{e.target.style.display="none";e.target.parentElement.style.minHeight="70px";e.target.parentElement.style.background="#f5f3ff";}}/>
                    <div style={{padding:"6px 8px"}}>
                      <div style={{fontSize:10,fontWeight:600,color:"#475569",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.title}</div>
                      {d.pages>1&&<div style={{fontSize:9,color:"#94a3b8"}}>{d.pages} pagine</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>}

        {/* ══════════════ GENERATE VIEW ══════════════ */}
        {view==="generate"&&activeClient&&<GenerateView activeClient={activeClient} genConfig={genConfig} setGenConfig={setGenConfig} generatePosts={generatePosts} isGenerating={isGenerating} scrapingResult={scrapingResult} posts={posts} setPosts={setPosts} labelStyle={labelStyle} inputStyle={inputStyle} setView={setView} setSelectedPost={setSelectedPost} canvaBrandKitsDyn={canvaBrandKitsDyn} refreshCanvaBrandKits={refreshCanvaBrandKits} canvaLoading={canvaLoading}/>}

        {/* ══════════════ CLIENT EDIT VIEW ══════════════ */}
        {view==="client-edit"&&activeClient&&<ClientEditView client={activeClient} onUpdate={(upd)=>updateClient(activeClient.id,upd)} onDelete={()=>{deleteClient(activeClient.id);setView("clients");}} onBack={()=>setView("generate")} labelStyle={labelStyle} inputStyle={inputStyle} canvaBrandKitsDyn={canvaBrandKitsDyn} refreshCanvaBrandKits={refreshCanvaBrandKits} canvaLoading={canvaLoading}/>}

            {/* ══════════════ POST DETAIL VIEW ══════════════ */}
            {view==="post-detail"&&selectedPost&&<PostDetail post={selectedPost} client={activeClient} geminiKey={geminiKey} onBack={()=>setView("generate")} onUpdate={(upd)=>{updatePost(selectedPost.id,upd);setSelectedPost({...selectedPost,...upd});}} onDelete={()=>{deletePost(selectedPost.id);setView("generate");}} onCopy={copyToClipboard} labelStyle={labelStyle}/>}
          </div>

          {/* ──── RIGHT SIDEBAR ──── */}
          {(view==="clients"||view==="clientlist"||view==="templates"||view==="canvahub")?<CalendarWidget posts={posts}/>:<ClientSidebar activeClient={activeClient} posts={posts} onEditClient={()=>setView("client-edit")} onGeneratePost={()=>setView("generate")} onViewChange={setView}/>}
        </div>
      </div>
    </div>
  );
}

// ─── Generate View (Auto + contenuti cliente) ──────────────────────────
function GenerateView({activeClient,genConfig,setGenConfig,generatePosts,isGenerating,scrapingResult,posts,setPosts,labelStyle,inputStyle,setView,setSelectedPost,canvaBrandKitsDyn,refreshCanvaBrandKits,canvaLoading}){
  const[customThemes,setCustomThemes]=useState([]);
  const[newTheme,setNewTheme]=useState("");
  const[galleryImages,setGalleryImages]=useState([]);
  const[galleryLoading,setGalleryLoading]=useState(false);
  const[galleryLoaded,setGalleryLoaded]=useState(null);
  const[selectedGalleryIdxs,setSelectedGalleryIdxs]=useState(new Set());
  const[convertingSelected,setConvertingSelected]=useState(false);
  const[graphicStyle,setGraphicStyle]=useState("");
  const[selectedTemplate,setSelectedTemplate]=useState(activeClient.canvaBrandKit||null);
  const[brandKitSearch,setBrandKitSearch]=useState("");
  const[pedSelection,setPedSelection]=useState(new Set());
  const[pedGenerating,setPedGenerating]=useState(false);

  const togglePed=(postId)=>{
    setPedSelection(prev=>{const next=new Set(prev);if(next.has(postId))next.delete(postId);else next.add(postId);return next;});
  };

  const generaPED=async()=>{
    if(pedSelection.size===0)return;
    setPedGenerating(true);
    try{
      const W=1920,H=1080;
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:"landscape",unit:"px",format:[W,H],compress:true});

      const brandColors=activeClient.palette?.colors||["#1e293b","#6366f1","#a855f7","#f8fafc"];
      const hexLuma=(hex)=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 0.299*r+0.587*g+0.114*b;};
      const sortedByDark=[...brandColors].filter(c=>c&&c.startsWith("#")&&c.length>=7).sort((a,b)=>hexLuma(a)-hexLuma(b));
      const bgColor=sortedByDark[0]||"#2C2018";
      const accentColor=sortedByDark.length>1?sortedByDark[sortedByDark.length-1]:"#D4A574";
      const textOnDark=hexLuma(bgColor)<128?"#FFFFFF":"#000000";
      const year=new Date().getFullYear().toString();
      const fontH=activeClient.fontHeading||"Playfair Display";
      const fontB=activeClient.fontBody||"Lato";
      try{await loadGoogleFont(fontH);await loadGoogleFont(fontB);await loadGoogleFont("Playfair Display");}catch(e){}

      const makeSlideCanvas=(drawFn)=>{
        const c=document.createElement("canvas");c.width=W;c.height=H;
        const ctx=c.getContext("2d");
        drawFn(ctx,W,H);
        return c.toDataURL("image/jpeg",0.95);
      };

      const wrapText=(ctx,text,x,y,maxW,lineH,align)=>{
        if(!text)return y;
        const words=text.split(" ");const lines=[];let cur="";
        for(const wd of words){const test=cur?cur+" "+wd:wd;if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=wd;}else{cur=test;}}
        if(cur)lines.push(cur);
        const prevAlign=ctx.textAlign;
        if(align)ctx.textAlign=align;
        for(let j=0;j<lines.length;j++)ctx.fillText(lines[j],x,y+j*lineH);
        ctx.textAlign=prevAlign;
        return y+lines.length*lineH;
      };

      const wrapLines=(ctx,text,maxW)=>{
        if(!text)return[];
        const paras=text.split("\n");const out=[];
        paras.forEach(para=>{
          if(!para.trim()){out.push("");return;}
          const words=para.split(" ");let cur="";
          for(const wd of words){const test=cur?cur+" "+wd:wd;if(ctx.measureText(test).width>maxW&&cur){out.push(cur);cur=wd;}else{cur=test;}}
          if(cur)out.push(cur);
        });
        return out;
      };

      const selectedPosts=clientPosts.filter(p=>pedSelection.has(p.id));

      // Load horizontal SITE photos for PED backgrounds (NOT the generated post graphics)
      const sitePhotos=[];
      const siteImgUrls=scrapedImagesCache[activeClient.id+"_site"]||[];
      const driveImgUrls=scrapedImagesCache[activeClient.id+"_drive"]||[];
      const allPhotoUrls=[...siteImgUrls,...driveImgUrls];
      for(const url of allPhotoUrls){
        if(sitePhotos.length>=selectedPosts.length+2)break;
        try{
          const img=new Image();img.crossOrigin="anonymous";img.src=url;
          await new Promise(r=>{img.onload=r;img.onerror=r;});
          // Prefer horizontal/landscape photos
          if(img.complete&&img.naturalWidth>0&&img.naturalWidth>=img.naturalHeight*0.8){
            sitePhotos.push(img);
          }
        }catch(e){}
      }

      // Also load generated post images for the feed grid only
      const postImages=[];
      for(const post of selectedPosts){
        const src=post.generatedImage||post.scrapedImage;
        if(src){
          const img=new Image();img.crossOrigin="anonymous";img.src=src;
          await new Promise(r=>{img.onload=r;img.onerror=r;});
          postImages.push(img.complete&&img.naturalWidth>0?img:null);
        }else{postImages.push(null);}
      }

      // Load client logo
      let logoImgObj=null;
      if(hasLogo(activeClient.logo)){
        const li=new Image();li.crossOrigin="anonymous";li.src=activeClient.logo;
        await new Promise(r=>{li.onload=r;li.onerror=r;});
        if(li.complete&&li.naturalWidth>0)logoImgObj=li;
      }

      // ══════════ PAGE 1: Cover — foto scura + PIANO editoriale ══════════
      const coverImg=makeSlideCanvas((ctx,w,h)=>{
        // Dark background base
        ctx.fillStyle=bgColor;ctx.fillRect(0,0,w,h);

        // Use a horizontal site photo as cover background (NOT the post graphic)
        if(sitePhotos[0]){
          const img=sitePhotos[0];
          const ar=img.width/img.height;
          let dw=w,dh=h;
          if(ar>w/h){dh=h;dw=dh*ar;}else{dw=w;dh=dw/ar;}
          ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);
          // Dark overlay for readability
          ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(0,0,w,h);
        }

        ctx.textBaseline="top";

        // Top right: meraviglia logo text
        ctx.fillStyle="rgba(255,255,255,0.7)";ctx.font="400 24px '"+fontB+"',sans-serif";
        ctx.textAlign="right";ctx.fillText("meraviglia",w-80,50);ctx.textAlign="left";

        // Center-left: "PIANO" light + "editoriale" italic script
        ctx.fillStyle="#FFFFFF";
        ctx.font="300 48px '"+fontB+"',sans-serif";
        ctx.letterSpacing="8px";
        ctx.fillText("PIANO",80,h/2-60);
        ctx.letterSpacing="0px";
        ctx.font="italic 120px 'Playfair Display','"+fontH+"',serif";
        ctx.fillText("editoriale",80,h/2-10);

        // Bottom bar: year ——— PED
        ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="400 20px '"+fontB+"',sans-serif";
        ctx.fillText(year,80,h-60);
        ctx.textAlign="right";ctx.fillText("PED",w-80,h-60);ctx.textAlign="left";
        // Line between
        ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(140,h-50);ctx.lineTo(w-120,h-50);ctx.stroke();
      });
      pdf.addImage(coverImg,0,0,W,H);

      // ══════════ PAGE 2: Presentazione piano editoriale — minimal bianco ══════════
      pdf.addPage([W,H],"landscape");
      const introImg=makeSlideCanvas((ctx,w,h)=>{
        ctx.fillStyle="#FFFFFF";ctx.fillRect(0,0,w,h);
        ctx.textBaseline="top";

        // Top line: year ——— PED
        ctx.fillStyle="#1a1a1a";ctx.font="400 18px '"+fontB+"',sans-serif";
        ctx.fillText(year,80,50);
        ctx.textAlign="right";ctx.fillText("PED",w-80,50);ctx.textAlign="left";
        ctx.strokeStyle="#1a1a1a";ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(130,59);ctx.lineTo(w-120,59);ctx.stroke();

        // Bottom-left: PRESENTAZIONE PIANO EDITORIALE
        ctx.fillStyle="#1a1a1a";ctx.font="900 52px '"+fontH+"',sans-serif";
        ctx.fillText("PRESENTAZIONE",80,h-220);
        ctx.fillText("PIANO EDITORIALE",80,h-160);

        // Right side description text — vertically aligned with title
        const rX=w*0.52;
        ctx.fillStyle="#555555";ctx.font="400 18px '"+fontB+"',sans-serif";
        const descLines=[
          "Questo piano editoriale è uno scheletro di come",
          "Meraviglia gestirà la collaborazione con "+activeClient.name.toUpperCase()+".",
          "Le date potrebbero subire variazioni in base alla",
          "disponibilità dei contenuti richiesti al cliente o imprevisti",
          "non imputabili a nessuna delle due parti coinvolte."
        ];
        descLines.forEach((ln,i)=>{ctx.fillText(ln,rX,h-220+i*28);});
      });
      pdf.addImage(introImg,0,0,W,H);

      // ══════════ FEED GRID PAGES — only actual posts, 4:5 cells ══════════
      // Calculate grid: 3 cols, as many rows as needed, split across pages
      const feedCols=3;
      const feedPerPage=6; // 3 cols x 2 rows per page
      const totalFeedPages=Math.ceil(selectedPosts.length/feedPerPage);

      for(let fp=0;fp<totalFeedPages;fp++){
        pdf.addPage([W,H],"landscape");
        const feedImg=makeSlideCanvas((ctx,w,h)=>{
          ctx.fillStyle=bgColor;ctx.fillRect(0,0,w,h);

          // White card centered
          const pad=60,cardX=pad,cardY=pad,cardW=w-pad*2,cardH=h-pad*2;
          ctx.fillStyle="#FFFFFF";ctx.fillRect(cardX,cardY,cardW,cardH);

          // Posts for this page
          const pageStart=fp*feedPerPage;
          const pagePosts=selectedPosts.slice(pageStart,pageStart+feedPerPage);
          const pageImgs=postImages.slice(pageStart,pageStart+feedPerPage);
          const rows=Math.ceil(pagePosts.length/feedCols);

          // Cell size: 4:5 ratio per cell, fit within card
          const gridPad=12;
          const availW=cardW-gridPad*(feedCols+1);
          const cellW=availW/feedCols;
          const cellH=cellW*(1350/1080); // 4:5 ratio
          const totalGridH=rows*cellH+(rows-1)*gridPad;
          const gridX=cardX+gridPad;
          const gridY=cardY+(cardH-totalGridH)/2; // center vertically

          for(let i=0;i<pagePosts.length;i++){
            const r=Math.floor(i/feedCols),c=i%feedCols;
            const cx=gridX+c*(cellW+gridPad);
            const cy=gridY+r*(cellH+gridPad);

            // Draw cell with rounded corners
            ctx.save();
            const radius=8;
            ctx.beginPath();
            ctx.moveTo(cx+radius,cy);ctx.lineTo(cx+cellW-radius,cy);ctx.quadraticCurveTo(cx+cellW,cy,cx+cellW,cy+radius);
            ctx.lineTo(cx+cellW,cy+cellH-radius);ctx.quadraticCurveTo(cx+cellW,cy+cellH,cx+cellW-radius,cy+cellH);
            ctx.lineTo(cx+radius,cy+cellH);ctx.quadraticCurveTo(cx,cy+cellH,cx,cy+cellH-radius);
            ctx.lineTo(cx,cy+radius);ctx.quadraticCurveTo(cx,cy,cx+radius,cy);
            ctx.closePath();ctx.clip();

            if(pageImgs[i]){
              const img=pageImgs[i];
              const ar=img.width/img.height;
              let dw=cellW,dh=cellH;
              if(ar>cellW/cellH){dh=cellH;dw=dh*ar;}else{dw=cellW;dh=dw/ar;}
              ctx.drawImage(img,cx+(cellW-dw)/2,cy+(cellH-dh)/2,dw,dh);
            }else{
              // Placeholder with brand color gradient
              const grad=ctx.createLinearGradient(cx,cy,cx+cellW,cy+cellH);
              grad.addColorStop(0,bgColor);grad.addColorStop(1,accentColor);
              ctx.fillStyle=grad;ctx.fillRect(cx,cy,cellW,cellH);
              ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="bold 16px '"+fontB+"',sans-serif";
              ctx.textAlign="center";ctx.textBaseline="middle";
              ctx.fillText(pagePosts[i].theme||("Post "+(pageStart+i+1)),cx+cellW/2,cy+cellH/2);
              ctx.textAlign="left";ctx.textBaseline="top";
            }

            // Title overlay at bottom
            const postTitle=pagePosts[i].theme||pagePosts[i].title;
            if(postTitle){
              const overlayH=55;
              const grad2=ctx.createLinearGradient(0,cy+cellH-overlayH-20,0,cy+cellH);
              grad2.addColorStop(0,"rgba(0,0,0,0)");grad2.addColorStop(1,"rgba(0,0,0,0.55)");
              ctx.fillStyle=grad2;ctx.fillRect(cx,cy+cellH-overlayH-20,cellW,overlayH+20);
              ctx.fillStyle="rgba(255,255,255,0.9)";ctx.font="italic 18px 'Playfair Display','"+fontH+"',serif";
              ctx.textAlign="center";ctx.fillText(postTitle.substring(0,35),cx+cellW/2,cy+cellH-25);ctx.textAlign="left";
            }
            ctx.restore();
          }

          // "feed" label bottom right
          ctx.fillStyle=bgColor;ctx.font="italic 70px 'Playfair Display','"+fontH+"',serif";
          ctx.textAlign="right";ctx.fillText("feed",w-pad-20,h-pad-25);ctx.textAlign="left";

          // Page indicator if multiple feed pages
          if(totalFeedPages>1){
            ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="400 16px '"+fontB+"',sans-serif";
            ctx.textAlign="left";ctx.fillText((fp+1)+"/"+totalFeedPages,pad+20,h-pad-25);
          }
        });
        pdf.addImage(feedImg,0,0,W,H);
      }

      // ══════════ POST PAGES: Foto sx + copy dx (stile Silvering 925) ══════════
      for(let i=0;i<selectedPosts.length;i++){
        const post=selectedPosts[i];
        pdf.addPage([W,H],"landscape");

        const pageImg=makeSlideCanvas((ctx,w,h)=>{
          // Dark brown/brand outer background
          ctx.fillStyle=bgColor;ctx.fillRect(0,0,w,h);

          // White card centered
          const pad=60;
          const cardX=pad,cardY=pad,cardW=w-pad*2,cardH=h-pad*2;
          ctx.fillStyle="#FFFFFF";ctx.fillRect(cardX,cardY,cardW,cardH);

          ctx.textBaseline="top";

          // Left half: horizontal site photo (NOT the generated post graphic)
          const imgW=cardW*0.48;
          const sitePhoto=sitePhotos[i%sitePhotos.length]||sitePhotos[0]||null;
          if(sitePhoto){
            ctx.save();
            ctx.beginPath();ctx.rect(cardX,cardY,imgW,cardH);ctx.clip();
            const ar=sitePhoto.width/sitePhoto.height;
            let dw=imgW,dh=cardH;
            if(ar>imgW/cardH){dh=cardH;dw=dh*ar;}else{dw=imgW;dh=dw/ar;}
            ctx.drawImage(sitePhoto,cardX+(imgW-dw)/2,cardY+(cardH-dh)/2,dw,dh);
            ctx.restore();
          }else{
            ctx.fillStyle="#f1f5f9";ctx.fillRect(cardX,cardY,imgW,cardH);
          }

          // Overlay title on image bottom (like "NON UN GIOIELLO, un simbolo")
          if(post.title){
            ctx.save();
            const overlayH=120;
            const grad=ctx.createLinearGradient(0,cardY+cardH-overlayH-40,0,cardY+cardH);
            grad.addColorStop(0,"rgba(0,0,0,0)");grad.addColorStop(1,"rgba(0,0,0,0.6)");
            ctx.fillStyle=grad;ctx.fillRect(cardX,cardY+cardH-overlayH-40,imgW,overlayH+40);
            // Title text — split into heading line + italic line
            ctx.fillStyle="rgba(255,255,255,0.8)";ctx.font="300 18px '"+fontB+"',sans-serif";
            const titleWords=post.title.split(" ");
            if(titleWords.length>3){
              const topPart=titleWords.slice(0,Math.ceil(titleWords.length/2)).join(" ").toUpperCase();
              const btmPart=titleWords.slice(Math.ceil(titleWords.length/2)).join(" ");
              ctx.fillText(topPart,cardX+30,cardY+cardH-100);
              ctx.fillStyle="#FFFFFF";ctx.font="italic 38px 'Playfair Display','"+fontH+"',serif";
              ctx.fillText(btmPart,cardX+30,cardY+cardH-70);
            }else{
              ctx.fillStyle="#FFFFFF";ctx.font="italic 38px 'Playfair Display','"+fontH+"',serif";
              ctx.fillText(post.title,cardX+30,cardY+cardH-70);
            }
            ctx.restore();
          }

          // Right half: copy text
          const copyX=cardX+imgW+50;
          const copyW=cardW-imgW-100;
          let curY=cardY+50;

          // Body copy — elegant, line by line
          ctx.fillStyle="#333333";ctx.font="400 20px '"+fontB+"',sans-serif";
          const bodyClean=(post.body||"").replace(/#\S+/g,"").trim().substring(0,1200);
          const bodyLines=wrapLines(ctx,bodyClean,copyW);
          bodyLines.forEach(ln=>{
            if(curY>cardY+cardH-80)return;
            if(!ln.trim()){curY+=14;return;}
            ctx.fillText(ln,copyX,curY);
            curY+=30;
          });

          // CTA at bottom
          if(post.cta){
            curY=Math.max(curY+10,cardY+cardH-120);
            ctx.fillStyle="#1a1a1a";ctx.font="600 18px '"+fontB+"',sans-serif";
            ctx.fillText(post.cta,copyX,curY);curY+=26;
          }

          // "Link in bio" at end
          curY=Math.max(curY,cardY+cardH-60);

          ctx.fillText("Link in bio.",copyX,curY);

        pdf.addImage(pageImg,0,0,W,H);

        pdf.addPage([W,H],"landscape");

          ctx.fillStyle=bgColor;ctx.fillRect(0,0,w,h);
          const pad=60;
          const cardX=pad,cardY=pad,cardW=w-pad*2,cardH=h-pad*2;
          ctx.fillStyle="#FFFFFF";ctx.fillRect(cardX,cardY,cardW,cardH);
          ctx.textBaseline="top";

          // Left: horizontal site photo (NOT the generated post graphic)
          const imgW=cardW*0.48;
          const advSitePhoto=sitePhotos.length>1?sitePhotos[sitePhotos.length-1]:sitePhotos[0]||null;
          if(advSitePhoto){
            ctx.save();ctx.beginPath();ctx.rect(cardX,cardY,imgW,cardH);ctx.clip();
            const ar=advSitePhoto.width/advSitePhoto.height;
            let dw=imgW,dh=cardH;
            if(ar>imgW/cardH){dh=cardH;dw=dh*ar;}else{dw=imgW;dh=dw/ar;}
            ctx.drawImage(advSitePhoto,cardX+(imgW-dw)/2,cardY+(cardH-dh)/2,dw,dh);
            ctx.restore();
          }

          // Overlay on image
          if(advPost.title){
            ctx.save();
            const grad=ctx.createLinearGradient(0,cardY+cardH-160,0,cardY+cardH);
            grad.addColorStop(0,"rgba(0,0,0,0)");grad.addColorStop(1,"rgba(0,0,0,0.6)");
            ctx.fillStyle=grad;ctx.fillRect(cardX,cardY+cardH-160,imgW,160);
            ctx.fillStyle="rgba(255,255,255,0.8)";ctx.font="300 16px '"+fontB+"',sans-serif";
            ctx.fillText("NON UN GIOIELLO,",cardX+30,cardY+cardH-100);
            ctx.fillStyle="#FFFFFF";ctx.font="italic 36px 'Playfair Display','"+fontH+"',serif";
            ctx.fillText(advPost.title.substring(0,30),cardX+30,cardY+cardH-70);
            ctx.restore();
          }

          // Right: ADV header + copy
          const copyX=cardX+imgW+50;
          const copyW=cardW-imgW-100;

          // ADV header in gold/accent
          ctx.fillStyle=accentColor;ctx.font="700 48px '"+fontH+"',sans-serif";
          ctx.fillText("ADV",copyX,cardY+40);

          // Copy below
          let curY=cardY+120;
          ctx.fillStyle="#333";ctx.font="400 20px '"+fontB+"',sans-serif";
          const advBody=(advPost.body||"").replace(/#\S+/g,"").trim().substring(0,800);
          const advLines=wrapLines(ctx,advBody,copyW);
          advLines.forEach(ln=>{
            if(curY>cardY+cardH-100)return;
            if(!ln.trim()){curY+=14;return;}
            ctx.fillText(ln,copyX,curY);curY+=30;
          });

          // CTA + logo anchor
          curY=Math.max(curY+10,cardY+cardH-100);
          if(logoImgObj){
            const lh=30,lw=lh*(logoImgObj.width/logoImgObj.height);
            ctx.drawImage(logoImgObj,copyX,curY,lw,lh);
            ctx.fillStyle="#888";ctx.font="400 16px '"+fontB+"',sans-serif";
            ctx.fillText("Link in bio",copyX+lw+12,curY+8);
          }else{
            ctx.fillStyle="#888";ctx.font="400 16px '"+fontB+"',sans-serif";
            ctx.fillText("Link in bio",copyX,curY);
          }
        });
        pdf.addImage(advImg,0,0,W,H);
      }

      // ══════════ LAST PAGE: Closing — sfondo scuro + "THE BEST IS YET TO COME" ══════════
      pdf.addPage([W,H],"landscape");
      const closeImg=makeSlideCanvas((ctx,w,h)=>{
        ctx.fillStyle="#111111";ctx.fillRect(0,0,w,h);
        ctx.textBaseline="top";

        // Top left: meraviglia
        ctx.fillStyle="#FFFFFF";ctx.font="500 28px '"+fontB+"',sans-serif";
        ctx.fillText("meraviglia",80,50);

        // Center-left: THE BEST IS YET TO COME (small caps style)
        ctx.fillStyle="#FFFFFF";ctx.font="400 90px 'Playfair Display','"+fontH+"',serif";
        ctx.fillText("The best is yet",80,h/2-60);
        ctx.fillText("to come",80,h/2+50);

        // Bottom: website
        ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="400 18px '"+fontB+"',sans-serif";
        ctx.fillText("www.meraviglialab.com",80,h-60);

        // Decorative half-circle / smiley-like shape on right (like the Canva template)
        ctx.fillStyle="#FFFFFF";
        // Large arc
        ctx.beginPath();ctx.arc(w+60,h/2+40,320,0,Math.PI*2);ctx.fill();
        // Eyes
        ctx.fillStyle="#111111";
        ctx.beginPath();ctx.arc(w-200,h/2-120,50,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(w-60,h/2-130,40,0,Math.PI*2);ctx.fill();
      });
      pdf.addImage(closeImg,0,0,W,H);

      pdf.save("PED_"+activeClient.name.replace(/\s+/g,"_")+"_"+(new Date().toISOString().split("T")[0])+".pdf");
    }catch(e){
      console.error("PED generation error:",e);
      alert("Errore nella generazione del PED: "+e.message);
    }
    setPedGenerating(false);

        <input type="range" min={1} max={20} value={genConfig.postCount||5} onChange={e=>setGenConfig({...genConfig,postCount:+e.target.value})} style={{width:"100%"}}/>
        <div style={{textAlign:"center",fontWeight:700,fontSize:28,color:"#6366f1",margin:"4px 0 20px"}}>{customThemes.length>0?customThemes.length:genConfig.postCount||5} post</div>
        {customThemes.length>0&&<div style={{background:"#f0fdf4",borderRadius:10,padding:16,marginBottom:16}}>
          <div style={{fontSize:13,color:"#166534"}}>Verranno generati <strong>{customThemes.length}</strong> post personalizzati (uno per ogni tema inserito)</div>
        </div>}
        {(activeClient.website||activeClient.driveFolder)&&<div style={{background:"#eef2ff",borderRadius:10,padding:12,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Image size={14} color="#6366f1"/>
          <span style={{fontSize:12,color:"#4338ca"}}>Le immagini verranno prese {activeClient.website&&<>dal sito <strong>{activeClient.website.replace(/^https?:\/\//,"")}</strong></>}{activeClient.website&&activeClient.driveFolder&&" e "}{activeClient.driveFolder&&<>dalla <strong>cartella Google Drive</strong></>}</span>
        </div>}
        {activeClient.files?.filter(f=>f.type?.startsWith("image/")).length>0&&<div style={{background:"#fef3c7",borderRadius:10,padding:12,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Upload size={14} color="#f59e0b"/>
          <span style={{fontSize:12,color:"#92400e"}}>{activeClient.files.filter(f=>f.type?.startsWith("image/")).length} foto caricate dal cliente verranno usate nei post</span>
        </div>}
      </div>

      {/* ── Gallery immagini ── */}
      <div style={{marginTop:28,background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Icons.Image size={18} color="#6366f1"/>
            <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>Gallery immagini</h3>
            {galleryImages.length>0&&<Badge color="#10b981">{galleryImages.length} trovate</Badge>}
            {selectedGalleryIdxs.size>0&&<Badge color="#6366f1">{selectedGalleryIdxs.size} selezionate</Badge>}
            {convertingSelected&&<span style={{fontSize:11,color:"#94a3b8"}}>Preparazione...</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {selectedGalleryIdxs.size>0&&<button onClick={()=>setSelectedGalleryIdxs(new Set())} style={{fontSize:11,color:"#ef4444",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Deseleziona tutto</button>}
            {galleryLoading&&<div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#94a3b8"}}><div className="spinner" style={{width:14,height:14}}/> Caricamento...</div>}
            {!galleryLoading&&galleryLoaded===activeClient.id&&<button onClick={()=>{setGalleryLoaded(null);setSelectedGalleryIdxs(new Set());}} style={{fontSize:11,color:"#6366f1",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Ricarica</button>}
            <label style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:10,border:"1px solid #e2e8f0",background:"#fff",color:"#1e293b",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>
              <Icons.Plus size={14} color="#6366f1"/> Carica foto
              <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{
                const files=Array.from(e.target.files||[]);
                if(!files.length)return;
                files.forEach(f=>{
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    setGalleryImages(prev=>[{url:ev.target.result,source:"upload",name:f.name},...prev]);
                  };
                  reader.readAsDataURL(f);
                });
                e.target.value="";
              }}/>
            </label>
          </div>
        </div>
        <p style={{fontSize:12,color:"#94a3b8",marginBottom:12,marginTop:0}}>Clicca sulle immagini per selezionarle — Gemini le userà come riferimento quando generi la grafica.</p>
        {selectedGalleryIdxs.size>0&&<div style={{background:"#eef2ff",borderRadius:10,padding:10,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <Icons.Check size={14} color="#6366f1"/>
          <span style={{fontSize:12,color:"#4338ca"}}><strong>{selectedGalleryIdxs.size}</strong> immagini selezionate — verranno inviate a Gemini come riferimento visivo per la grafica</span>
        </div>}
        {galleryImages.length===0&&!galleryLoading&&<div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:13,background:"#f8fafc",borderRadius:10}}>
          <div style={{marginBottom:12}}>
            {activeClient.website||activeClient.driveFolder?"Nessuna immagine trovata dal sito/Drive.":"Nessun sito web o cartella Drive configurata."}
          </div>
          <button onClick={async()=>{
            setGalleryLoading(true);
            const queries=getStockPhotoQueries(activeClient);
            let allStock=[];
            for(const q of queries.slice(0,3)){
              try{const photos=await searchStockPhotos(q,8);allStock.push(...photos);}catch(e){}
            }
            allStock=[...new Set(allStock)];
            if(allStock.length>0){
              setGalleryImages(allStock.map(url=>({url,source:"stock",name:"Unsplash"})));
              scrapedImagesCache[activeClient.id+"_stock"]=allStock;
            }
            setGalleryLoading(false);
          }} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,transition:"transform .12s"}}
          onMouseOver={e=>e.currentTarget.style.transform="scale(1.03)"}
          onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}>
            <Icons.Image size={14}/> Cerca foto stock per "{activeClient.sector||"business"}"
          </button>
          <div style={{fontSize:10,color:"#b0b8c4",marginTop:8}}>Foto gratuite da Unsplash, pertinenti al settore del cliente</div>
        </div>}
        {galleryImages.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8}}>
          {galleryImages.map((img,i)=>{
            const selected=selectedGalleryIdxs.has(i);
            return <div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:8,overflow:"hidden",border:selected?"3px solid #6366f1":"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",transition:"all .15s",transform:selected?"scale(0.95)":"scale(1)",boxShadow:selected?"0 0 0 2px rgba(99,102,241,.3)":"none"}}
              onClick={()=>toggleGallerySelect(i)}>
              <img src={img.url} style={{width:"100%",height:"100%",objectFit:"cover",opacity:selected?1:.75}} onError={e=>{e.target.parentElement.style.display="none";}} loading="lazy"/>
              {selected&&<div style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 4px rgba(0,0,0,.3)"}}><Icons.Check size={14} color="#fff"/></div>}
              {/* Delete button — always visible */}
              <div onClick={e=>{e.stopPropagation();setGalleryImages(prev=>prev.filter((_,j)=>j!==i));setSelectedGalleryIdxs(prev=>{const ns=new Set();prev.forEach(idx=>{if(idx<i)ns.add(idx);else if(idx>i)ns.add(idx-1);});return ns;});}}
                style={{position:"absolute",top:4,left:4,width:22,height:22,borderRadius:"50%",background:"rgba(239,68,68,.9)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 4px rgba(0,0,0,.3)",cursor:"pointer",transition:"transform .12s"}}
                onMouseOver={e=>e.currentTarget.style.transform="scale(1.2)"}
                onMouseOut={e=>e.currentTarget.style.transform="scale(1)"}
                title="Rimuovi immagine">
                <Icons.X size={12} color="#fff"/>
              </div>
              <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"2px 6px",background:selected?"rgba(99,102,241,.85)":"rgba(0,0,0,.5)",fontSize:9,color:"#fff",textAlign:"center"}}>
                {img.source==="drive"?"Drive":img.source==="website"?"Sito":img.source==="stock"?"Stock":"Caricata"}
              </div>
            </div>;
          })}
        </div>}
      </div>

      {/* ── Stile grafica ── */}
      <div style={{marginTop:20,background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <Icons.Sparkles size={18} color="#a855f7"/>
          <h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>Stile grafica</h3>
        </div>
        <p style={{fontSize:12,color:"#94a3b8",margin:"0 0 12px"}}>Descrivi come vuoi che sia la grafica. Se lasci vuoto, userà lo stile definito nella scheda cliente.</p>
        <textarea value={graphicStyle} onChange={e=>setGraphicStyle(e.target.value)} placeholder={"Descrivi lo stile che vuoi per la grafica, es:\n• Foto di sfondo con scritte sopra in bianco\n• Sfondo pieno rosso scuro con testo grande al centro\n• Collage di foto del locale con titolo sopra\n• Stile minimal, solo testo su sfondo chiaro\n• Foto del piatto a sinistra, testo a destra"} style={{...inputStyle,height:80,resize:"vertical",fontSize:13,lineHeight:1.5}}/>
        {/* Quick style presets */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:-8}}>
          {["Solo foto (no testo)","Solo colore di sfondo","Foto sfondo + scritte sopra","Sfondo pieno + testo grande","Collage foto","Minimal solo testo","Foto prodotto + testo laterale"].map(s=><button key={s} onClick={()=>setGraphicStyle(s)} style={{padding:"4px 12px",borderRadius:8,border:"1px solid "+(graphicStyle===s?"#6366f1":"#e2e8f0"),background:graphicStyle===s?"#eef2ff":"#f8fafc",color:graphicStyle===s?"#6366f1":"#64748b",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{s}</button>)}
        </div>
      </div>

      {/* ── Bottone Genera ── */}
      <div style={{marginTop:20}}>
        <button onClick={handleGenerate} disabled={isGenerating||convertingSelected} style={{width:"100%",padding:"16px 0",borderRadius:14,border:"none",background:isGenerating||convertingSelected?"#94a3b8":"linear-gradient(135deg,#6366f1,#a855f7)",color:"#fff",fontSize:16,fontWeight:700,cursor:isGenerating||convertingSelected?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 12px rgba(99,102,241,.3)"}}>
          {isGenerating?<><div className="spinner"/> Recupero immagini e genero post...</>:convertingSelected?<><div className="spinner"/> Preparazione immagini selezionate...</>:<><Icons.Sparkles size={20}/> Genera {customThemes.length>0?customThemes.length+" post personalizzati":(genConfig.postCount||5)+" post"}{selectedGalleryIdxs.size>0?" con "+selectedGalleryIdxs.size+" foto selezionate":""}</>}
        </button>
        {scrapingResult&&<div style={{marginTop:12,padding:12,borderRadius:10,background:scrapingResult.includes("Non sono")?"#fef3c7":"#f0fdf4",display:"flex",alignItems:"center",gap:8}}>
          {scrapingResult.includes("Non sono")?<Icons.X size={14} color="#f59e0b"/>:<Icons.Check size={14} color="#10b981"/>}
          <span style={{fontSize:12,color:scrapingResult.includes("Non sono")?"#92400e":"#166534"}}>{scrapingResult}</span>
        </div>}
      </div>

      {/* ── Post del cliente (PED Builder) ── */}
      {clientPosts.length>0&&<div style={{marginTop:28}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{margin:0,fontSize:18,fontWeight:700,color:"#1e293b"}}>Post di {activeClient.name} ({clientPosts.length})</h3>
          {pedSelection.size>0&&<Badge color="#6366f1" style={{fontSize:13,padding:"6px 16px"}}>{pedSelection.size} / {clientPosts.length} nella presentazione</Badge>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {clientPosts.map((post,idx)=>{
            const img=post.generatedImage||post.scrapedImage||(post.image?.url);
            const inPed=pedSelection.has(post.id);
            const pastelColors=["#eef2ff","#fdf2f8","#ecfdf5","#fefce8","#f0f9ff","#faf5ff","#fff7ed","#f0fdfa"];
            const bgColor=pastelColors[idx%pastelColors.length];
            return <div key={post.id} style={{background:"#fff",borderRadius:16,border:inPed?"2px solid #6366f1":"1px solid #e2e8f0",overflow:"hidden",boxShadow:inPed?"0 0 0 3px rgba(99,102,241,.15)":"0 1px 3px rgba(0,0,0,.04)",transition:"all .2s"}}>
              <div style={{display:"flex",gap:0}}>
                {/* Left: Copy */}
                <div style={{flex:1,padding:20,borderRight:"1px solid #f1f5f9",minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <Badge color="#6366f1" style={{fontSize:11}}>Post {idx+1}</Badge>
                    <span style={{fontSize:12,color:"#94a3b8",fontWeight:500}}>{post.date||"—"}</span>
                    {post.theme&&<Badge color="#f59e0b" style={{fontSize:10}}>{post.theme}</Badge>}
                    <Badge color={post.status==="bozza"?"#f59e0b":post.status==="approvato"?"#10b981":"#8b5cf6"} style={{fontSize:10}}>{post.status}</Badge>
                  </div>
                  <div onClick={()=>{setSelectedPost(post);setView("post-detail");}} style={{fontSize:14,color:"#1e293b",lineHeight:1.7,whiteSpace:"pre-wrap",cursor:"pointer",maxHeight:200,overflow:"auto",padding:12,background:"#f8fafc",borderRadius:10,border:"1px solid #f1f5f9"}}>
                    {post.body||"Nessun testo"}
                  </div>
                  {post.hashtags&&post.hashtags.length>0&&<div style={{marginTop:8,fontSize:12,color:"#6366f1"}}>{post.hashtags.slice(0,6).join(" ")}</div>}
                </div>
                {/* Right: Image preview */}
                <div style={{width:200,flexShrink:0,background:bgColor,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>{setSelectedPost(post);setView("post-detail");}}>
                  {img?<img src={img} style={{width:"100%",height:"100%",objectFit:"cover",minHeight:180}} onError={e=>{e.target.style.display="none";}}/>
                  :<div style={{textAlign:"center",padding:20}}><Icons.Image size={36} color="#cbd5e1"/><div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>Genera grafica</div></div>}
                </div>
              </div>
              {/* Bottom: Action buttons */}
              <div style={{display:"flex",gap:8,padding:"12px 20px",borderTop:"1px solid #f1f5f9",background:"#fafbfc"}}>
                <button onClick={()=>{setSelectedPost(post);setView("post-detail");}} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#6366f1",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  <Icons.Sparkles size={14}/> Rigenera
                </button>
                <button onClick={(e)=>{e.stopPropagation();togglePed(post.id);}} style={{padding:"8px 16px",borderRadius:8,border:inPed?"2px solid #6366f1":"1px solid #e2e8f0",background:inPed?"#6366f1":"#fff",color:inPed?"#fff":"#475569",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all .15s"}}>
                  {inPed?<><Icons.Check size={14}/> Aggiunto alla presentazione</>:<><Icons.Plus size={14}/> Aggiungi alla presentazione</>}
                </button>
              </div>
            </div>;
          })}
        </div>

        {/* ── Genera Presentazione PED ── */}
        {pedSelection.size>0&&<div style={{marginTop:24,padding:24,background:"linear-gradient(135deg,#eef2ff,#faf5ff)",borderRadius:16,border:"2px solid #c7d2fe"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:"#1e293b"}}>Presentazione PED pronta</div>
              <div style={{fontSize:13,color:"#64748b",marginTop:2}}>{pedSelection.size} post selezionati · File 2560×1440 px · Formato PDF</div>
            </div>
            <button onClick={()=>setPedSelection(new Set())} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,cursor:"pointer"}}>Deseleziona tutti</button>
          </div>
          <button onClick={generaPED} disabled={pedGenerating} style={{width:"100%",padding:"16px 0",borderRadius:12,border:"none",background:pedGenerating?"#94a3b8":"linear-gradient(135deg,#1e293b,#334155)",color:"#fff",fontSize:16,fontWeight:700,cursor:pedGenerating?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 4px 16px rgba(0,0,0,.2)"}}>
            {pedGenerating?<><div className="spinner"/> Generazione PED in corso...</>:<><Icons.Download size={20}/> Genera presentazione PED</>}
          </button>
        </div>}
      </div>}
    </div>
  );
}

// ─── New Client Form ───────────────────────────────────────────
function NewClientForm({onSave,onCancel,labelStyle,inputStyle,canvaBrandKitsDyn}){
  const[form,setForm]=useState({name:"",sector:SECTORS[0],customSector:"",tone:TONES[0],target:"",description:"",website:"",driveFolder:"",campaigns:0,postsToCreate:0,totalPosts:0,totalAds:0,palette:COLOR_PALETTES[0],paletteMode:"preset",customColors:["#6366f1","#a855f7","#f59e0b","#10b981"],brandColorsPaste:"",instagram:"",facebook:"",fontHeading:FONT_LIST[0],fontHeadingCustom:"",fontBody:FONT_LIST[4],fontBodyCustom:"",canvaBrandKit:"",canvaLink:"",canvaStyle:"",services:[],logo:null,logoName:"",files:[]});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const logoRef=useRef(null);
  const handleLogo=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      resizeImageBase64(ev.target.result,256).then(resized=>{
        set("logo",resized);set("logoName",file.name);
      });
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };
  return(
    <div style={{background:"#fff",borderRadius:16,padding:28,border:"1px solid #e2e8f0",marginBottom:20}}>
      <h3 style={{margin:"0 0 20px",fontSize:18,fontWeight:700,color:"#1e293b"}}>Nuovo cliente</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
        <div><label style={labelStyle}>Nome brand *</label><input style={inputStyle} placeholder="Es. Ristorante Da Mario" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
        <div><label style={labelStyle}>Settore</label><select style={{...inputStyle,marginBottom:form.sector==="Altro"?8:16}} value={form.sector} onChange={e=>{set("sector",e.target.value);if(e.target.value!=="Altro")set("customSector","");}}>{SECTORS.map(s=><option key={s}>{s}</option>)}</select>{form.sector==="Altro"&&<input style={inputStyle} placeholder="Specifica il settore (es. Fotografia, Musica, Veterinaria...)" value={form.customSector} onChange={e=>set("customSector",e.target.value)}/>}</div>
        {/* ── Logo Upload ── */}
        <div style={{gridColumn:"1 / -1"}}>
          <label style={labelStyle}>Logo del brand</label>
          <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:16}}>
            {form.logo?<div style={{position:"relative"}}>
              <img src={form.logo} style={{width:72,height:72,borderRadius:12,objectFit:"contain",border:"2px solid #e2e8f0",background:"#f8fafc"}}/>
              <button onClick={()=>{set("logo",null);set("logoName","");}} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:"#ef4444",border:"2px solid #fff",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            :<div onClick={()=>logoRef.current?.click()} style={{width:72,height:72,borderRadius:12,border:"2px dashed #e2e8f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#fafbfc",gap:4,transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"} onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}>
              <Icons.Upload size={20} color="#94a3b8"/>
              <span style={{fontSize:10,color:"#94a3b8"}}>Carica logo</span>
            </div>}
            <input ref={logoRef} type="file" accept="image/*" onChange={handleLogo} style={{display:"none"}}/>
            <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>
              {form.logo?<><strong>{form.logoName||"logo.png"}</strong><br/><span style={{color:"#94a3b8"}}>Clicca × per rimuovere</span></>
              :<>Carica il logo in formato PNG, JPG o SVG<br/><span style={{color:"#94a3b8"}}>Opzionale — apparirà nella scheda cliente</span></>}
            </div>
          </div>
        </div>
        <div><label style={labelStyle}>Tono di voce</label><select style={inputStyle} value={form.tone} onChange={e=>set("tone",e.target.value)}>{TONES.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label style={labelStyle}>Target / Pubblico</label><input style={inputStyle} placeholder="Es. Donne 25-45" value={form.target} onChange={e=>set("target",e.target.value)}/></div>
        <div style={{gridColumn:"1 / -1"}}><label style={labelStyle}>Descrizione / Bio brand</label><textarea style={{...inputStyle,height:70,resize:"vertical"}} placeholder="Breve descrizione dell'attività..." value={form.description} onChange={e=>set("description",e.target.value)}/></div>
        <div><label style={labelStyle}>Totale Post previsti</label><input type="number" min={0} style={inputStyle} placeholder="Es. 48" value={form.totalPosts||""} onChange={e=>set("totalPosts",+e.target.value||0)}/></div>
        <div><label style={labelStyle}>Totale ADV previste</label><input type="number" min={0} style={inputStyle} placeholder="Es. 12" value={form.totalAds||""} onChange={e=>set("totalAds",+e.target.value||0)}/></div>
        <div><label style={labelStyle}>Sito web</label><input style={inputStyle} placeholder="https://www.nomebrand.it" value={form.website} onChange={e=>set("website",e.target.value)}/></div>
        <div><label style={labelStyle}>Cartella Google Drive</label><input style={inputStyle} placeholder="https://drive.google.com/drive/folders/..." value={form.driveFolder} onChange={e=>set("driveFolder",e.target.value)}/></div>
        <div><label style={labelStyle}>Profilo Instagram</label><input style={inputStyle} placeholder="@nomebrand" value={form.instagram} onChange={e=>set("instagram",e.target.value)}/></div>
        <div><label style={labelStyle}>Pagina Facebook</label><input style={inputStyle} placeholder="facebook.com/nomebrand" value={form.facebook} onChange={e=>set("facebook",e.target.value)}/></div>
        <div style={{gridColumn:"1 / -1"}}>
          <label style={labelStyle}>Palette colori</label>
          {/* Preset palettes */}
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
            {COLOR_PALETTES.map(pal=><div key={pal.name} onClick={()=>{set("palette",pal);set("paletteMode","preset");}} style={{cursor:"pointer",padding:8,borderRadius:10,border:form.paletteMode==="preset"&&form.palette.name===pal.name?"2px solid #6366f1":"2px solid transparent",background:form.paletteMode==="preset"&&form.palette.name===pal.name?"#eef2ff":"#f8fafc"}}>
              <div style={{display:"flex",gap:4,marginBottom:4}}>{pal.colors.map(c=><div key={c} style={{width:24,height:24,borderRadius:"50%",background:c}}/>)}</div>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",textAlign:"center"}}>{pal.name}</div>
            </div>)}
            {/* Custom palette option */}
            <div onClick={()=>set("paletteMode","custom")} style={{cursor:"pointer",padding:8,borderRadius:10,border:form.paletteMode==="custom"?"2px solid #6366f1":"2px solid transparent",background:form.paletteMode==="custom"?"#eef2ff":"#f8fafc",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:80}}>
              <div style={{width:24,height:24,borderRadius:"50%",border:"2px dashed #94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#94a3b8"}}>+</div>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",textAlign:"center",marginTop:4}}>Custom</div>
            </div>
          </div>
          {/* Custom color pickers */}
          {form.paletteMode==="custom"&&<div style={{background:"#f8fafc",borderRadius:12,padding:16,marginBottom:12}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:12,fontWeight:600,color:"#64748b"}}>Inserisci i colori del brand:</span>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:12}}>
              {[0,1,2,3].map(i=><div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{position:"relative",width:44,height:44,borderRadius:10,border:"2px solid #e2e8f0",overflow:"hidden",cursor:"pointer",background:form.customColors?.[i]||"#e2e8f0"}}>
                  <input type="color" value={form.customColors?.[i]||"#6366f1"} onChange={e=>{const cols=[...(form.customColors||["#6366f1","#a855f7","#f59e0b","#10b981"])];cols[i]=e.target.value;set("customColors",cols);set("palette",{name:"Custom",colors:cols});}} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none",padding:0}}/>
                </div>
                <input value={form.customColors?.[i]||""} onChange={e=>{const cols=[...(form.customColors||["#6366f1","#a855f7","#f59e0b","#10b981"])];cols[i]=e.target.value;set("customColors",cols);set("palette",{name:"Custom",colors:cols});}} placeholder="#hex" style={{width:70,fontSize:10,padding:"3px 6px",borderRadius:4,border:"1px solid #e2e8f0",textAlign:"center",fontFamily:"monospace"}}/>
              </div>)}
            </div>
            {/* Brand identity paste - rimosso su richiesta */}
          </div>}
          {/* Preview of selected palette */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <span style={{fontSize:11,color:"#94a3b8"}}>Palette attiva:</span>
            <div style={{display:"flex",gap:4}}>{(form.palette?.colors||[]).map((c,i)=><div key={i} style={{width:20,height:20,borderRadius:6,background:c,border:"1px solid #e2e8f0"}}/>)}</div>
            <span style={{fontSize:11,fontWeight:600,color:"#6366f1"}}>{form.palette?.name||"—"}</span>
          </div>
        </div>
        {/* ── Font Selection ── */}
        <div><label style={labelStyle}>Font titoli</label>
          <select style={{...inputStyle,marginBottom:form.fontHeading==="Personalizzato"?8:16,fontFamily:form.fontHeading!=="Personalizzato"?form.fontHeading:"inherit"}} value={form.fontHeading} onChange={e=>{set("fontHeading",e.target.value);if(e.target.value!=="Personalizzato")set("fontHeadingCustom","");}}>
            {FONT_LIST.map(f=><option key={f} style={{fontFamily:f!=="Personalizzato"?f:"inherit"}}>{f}</option>)}
          </select>
          {form.fontHeading==="Personalizzato"&&<input style={inputStyle} placeholder="Nome del font (es. Archivo Black, Caveat...)" value={form.fontHeadingCustom} onChange={e=>set("fontHeadingCustom",e.target.value)}/>}
        </div>
        <div><label style={labelStyle}>Font corpo testo</label>
          <select style={{...inputStyle,marginBottom:form.fontBody==="Personalizzato"?8:16,fontFamily:form.fontBody!=="Personalizzato"?form.fontBody:"inherit"}} value={form.fontBody} onChange={e=>{set("fontBody",e.target.value);if(e.target.value!=="Personalizzato")set("fontBodyCustom","");}}>
            {FONT_LIST.map(f=><option key={f} style={{fontFamily:f!=="Personalizzato"?f:"inherit"}}>{f}</option>)}
          </select>
          {form.fontBody==="Personalizzato"&&<input style={inputStyle} placeholder="Nome del font (es. Source Sans Pro, DM Sans...)" value={form.fontBodyCustom} onChange={e=>set("fontBodyCustom",e.target.value)}/>}
        </div>
        {/* ── Canva Brand Kit ── */}
        <div style={{gridColumn:"1 / -1"}}>
          <label style={labelStyle}>Brand Kit Canva</label>
          <select style={{...inputStyle,marginBottom:8}} value={form.canvaBrandKit||""} onChange={e=>set("canvaBrandKit",e.target.value)}>
            <option value="">— Nessun brand kit —</option>
            {(canvaBrandKitsDyn||CANVA_BRAND_KITS).map(bk=><option key={bk.id} value={bk.id}>{bk.name}</option>)}
          </select>
          {form.canvaBrandKit&&<div style={{background:"#ede9fe",borderRadius:8,padding:10,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <Icons.Sparkles size={14} color="#7c3aed"/>
            <span style={{fontSize:11,color:"#5b21b6"}}>I font e lo stile del brand kit "{(canvaBrandKitsDyn||CANVA_BRAND_KITS).find(b=>b.id===form.canvaBrandKit)?.name}" verranno usati per la generazione</span>
          </div>}
        </div>
        {/* ── Canva Link & Style ── */}
        <div style={{gridColumn:"1 / -1"}}>
          <label style={labelStyle}>Link progetto Canva (opzionale)</label>
          <input style={{...inputStyle,marginBottom:8}} placeholder="https://www.canva.com/design/..." value={form.canvaLink} onChange={e=>set("canvaLink",e.target.value)}/>
          <label style={labelStyle}>Stile Canva — Descrivi lo stile visivo dei post esistenti</label>
          <textarea style={{...inputStyle,height:80,resize:"vertical",fontSize:12,lineHeight:1.5}} placeholder={"Descrivi i colori, font, tono del copy e stile grafico del progetto Canva.\nEs: Sfondo rosso scuro, testo crema bold, tono amichevole/dialettale, CTA: 'prenota il tuo tavolo'"} value={form.canvaStyle||""} onChange={e=>set("canvaStyle",e.target.value)}/>
          {form.canvaStyle&&<div style={{background:"#fef3c7",borderRadius:8,padding:10,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <Icons.Sparkles size={14} color="#f59e0b"/>
            <span style={{fontSize:11,color:"#92400e"}}>I post generati seguiranno questo stile di riferimento</span>
          </div>}
        </div>
        {/* ── Servizi acquistati ── */}
        <div style={{gridColumn:"1 / -1"}}>
          <label style={labelStyle}>Servizi acquistati</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {["Meta","LinkedIn","Google Ads"].map(svc=>{
              const active=(form.services||[]).includes(svc);
              return <button key={svc} type="button" onClick={()=>{
                const next=active?(form.services||[]).filter(s=>s!==svc):[...(form.services||[]),svc];
                set("services",next);
              }} style={{padding:"8px 18px",borderRadius:10,border:active?"2px solid #6366f1":"1px solid #e2e8f0",background:active?"#eef2ff":"#fff",color:active?"#4f46e5":"#64748b",fontSize:13,fontWeight:active?700:500,cursor:"pointer",transition:"all .15s"}}>{svc}</button>;
            })}
          </div>
        </div>
        {/* ── File Upload ── */}
        <div style={{gridColumn:"1 / -1"}}>
          <FileUploader files={form.files} onChange={(f)=>set("files",f)} labelStyle={labelStyle}/>
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
        <IconBtn icon={Icons.X} label="Annulla" onClick={onCancel}/>
        <IconBtn icon={Icons.Check} label="Salva cliente" onClick={()=>{if(!form.name.trim())return;const saved={...form,sector:form.sector==="Altro"?(form.customSector.trim()||"Altro"):form.sector,fontHeading:form.fontHeading==="Personalizzato"?(form.fontHeadingCustom.trim()||"Montserrat"):form.fontHeading,fontBody:form.fontBody==="Personalizzato"?(form.fontBodyCustom.trim()||"Open Sans"):form.fontBody,canvaStyle:form.canvaStyle||""};delete saved.customSector;delete saved.fontHeadingCustom;delete saved.fontBodyCustom;delete saved.paletteMode;delete saved.customColors;delete saved.brandColorsPaste;onSave(saved);}} style={{background:"#6366f1",color:"#fff",border:"none",opacity:form.name.trim()?1:0.5}}/>
      </div>
    </div>
  );
}

// ─── Client Card ───────────────────────────────────────────────
function ClientCard({client,active,postCount,onSelect,onDelete}){
  const fileCount=client.files?.length||0;
  return(
    <div onClick={onSelect} style={{background:"#fff",borderRadius:14,padding:20,border:active?"2px solid #6366f1":"1px solid #e2e8f0",cursor:"pointer",transition:"all .15s",position:"relative"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          {hasLogo(client.logo)?<img src={client.logo} style={{width:36,height:36,borderRadius:8,objectFit:"contain",border:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}/>
          :<div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,"+(client.palette?.colors?.[0]||"#6366f1")+","+(client.palette?.colors?.[1]||"#a855f7")+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff",flexShrink:0}}>{client.name?.charAt(0)||"?"}</div>}
          <div><h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>{client.name}</h3><p style={{margin:"4px 0 0",fontSize:12,color:"#94a3b8"}}>{client.sector}</p></div>
        </div>
        <button onClick={e=>{e.stopPropagation();onDelete();}} style={{background:"none",border:"none",cursor:"pointer",padding:4,color:"#cbd5e1"}}><Icons.Trash size={16}/></button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        <Badge color="#6366f1">{client.tone}</Badge>
        {client.target&&<Badge color="#10b981">{client.target.split(",")[0].trim().substring(0,20)}</Badge>}
        {client.fontHeading&&<Badge color="#8b5cf6" style={{fontSize:10}}>H: {client.fontHeading}</Badge>}
        {client.fontBody&&<Badge color="#64748b" style={{fontSize:10}}>B: {client.fontBody}</Badge>}
        {fileCount>0&&<Badge color="#f59e0b" style={{fontSize:10}}>{fileCount} file</Badge>}
      </div>
      <div style={{display:"flex",gap:4}}>{client.palette?.colors.map(c=><div key={c} style={{width:16,height:16,borderRadius:4,background:c}}/>)}</div>
      {/* Thumbnail strip of uploaded images */}
      {client.files?.filter(f=>f.type?.startsWith("image/")).length>0&&<div style={{display:"flex",gap:4,marginTop:8}}>
        {client.files.filter(f=>f.type?.startsWith("image/")).slice(0,4).map(f=><img key={f.id} src={f.dataUrl} style={{width:32,height:32,borderRadius:6,objectFit:"cover",border:"1px solid #e2e8f0"}}/>)}
        {client.files.filter(f=>f.type?.startsWith("image/")).length>4&&<div style={{width:32,height:32,borderRadius:6,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,color:"#94a3b8"}}>+{client.files.filter(f=>f.type?.startsWith("image/")).length-4}</div>}
      </div>}
      <div style={{marginTop:8,fontSize:12,color:"#94a3b8"}}>{postCount} post generati</div>
    </div>
  );
}

// Helper: roundRect for canvas
function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ─── Post Designer (inline editor) ────────────────────────────
function PostDesigner({post,client,onUpdate}){
  const canvasRef=useRef(null);
  const containerRef=useRef(null);
  const[template,setTemplate]=useState("classic");
  const[layers,setLayers]=useState(()=>post.designLayers||{
    bgColor:client?.palette?.colors?.[0]||"#8B1A1A",
    textColor:client?.palette?.colors?.[1]||"#F5E6C8",
    accentColor:client?.palette?.colors?.[2]||"#D4A574",
    headline:(post.slogan||post.theme)?.toUpperCase()||"HEADLINE",
    brandName:client?.name?.toUpperCase()||"BRAND",
    cta:post.cta||"Scopri di più",
    infoLine:(client?.addresses?.length?client.addresses.join(" | "):client?.address)||"",
    fontFamily:(client?.canvaBrandKit?getBrandKitFonts(client).heading:null)||client?.fontHeading||"Arial Black",
    headlineSize:42,brandSize:54,ctaSize:22,infoSize:12,
    showBgImage:false,bgImageData:null,
    // Draggable positions (relative 0-1)
    headlinePos:{x:0.5,y:0.22},
    brandPos:{x:0.5,y:0.52},
    ctaPos:{x:0.5,y:0.78},
    infoPos:{x:0.5,y:0.92},
    // Reference image
    referenceImage:null,referenceDesc:"",
  });
  const[dragging,setDragging]=useState(null);
  const[dragOffset,setDragOffset]=useState({x:0,y:0});
  const[selectedLayer,setSelectedLayer]=useState(null);
  const[showTemplates,setShowTemplates]=useState(false);

  const set=(k,v)=>{const nl={...layers,[k]:v};setLayers(nl);onUpdate({designLayers:nl});};
  const setMulti=(obj)=>{const nl={...layers,...obj};setLayers(nl);onUpdate({designLayers:nl});};

  const tpl=DESIGN_TEMPLATES.find(t=>t.id===template)||DESIGN_TEMPLATES[0];
  const lo=tpl.layout;

  // Hit-test regions for dragging
  const hitRegions=useRef([]);

  const getCanvasScale=()=>{
    const canvas=canvasRef.current;if(!canvas)return 1;
    return canvas.width/canvas.getBoundingClientRect().width;
  };

  // ─── Draw ─────────────────────────────────────
  const draw=useCallback(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;
    const regions=[];

    const doDrawContent=()=>{
      // Template decorations
      const borderW=lo.borderW||0;
      const accent=layers.accentColor||layers.textColor;

      // Border
      if(borderW>0){
        ctx.strokeStyle=lo.borderColor==="auto"?accent:(lo.borderColor||accent);
        ctx.lineWidth=borderW;
        ctx.strokeRect(borderW/2,borderW/2,W-borderW,H-borderW);
        if(lo.innerBorder){
          ctx.lineWidth=1;
          ctx.strokeRect(borderW+8,borderW+8,W-borderW*2-16,H-borderW*2-16);
        }
      }

      // Accent bar
      if(lo.accentBar){
        ctx.fillStyle=accent;
        ctx.fillRect(0,0,8,H);
      }

      // Banner background
      if(lo.banner){
        ctx.fillStyle=accent;
        ctx.globalAlpha=0.85;
        ctx.fillRect(0,H*lo.bannerY,W,H*lo.bannerH);
        ctx.globalAlpha=1;
      }

      // Split
      if(lo.split){
        ctx.fillStyle=layers.textColor;
        ctx.globalAlpha=0.12;
        ctx.fillRect(0,H*0.45,W,H*0.55);
        ctx.globalAlpha=1;
      }

      // Divider line
      if(lo.dividerLine){
        ctx.strokeStyle=accent;
        ctx.lineWidth=2;
        ctx.beginPath();
        const dw=W*0.3;
        ctx.moveTo(W/2-dw,H*0.42);ctx.lineTo(W/2+dw,H*0.42);
        ctx.moveTo(W/2-dw,H*0.68);ctx.lineTo(W/2+dw,H*0.68);
        ctx.stroke();
      }

      // Logo
      if(lo.logoPos&&client?.logo){
        const logoImg=new Image();
        logoImg.onload=()=>{
          const lh=40;const lw=lh*(logoImg.width/logoImg.height||1);
          let lx=W/2-lw/2,ly=16;
          if(lo.logoPos==="top-right"){lx=W-lw-20;ly=20;}
          else if(lo.logoPos==="top-center"){lx=W/2-lw/2;ly=16;}
          ctx.drawImage(logoImg,lx,ly,lw,lh);
        };
        logoImg.src=client.logo;
      }

      const align=lo.align||"center";
      ctx.textAlign=align;
      const xBase=align==="left"?40:align==="right"?W-40:W/2;

      const hsMult=lo.headlineSizeMult||1;
      const bsMult=lo.brandSizeMult||1;

      // Headline
      const hx=layers.headlinePos.x*W, hy=layers.headlinePos.y*H;
      ctx.fillStyle=layers.textColor;
      const hs=Math.round(layers.headlineSize*hsMult);
      ctx.font=`900 ${hs}px "${layers.fontFamily}", "Arial Black", sans-serif`;
      const hBounds=wrapTextR(ctx,layers.headline,hx,hy,W-60,hs*1.1);
      regions.push({id:"headline",bounds:hBounds,label:"Headline"});

      // Brand
      const bx=layers.brandPos.x*W, by=layers.brandPos.y*H;
      const bs=Math.round(layers.brandSize*bsMult);
      ctx.font=`900 ${bs}px "${layers.fontFamily}", "Arial Black", sans-serif`;
      const bBounds=wrapTextR(ctx,layers.brandName,bx,by,W-40,bs*1.1);
      regions.push({id:"brand",bounds:bBounds,label:"Brand"});

      // CTA
      const cx2=layers.ctaPos.x*W, cy2=layers.ctaPos.y*H;
      ctx.font=`700 ${layers.ctaSize}px "${layers.fontFamily}", "Arial Black", sans-serif`;
      const ctaW=ctx.measureText(layers.cta).width;
      ctx.fillText(layers.cta,cx2,cy2);
      regions.push({id:"cta",bounds:{x:cx2-ctaW/2,y:cy2-layers.ctaSize,w:ctaW,h:layers.ctaSize*1.4},label:"CTA"});

      // Info
      if(layers.infoLine){
        const ix=layers.infoPos.x*W, iy=layers.infoPos.y*H;
        ctx.font=`400 ${layers.infoSize}px "Arial", sans-serif`;
        ctx.globalAlpha=0.8;
        const iW=ctx.measureText(layers.infoLine).width;
        ctx.fillText(layers.infoLine,ix,iy);
        ctx.globalAlpha=1;
        regions.push({id:"info",bounds:{x:ix-iW/2,y:iy-layers.infoSize,w:iW,h:layers.infoSize*1.4},label:"Info"});
      }

      // Selection highlight
      if(selectedLayer){
        const selR=regions.find(r=>r.id===selectedLayer);
        if(selR){
          ctx.strokeStyle="#6366f1";ctx.lineWidth=2;ctx.setLineDash([6,3]);
          ctx.strokeRect(selR.bounds.x-6,selR.bounds.y-6,selR.bounds.w+12,selR.bounds.h+12);
          ctx.setLineDash([]);
          // Corner dots
          const b=selR.bounds;
          [[b.x-6,b.y-6],[b.x+b.w+6,b.y-6],[b.x-6,b.y+b.h+6],[b.x+b.w+6,b.y+b.h+6],[b.x+b.w/2,b.y-6],[b.x+b.w/2,b.y+b.h+6]].forEach(([px,py])=>{
            ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fillStyle="#6366f1";ctx.fill();
          });
        }
      }

      // Visual template extras
      const activeVT=VISUAL_TEMPLATES.find(v=>"visual-"+v.id===template);
      if(activeVT&&activeVT.drawExtras){
        try{activeVT.drawExtras(ctx,W,H,layers);}catch(e){console.warn("drawExtras error:",e);}
      }

      hitRegions.current=regions;
    };

    // Background
    if(layers.showBgImage&&layers.bgImageData){
      const img=new Image();
      img.onload=()=>{
        ctx.drawImage(img,0,0,W,H);
        if(lo.overlay){
          ctx.fillStyle="#000";ctx.globalAlpha=lo.overlayOpacity||0.5;
          ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
        }
        doDrawContent();
      };
      img.src=layers.bgImageData;
    } else {
      ctx.fillStyle=layers.bgColor;
      ctx.fillRect(0,0,W,H);
      doDrawContent();
    }
  },[layers,template,selectedLayer]);

  // Wrap text and return bounds
  const wrapTextR=(ctx,text,x,y,maxW,lineH)=>{
    const words=text.split(" ");let line="";let cy=y;let maxMeasured=0;let startY=y;
    words.forEach(w=>{
      const test=line+w+" ";
      if(ctx.measureText(test).width>maxW&&line){
        const lw=ctx.measureText(line.trim()).width;
        if(lw>maxMeasured)maxMeasured=lw;
        ctx.fillText(line.trim(),x,cy);cy+=lineH;line=w+" ";
      } else line=test;
    });
    const lw=ctx.measureText(line.trim()).width;
    if(lw>maxMeasured)maxMeasured=lw;
    ctx.fillText(line.trim(),x,cy);
    const totalH=cy-startY+lineH;
    return{x:x-maxMeasured/2,y:startY-lineH*0.8,w:maxMeasured,h:totalH+lineH*0.3};
  };

  useEffect(()=>{draw();},[draw]);

  // Load font — use document.fonts API for reliable loading
  useEffect(()=>{
    if(!layers.fontFamily||layers.fontFamily==="Arial Black")return;
    const family=layers.fontFamily;
    // Add stylesheet if not already present
    const linkId="gfont-"+family.replace(/\s+/g,"-");
    if(!document.getElementById(linkId)){
      const link=document.createElement("link");
      link.id=linkId;
      link.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400;700;900&display=swap`;
      link.rel="stylesheet";document.head.appendChild(link);
    }
    // Wait for font to actually load, then redraw
    const tryLoad=async()=>{
      try{
        await document.fonts.load(`900 48px "${family}"`);
        await document.fonts.load(`700 24px "${family}"`);
        await document.fonts.load(`400 14px "${family}"`);
        draw();
      }catch(e){
        // Fallback: retry after delay
        setTimeout(draw,800);
        setTimeout(draw,1500);
      }
    };
    tryLoad();
    // Also redraw after a safety delay in case fonts API is slow
    const t1=setTimeout(draw,1000);
    const t2=setTimeout(draw,2000);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[layers.fontFamily]);

  // ─── Mouse dragging ──────────────────────────
  const getMousePos=(e)=>{
    const canvas=canvasRef.current;if(!canvas)return{x:0,y:0};
    const rect=canvas.getBoundingClientRect();
    const scale=getCanvasScale();
    return{x:(e.clientX-rect.left)*scale,y:(e.clientY-rect.top)*scale};
  };

  const handleMouseDown=(e)=>{
    const pos=getMousePos(e);
    const regions=hitRegions.current;
    // Check from top (last drawn = on top)
    for(let i=regions.length-1;i>=0;i--){
      const r=regions[i];const b=r.bounds;
      if(pos.x>=b.x-10&&pos.x<=b.x+b.w+10&&pos.y>=b.y-10&&pos.y<=b.y+b.h+10){
        setDragging(r.id);
        setSelectedLayer(r.id);
        const canvas=canvasRef.current;
        const posKey=r.id==="headline"?"headlinePos":r.id==="brand"?"brandPos":r.id==="cta"?"ctaPos":"infoPos";
        setDragOffset({x:pos.x/canvas.width-layers[posKey].x,y:pos.y/canvas.height-layers[posKey].y});
        e.preventDefault();
        return;
      }
    }
    setSelectedLayer(null);
  };

  const handleMouseMove=(e)=>{
    if(!dragging)return;
    const pos=getMousePos(e);
    const canvas=canvasRef.current;if(!canvas)return;
    const posKey=dragging==="headline"?"headlinePos":dragging==="brand"?"brandPos":dragging==="cta"?"ctaPos":"infoPos";
    const nx=Math.max(0.05,Math.min(0.95,pos.x/canvas.width-dragOffset.x));
    const ny=Math.max(0.05,Math.min(0.95,pos.y/canvas.height-dragOffset.y));
    setMulti({[posKey]:{x:nx,y:ny}});
  };

  const handleMouseUp=()=>{setDragging(null);};

  // Touch support
  const handleTouchStart=(e)=>{
    const touch=e.touches[0];if(!touch)return;
    handleMouseDown({clientX:touch.clientX,clientY:touch.clientY,preventDefault:()=>e.preventDefault()});
  };
  const handleTouchMove=(e)=>{
    const touch=e.touches[0];if(!touch)return;
    handleMouseMove({clientX:touch.clientX,clientY:touch.clientY});
  };

  const handleExport=()=>{
    setSelectedLayer(null);
    setTimeout(()=>{
      const canvas=canvasRef.current;if(!canvas)return;
      const a=document.createElement("a");
      a.download=`${client?.name||"post"}-${post.theme||"design"}.png`;
      a.href=canvas.toDataURL("image/png");a.click();
    },100);
  };

  const handleBgImage=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{setMulti({bgImageData:ev.target.result,showBgImage:true});};
    reader.readAsDataURL(file);e.target.value="";
  };

  const handleReferenceImage=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{set("referenceImage",ev.target.result);};
    reader.readAsDataURL(file);e.target.value="";
  };

  const applyTemplate=(tplId)=>{
    const t=DESIGN_TEMPLATES.find(t=>t.id===tplId);if(!t)return;
    setTemplate(tplId);
    const lo2=t.layout;
    setMulti({
      headlinePos:{x:lo2.align==="left"?0.15:0.5,y:lo2.headlineY},
      brandPos:{x:lo2.align==="left"?0.15:0.5,y:lo2.brandY},
      ctaPos:{x:lo2.align==="left"?0.15:0.5,y:lo2.ctaY},
      infoPos:{x:0.5,y:lo2.infoY},
    });
    setShowTemplates(false);
  };

  const applyVisualTemplate=(vt)=>{
    setTemplate("visual-"+vt.id);
    setMulti({
      ...vt.config,
      headlinePos:vt.config.headlinePos||{x:0.5,y:0.3},
      brandPos:vt.config.brandPos||{x:0.5,y:0.5},
      ctaPos:vt.config.ctaPos||{x:0.5,y:0.75},
      infoPos:vt.config.infoPos||{x:0.5,y:0.92},
    });
    setShowTemplates(false);
  };

  // ─── Custom Templates (per-client) ─────────
  const[customTemplates,setCustomTemplates]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("customTpl_"+(client?.id||"")))||[];}catch(e){return[];}
  });
  const saveCustomTemplates=(list)=>{setCustomTemplates(list);localStorage.setItem("customTpl_"+(client?.id||""),JSON.stringify(list));};
  const tplUploadRef=useRef(null);
  const handleUploadTemplate=(e)=>{
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const newTpl={id:Date.now()+"_"+Math.random().toString(36).slice(2,6),name:file.name.replace(/\.[^.]+$/,""),image:ev.target.result};
        saveCustomTemplates([...customTemplates,newTpl]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };
  const removeCustomTemplate=(id)=>{saveCustomTemplates(customTemplates.filter(t=>t.id!==id));};
  const applyCustomTemplate=(tpl)=>{
    setMulti({bgImageData:tpl.image,showBgImage:true});
    setTemplate("custom-"+tpl.id);
    setShowTemplates(false);
  };
  const[editingTplName,setEditingTplName]=useState(null);

  const bgImgRef=useRef(null);
  const refImgRef=useRef(null);
  const smallLabel={fontSize:10,fontWeight:600,color:"#64748b",marginBottom:3,display:"block"};
  const smallInput={width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:11,boxSizing:"border-box"};

  return(
    <div style={{background:"#fff",borderRadius:16,padding:16,border:"2px solid #a855f7"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <Icons.Palette size={16} color="#a855f7"/>
