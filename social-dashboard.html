          <h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Designer <Badge color="#a855f7" style={{fontSize:9}}>Drag & Drop</Badge></h4>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowTemplates(!showTemplates)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #e2e8f0",background:showTemplates?"#f1f5f9":"#fff",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,color:"#6366f1"}}>
            🎨 Template
          </button>
          <button onClick={handleExport} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"#a855f7",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <Icons.Download size={12}/> Esporta PNG
          </button>
        </div>
      </div>

      {/* Template selector */}
      {showTemplates&&<div style={{marginBottom:12,padding:10,background:"#f8fafc",borderRadius:10}}>
        {/* Visual templates from real examples */}
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:6}}>Stili grafici</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
          {VISUAL_TEMPLATES.map(vt=>(
            <div key={vt.id} onClick={()=>applyVisualTemplate(vt)}
              style={{borderRadius:8,overflow:"hidden",border:template===("visual-"+vt.id)?"2px solid #a855f7":"1px solid #e2e8f0",
              cursor:"pointer",transition:"all 0.15s",background:"#fff"}}>
              <img src={vt.thumb} style={{width:"100%",aspectRatio:"4/5",objectFit:"cover",display:"block"}}/>
              <div style={{padding:"4px 6px",textAlign:"center"}}>
                <div style={{fontSize:9,fontWeight:700,color:"#1e293b"}}>{vt.label}</div>
                <div style={{fontSize:7,color:"#94a3b8"}}>{vt.desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Simple layout templates */}
        <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:6,marginTop:6}}>Layout base</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
          {DESIGN_TEMPLATES.map(t=>(
            <div key={t.id} onClick={()=>applyTemplate(t.id)}
              style={{padding:8,borderRadius:8,border:template===t.id?"2px solid #6366f1":"1px solid #e2e8f0",
              background:template===t.id?"#eef2ff":"#fff",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
              <div style={{fontSize:20,marginBottom:2}}>{t.icon}</div>
              <div style={{fontSize:10,fontWeight:700,color:"#1e293b"}}>{t.label}</div>
              <div style={{fontSize:8,color:"#94a3b8",marginTop:2}}>{t.desc}</div>
            </div>
          ))}
        </div>

        {/* Custom uploaded templates */}
        <div style={{borderTop:"1px solid #e2e8f0",paddingTop:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontSize:10,fontWeight:700,color:"#64748b"}}>I tuoi template ({customTemplates.length})</div>
            <button onClick={()=>tplUploadRef.current?.click()} style={{padding:"3px 10px",borderRadius:6,border:"1px dashed #a855f7",background:"#faf5ff",fontSize:10,fontWeight:600,cursor:"pointer",color:"#7c3aed",display:"flex",alignItems:"center",gap:4}}>
              <Icons.Plus size={10}/> Carica template
            </button>
            <input ref={tplUploadRef} type="file" accept="image/*" multiple onChange={handleUploadTemplate} style={{display:"none"}}/>
          </div>
          {customTemplates.length===0&&<div style={{textAlign:"center",padding:"12px 0",color:"#94a3b8",fontSize:11}}>
            Carica le tue immagini template e le potrai usare come sfondo per i post
          </div>}
          {customTemplates.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {customTemplates.map(ct=>(
              <div key={ct.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:template===("custom-"+ct.id)?"2px solid #a855f7":"1px solid #e2e8f0",cursor:"pointer",transition:"all 0.15s"}}
                onClick={()=>applyCustomTemplate(ct)}>
                <img src={ct.image} style={{width:"100%",aspectRatio:"4/5",objectFit:"cover",display:"block"}}/>
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.7))",padding:"12px 6px 4px",textAlign:"center"}}>
                  {editingTplName===ct.id
                    ?<input autoFocus value={ct.name} onChange={e=>{const nl=customTemplates.map(t=>t.id===ct.id?{...t,name:e.target.value}:t);saveCustomTemplates(nl);}}
                      onBlur={()=>setEditingTplName(null)} onKeyDown={e=>{if(e.key==="Enter")setEditingTplName(null);}}
                      onClick={e=>e.stopPropagation()} style={{width:"90%",fontSize:9,padding:"2px 4px",borderRadius:3,border:"none",textAlign:"center",background:"rgba(255,255,255,0.9)"}}/>
                    :<div onDoubleClick={(e)=>{e.stopPropagation();setEditingTplName(ct.id);}} style={{fontSize:9,fontWeight:700,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)"}}>{ct.name}</div>
                  }
                </div>
                <button onClick={e=>{e.stopPropagation();removeCustomTemplate(ct.id);}} style={{position:"absolute",top:3,right:3,width:18,height:18,borderRadius:"50%",border:"none",background:"rgba(0,0,0,0.5)",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
              </div>
            ))}
          </div>}
        </div>
      </div>}

      {/* Canvas preview - DRAGGABLE */}
      <div ref={containerRef} style={{position:"relative",marginBottom:10,cursor:dragging?"grabbing":"default"}}>
        <canvas ref={canvasRef} width={540} height={675}
          style={{width:"100%",borderRadius:10,display:"block",cursor:dragging?"grabbing":"default"}}
          onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleMouseUp}
        />
        {!dragging&&<div style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:9,padding:"3px 8px",borderRadius:6,pointerEvents:"none"}}>
          Clicca e trascina le scritte per spostarle
        </div>}
      </div>

      {/* Reference image */}
      <div style={{marginBottom:10,padding:8,background:"#fefce8",borderRadius:8,border:"1px solid #fde68a"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:layers.referenceImage?6:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>🖼️</span>
            <span style={{fontSize:11,fontWeight:700,color:"#92400e"}}>Immagine di riferimento</span>
            <span style={{fontSize:9,color:"#b45309"}}>(lo stile verrà copiato nella generazione AI)</span>
          </div>
          <button onClick={()=>refImgRef.current?.click()} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #fbbf24",background:"#fff",fontSize:10,fontWeight:600,cursor:"pointer",color:"#92400e"}}>
            {layers.referenceImage?"Cambia":"Carica reference"}
          </button>
          <input ref={refImgRef} type="file" accept="image/*" onChange={handleReferenceImage} style={{display:"none"}}/>
        </div>
        {layers.referenceImage&&<div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <img src={layers.referenceImage} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:"2px solid #fbbf24"}}/>
          <div style={{flex:1}}>
            <textarea value={layers.referenceDesc||""} onChange={e=>set("referenceDesc",e.target.value)}
              placeholder="Descrivi lo stile da copiare (es: font bold rosso su sfondo beige, stile vintage, ecc.)"
              style={{...smallInput,height:50,resize:"vertical",fontSize:10}}/>
            <button onClick={()=>setMulti({referenceImage:null,referenceDesc:""})} style={{marginTop:4,padding:"2px 8px",borderRadius:4,border:"1px solid #fecaca",background:"#fff",fontSize:9,cursor:"pointer",color:"#ef4444"}}>Rimuovi</button>
          </div>
        </div>}
      </div>

      {/* Controls */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <label style={smallLabel}>Sfondo</label>
          <div style={{display:"flex",gap:4}}>
            <div style={{position:"relative",width:28,height:28,borderRadius:6,overflow:"hidden",border:"1px solid #e2e8f0",background:layers.bgColor,flexShrink:0}}>
              <input type="color" value={layers.bgColor} onChange={e=>set("bgColor",e.target.value)} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none"}}/>
            </div>
            <button onClick={()=>bgImgRef.current?.click()} style={{flex:1,padding:"4px 8px",borderRadius:6,border:"1px dashed #e2e8f0",background:layers.showBgImage?"#f0fdf4":"#fff",fontSize:10,cursor:"pointer",color:"#64748b"}}>
              {layers.showBgImage?"📷 Foto attiva":"📷 Usa foto"}
            </button>
            {layers.showBgImage&&<button onClick={()=>setMulti({showBgImage:false,bgImageData:null})} style={{padding:"4px 6px",borderRadius:6,border:"1px solid #fecaca",background:"#fff",fontSize:10,cursor:"pointer",color:"#ef4444"}}>×</button>}
            <input ref={bgImgRef} type="file" accept="image/*" onChange={handleBgImage} style={{display:"none"}}/>
          </div>
        </div>
        <div>
          <label style={smallLabel}>Colore testo</label>
          <div style={{display:"flex",gap:4}}>
            <div style={{position:"relative",width:28,height:28,borderRadius:6,overflow:"hidden",border:"1px solid #e2e8f0",background:layers.textColor}}>
              <input type="color" value={layers.textColor} onChange={e=>set("textColor",e.target.value)} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none"}}/>
            </div>
            <div style={{position:"relative",width:28,height:28,borderRadius:6,overflow:"hidden",border:"1px solid #e2e8f0",background:layers.accentColor||"#D4A574"}}>
              <input type="color" value={layers.accentColor||"#D4A574"} onChange={e=>set("accentColor",e.target.value)} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none"}}/>
            </div>
            <span style={{fontSize:8,color:"#94a3b8",alignSelf:"center"}}>accent</span>
          </div>
        </div>
      </div>

      <div style={{marginBottom:6}}>
        <label style={smallLabel}>Headline</label>
        <input value={layers.headline} onChange={e=>set("headline",e.target.value)} style={smallInput}/>
      </div>
      <div style={{marginBottom:6}}>
        <label style={smallLabel}>Brand name</label>
        <input value={layers.brandName} onChange={e=>set("brandName",e.target.value)} style={smallInput}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
        <div><label style={smallLabel}>CTA</label><input value={layers.cta} onChange={e=>set("cta",e.target.value)} style={smallInput}/></div>
        <div><label style={smallLabel}>Info (indirizzo ecc.)</label><input value={layers.infoLine} onChange={e=>set("infoLine",e.target.value)} style={smallInput}/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
        <div><label style={smallLabel}>Font</label><input value={layers.fontFamily} onChange={e=>set("fontFamily",e.target.value)} style={smallInput} placeholder="Arial Black"/></div>
        <div><label style={smallLabel}>Dim. headline</label><input type="number" value={layers.headlineSize} onChange={e=>set("headlineSize",+e.target.value)} style={smallInput} min={12} max={80}/></div>
        <div><label style={smallLabel}>Dim. brand</label><input type="number" value={layers.brandSize} onChange={e=>set("brandSize",+e.target.value)} style={smallInput} min={12} max={100}/></div>
      </div>

      {/* Quick palette buttons */}
      {client?.palette?.colors&&<div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
        {client.palette.colors.map((c,i)=><div key={i} onClick={()=>set("bgColor",c)} style={{width:20,height:20,borderRadius:4,background:c,cursor:"pointer",border:layers.bgColor===c?"2px solid #1e293b":"1px solid #e2e8f0"}} title={"Sfondo: "+c}/>)}
        <span style={{fontSize:9,color:"#94a3b8",alignSelf:"center",marginLeft:2,marginRight:6}}>← sfondo</span>
        {client.palette.colors.map((c,i)=><div key={"t"+i} onClick={()=>set("textColor",c)} style={{width:20,height:20,borderRadius:4,background:c,cursor:"pointer",border:layers.textColor===c?"2px solid #1e293b":"1px solid #e2e8f0"}} title={"Testo: "+c}/>)}
        <span style={{fontSize:9,color:"#94a3b8",alignSelf:"center",marginLeft:2}}>← testo</span>
      </div>}
    </div>
  );
}

// ─── Image Editor Component (with drag & live preview) ─────────
function ImageEditor({post, client, onUpdate, selectedSize, IMG_SIZES, renderMainImage}) {
  const [editorOpen, setEditorOpen] = useState(false);
  const [applying, setApplying] = useState(false);
  const [selectedLayer, setSelectedLayer] = useState("headline");
  const [dragging, setDragging] = useState(null);
  const [dragStart, setDragStart] = useState(null);
  const previewRef = useRef(null);
  const containerRef = useRef(null);
  const bgImgRef = useRef(null);
  const sizeObj = IMG_SIZES.find(s => s.label === selectedSize) || IMG_SIZES[0];

  const LAYER_NAMES = {headline:"Titolo",tagline:"Sottotitolo",brand:"Brand",logo:"Logo"};
  const LAYER_COLORS = {headline:"#6366f1",tagline:"#10b981",brand:"#f59e0b",logo:"#ec4899"};
  const [logoImg, setLogoImg] = useState(null);
  const logoRef = useRef(null);

  const makeDefaults = () => ({
    headline:{text:post.slogan||post.theme||post.designLayers?.headline||"",font:(client?.canvaBrandKit?getBrandKitFonts(client).heading:null)||client?.fontHeading||"Montserrat",size:Math.round(sizeObj.w*0.085),weight:"800",color:"#FFFFFF",xPct:50,yPct:38,align:"center"},
    tagline:{text:post.cta||post.designLayers?.cta||"",font:(client?.canvaBrandKit?getBrandKitFonts(client).body:null)||client?.fontBody||"Open Sans",size:Math.round(sizeObj.w*0.038),weight:"400",color:"#FFFFFF",xPct:50,yPct:58,align:"center"},
    brand:{text:client?.name||"",font:(client?.canvaBrandKit?getBrandKitFonts(client).body:null)||client?.fontBody||"Open Sans",size:Math.round(sizeObj.w*0.03),weight:"600",color:"rgba(255,255,255,0.6)",xPct:50,yPct:82,align:"center"},
    logo:{show:!!client?.logo,xPct:50,yPct:92,sizePct:12}
  });
  const [layers, setLayers] = useState(makeDefaults);

  // Auto-load client logo
  useEffect(()=>{
    if(client?.logo){
      const img=new Image();img.crossOrigin="anonymous";img.src=client.logo;
      img.onload=()=>{logoRef.current=img;setLogoImg(client.logo);drawPreview();};
    }
  },[client?.logo]);

  const set = (layer, field, val) => setLayers(p=>({...p,[layer]:{...p[layer],[field]:val}}));

  // Draw live preview on canvas
  const drawPreview = useCallback(()=>{
    const canvas = previewRef.current;
    if(!canvas||!post.generatedBg) return;
    const ctx = canvas.getContext("2d");
    const pw = canvas.width, ph = canvas.height;
    const scaleX = pw/sizeObj.w, scaleY = ph/sizeObj.h;

    // Draw bg
    if(!bgImgRef.current){
      bgImgRef.current = new Image();
      bgImgRef.current.src = post.generatedBg;
      bgImgRef.current.onload = ()=> drawPreview();
      return;
    }
    if(!bgImgRef.current.complete) return;
    ctx.clearRect(0,0,pw,ph);
    ctx.drawImage(bgImgRef.current,0,0,pw,ph);

    // Draw each text layer
    for(const key of ["headline","tagline","brand"]){
      const l = layers[key];
      if(!l.text) continue;
      const sz = l.size * scaleX;
      const x = (l.xPct/100)*pw;
      const y = (l.yPct/100)*ph;
      ctx.save();
      ctx.font = l.weight+" "+Math.round(sz)+"px '"+l.font+"', sans-serif";
      ctx.textAlign = l.align||"center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,0.6)";
      ctx.shadowBlur = Math.round(sz*0.2);
      ctx.fillStyle = l.color;
      // Word wrap with manual line break support
      const maxW = pw*0.85;
      const lines = [];
      const paragraphs = l.text.split("\n");
      for(const para of paragraphs){
        const words = para.split(" "); let cur = "";
        for(const w of words){const test=cur?cur+" "+w:w;if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else{cur=test;}}
        if(cur)lines.push(cur); else lines.push("");
      }
      const lh = sz*1.15;
      const startY = y-(lines.length*lh)/2+lh/2;
      for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],x,startY+i*lh);
      ctx.restore();

      // Selection highlight
      if(key===selectedLayer){
        ctx.save();
        const tw = Math.max(...lines.map(ln=>{ctx.font=l.weight+" "+Math.round(sz)+"px '"+l.font+"', sans-serif";return ctx.measureText(ln).width;}));
        const th = lines.length*lh;
        const bx = l.align==="left"?x-4:l.align==="right"?x-tw-4:x-tw/2-4;
        const by = startY-lh/2-2;
        ctx.strokeStyle = LAYER_COLORS[key];
        ctx.lineWidth = 2;
        ctx.setLineDash([4,3]);
        ctx.strokeRect(bx,by,tw+8,th+4);
        ctx.restore();
      }
    }

    // Draw logo if enabled
    const ll=layers.logo;
    if(ll.show&&logoRef.current&&logoRef.current.complete){
      const logoW=pw*(ll.sizePct/100);
      const logoH=logoW*(logoRef.current.height/logoRef.current.width);
      const lx=(ll.xPct/100)*pw-logoW/2;
      const ly=(ll.yPct/100)*ph-logoH/2;
      ctx.drawImage(logoRef.current,lx,ly,logoW,logoH);
      if(selectedLayer==="logo"){
        ctx.save();ctx.strokeStyle=LAYER_COLORS.logo;ctx.lineWidth=2;ctx.setLineDash([4,3]);
        ctx.strokeRect(lx-2,ly-2,logoW+4,logoH+4);ctx.restore();
      }
    }
  },[layers,selectedLayer,post.generatedBg,sizeObj]);

  useEffect(()=>{
    // Load fonts then draw
    const fonts = [...new Set(Object.values(layers).map(l=>l.font))];
    Promise.all(fonts.map(f=>loadGoogleFont(f))).then(()=>drawPreview());
  },[layers,selectedLayer,drawPreview]);

  // Mouse/touch drag handling
  const getCanvasPos = (e) => {
    const rect = previewRef.current.getBoundingClientRect();
    const clientX = e.touches?e.touches[0].clientX:e.clientX;
    const clientY = e.touches?e.touches[0].clientY:e.clientY;
    return {x:(clientX-rect.left)/rect.width*100,y:(clientY-rect.top)/rect.height*100};
  };
  const hitTest = (pos) => {
    // Check logo first
    const ll=layers.logo;
    if(ll.show&&logoRef.current){
      const halfW=ll.sizePct/2;
      const ar=logoRef.current.height/logoRef.current.width;
      const halfH=(ll.sizePct*ar)/2;
      if(Math.abs(pos.x-ll.xPct)<halfW+2 && Math.abs(pos.y-ll.yPct)<halfH+2) return "logo";
    }
    for(const key of ["headline","tagline","brand"]){
      const l=layers[key]; if(!l.text) continue;
      if(Math.abs(pos.x-l.xPct)<25 && Math.abs(pos.y-l.yPct)<8) return key;
    }
    return null;
  };
  const handleMouseDown = (e) => {
    e.preventDefault();
    const pos = getCanvasPos(e);
    const hit = hitTest(pos);
    if(hit){setDragging(hit);setSelectedLayer(hit);setDragStart({x:pos.x-layers[hit].xPct,y:pos.y-layers[hit].yPct});}
  };
  const handleMouseMove = (e) => {
    if(!dragging||!dragStart) return;
    e.preventDefault();
    const pos = getCanvasPos(e);
    const nx = Math.max(0,Math.min(100,pos.x-dragStart.x));
    const ny = Math.max(0,Math.min(100,pos.y-dragStart.y));
    setLayers(p=>({...p,[dragging]:{...p[dragging],xPct:Math.round(nx),yPct:Math.round(ny)}}));
  };
  const handleMouseUp = () => {setDragging(null);setDragStart(null);};

  const handleApply = async () => {
    setApplying(true);
    try {
      const arr = ["headline","tagline","brand"].map(k=>{const l=layers[k];return{text:l.text,font:l.font,size:l.size,weight:l.weight,color:l.color,x:(l.xPct/100)*sizeObj.w,y:(l.yPct/100)*sizeObj.h,align:l.align};});
      const newImg = await compositeGraphicCustom(post.generatedBg, arr, sizeObj.w, sizeObj.h);
      /* Draw logo on top if enabled */
      const ll=layers.logo;
      if(ll.show&&logoRef.current&&logoRef.current.complete){
        const c2=document.createElement("canvas");c2.width=sizeObj.w;c2.height=sizeObj.h;
        const ctx2=c2.getContext("2d");
        const base=new Image();base.src=newImg;
        await new Promise((res,rej)=>{base.onload=res;base.onerror=rej;});
        ctx2.drawImage(base,0,0,sizeObj.w,sizeObj.h);
        const logoW=sizeObj.w*(ll.sizePct/100);
        const logoH=logoW*(logoRef.current.height/logoRef.current.width);
        const lx=(ll.xPct/100)*sizeObj.w-logoW/2;
        const ly=(ll.yPct/100)*sizeObj.h-logoH/2;
        ctx2.drawImage(logoRef.current,lx,ly,logoW,logoH);
        onUpdate({generatedImage:c2.toDataURL("image/png"),imageConfirmed:false});
      } else {
        onUpdate({generatedImage:newImg,imageConfirmed:false});
      }
      setEditorOpen(false);
    } catch(e) { alert("Errore: "+e.message); }
    setApplying(false);
  };

  if(!post.generatedBg) return renderMainImage?renderMainImage(false):null;

  const L = layers[selectedLayer];
  const labelSm = {fontSize:10,fontWeight:600,color:"#475569",marginBottom:3,display:"block"};
  const inSm = {width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:12,boxSizing:"border-box",marginBottom:6};

  return (
    <div>
      {/* Show main image only when editor is CLOSED */}
      {renderMainImage&&renderMainImage(editorOpen)}

      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",marginTop:8}}>
      <button onClick={()=>setEditorOpen(!editorOpen)} style={{width:"100%",padding:"12px 14px",background:"#fff",border:"none",borderBottom:editorOpen?"1px solid #e2e8f0":"none",display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,fontWeight:600,color:"#6366f1"}}
        onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
        <Icons.Edit size={14}/> Modifica immagine
        <span style={{marginLeft:"auto",fontSize:10,color:"#94a3b8"}}>{editorOpen?"▼":"▶"}</span>
      </button>

      {editorOpen && <div style={{padding:12}}>
        {/* Live preview canvas with drag */}
        <div ref={containerRef} style={{position:"relative",marginBottom:10,borderRadius:10,overflow:"hidden",border:"2px solid #e2e8f0"}}>
          <canvas ref={previewRef} width={540} height={Math.round(540*(sizeObj.h/sizeObj.w))}
            style={{width:"100%",display:"block",cursor:dragging?"grabbing":"grab"}}
            onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
            onTouchStart={e=>{e.preventDefault();handleMouseDown(e);}} onTouchMove={e=>{e.preventDefault();handleMouseMove(e);}} onTouchEnd={handleMouseUp}
          />
          <div style={{position:"absolute",bottom:6,left:6,background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:9,padding:"3px 8px",borderRadius:6,pointerEvents:"none"}}>
            Trascina le scritte per spostarle
          </div>
        </div>

        {/* Layer tabs */}
        <div style={{display:"flex",gap:4,marginBottom:10}}>
          {["headline","tagline","brand","logo"].map(k=>(
            <button key={k} onClick={()=>setSelectedLayer(k)} style={{flex:1,padding:"7px 0",borderRadius:8,border:selectedLayer===k?"2px solid "+LAYER_COLORS[k]:"1px solid #e2e8f0",background:selectedLayer===k?LAYER_COLORS[k]+"15":"#fff",color:selectedLayer===k?LAYER_COLORS[k]:"#64748b",fontSize:11,fontWeight:600,cursor:"pointer"}}>
              {LAYER_NAMES[k]}
            </button>
          ))}
        </div>

        {/* Selected layer controls */}
        <div style={{background:"#f8fafc",borderRadius:10,padding:12,border:"1px solid #e2e8f0",marginBottom:10}}>
          {selectedLayer==="logo"?<>
          {/* ── Logo controls ── */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <label style={{...labelSm,marginBottom:0,flex:"none"}}>Mostra logo</label>
            <button onClick={()=>set("logo","show",!layers.logo.show)} style={{padding:"5px 14px",borderRadius:8,border:"1px solid "+(layers.logo.show?"#10b981":"#e2e8f0"),background:layers.logo.show?"#ecfdf5":"#fff",color:layers.logo.show?"#10b981":"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>{layers.logo.show?"ON":"OFF"}</button>
          </div>
          {layers.logo.show&&<>
            {logoImg?<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <img src={logoImg} style={{width:48,height:48,objectFit:"contain",borderRadius:6,border:"1px solid #e2e8f0",background:"#fff"}}/>
              <span style={{fontSize:11,color:"#475569"}}>Logo caricato</span>
            </div>:<div style={{padding:12,background:"#fef3c7",borderRadius:8,fontSize:11,color:"#92400e",marginBottom:10}}>Nessun logo — caricane uno o inseriscilo nella scheda cliente.</div>}
            <label style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#1e293b",fontSize:11,fontWeight:600,cursor:"pointer",marginBottom:10,width:"fit-content"}}>
              <Icons.Upload size={13}/> Carica logo
              <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const f=e.target.files?.[0];if(!f)return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  const img=new Image();img.crossOrigin="anonymous";img.src=ev.target.result;
                  img.onload=()=>{logoRef.current=img;setLogoImg(ev.target.result);drawPreview();};
                };reader.readAsDataURL(f);e.target.value="";
              }}/>
            </label>
            <div>
              <label style={labelSm}>Dimensione ({layers.logo.sizePct}%)</label>
              <input type="range" min={3} max={40} value={layers.logo.sizePct} onChange={e=>set("logo","sizePct",+e.target.value)} style={{width:"100%"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
              <div>
                <label style={labelSm}>Pos. X ({layers.logo.xPct}%)</label>
                <input type="range" min={0} max={100} value={layers.logo.xPct} onChange={e=>set("logo","xPct",+e.target.value)} style={{width:"100%"}}/>
              </div>
              <div>
                <label style={labelSm}>Pos. Y ({layers.logo.yPct}%)</label>
                <input type="range" min={0} max={100} value={layers.logo.yPct} onChange={e=>set("logo","yPct",+e.target.value)} style={{width:"100%"}}/>
              </div>
            </div>
          </>}
          </>:<>
          {/* ── Text layer controls ── */}
          <label style={labelSm}>Testo</label>
          <textarea value={L.text} onChange={e=>set(selectedLayer,"text",e.target.value)} style={{...inSm,minHeight:50,resize:"vertical",fontFamily:"inherit",lineHeight:1.4}} rows={2}/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div>
              <label style={labelSm}>Font</label>
              <select value={L.font} onChange={e=>{set(selectedLayer,"font",e.target.value);loadGoogleFont(e.target.value);}} style={inSm}>
                {FONT_LIST.filter(f=>f!=="Personalizzato").map(f=><option key={f} value={f}>{f}</option>)}
              </select>
            </div>
            <div>
              <label style={labelSm}>Dimensione</label>
              <input type="number" min={12} max={200} value={L.size} onChange={e=>set(selectedLayer,"size",+e.target.value)} style={inSm}/>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <div>
              <label style={labelSm}>Peso</label>
              <select value={L.weight} onChange={e=>set(selectedLayer,"weight",e.target.value)} style={inSm}>
                {["300","400","500","600","700","800","900"].map(w=><option key={w} value={w}>{w}</option>)}
              </select>
            </div>
            <div>
              <label style={labelSm}>Colore</label>
              <input type="color" value={L.color.startsWith("rgba")?"#ffffff":L.color} onChange={e=>set(selectedLayer,"color",e.target.value)} style={{...inSm,height:32,cursor:"pointer",padding:2}}/>
            </div>
            <div>
              <label style={labelSm}>Allineam.</label>
              <select value={L.align} onChange={e=>set(selectedLayer,"align",e.target.value)} style={inSm}>
                <option value="left">Sx</option><option value="center">Centro</option><option value="right">Dx</option>
              </select>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div>
              <label style={labelSm}>Pos. X ({L.xPct}%)</label>
              <input type="range" min={0} max={100} value={L.xPct} onChange={e=>set(selectedLayer,"xPct",+e.target.value)} style={{width:"100%"}}/>
            </div>
            <div>
              <label style={labelSm}>Pos. Y ({L.yPct}%)</label>
              <input type="range" min={0} max={100} value={L.yPct} onChange={e=>set(selectedLayer,"yPct",+e.target.value)} style={{width:"100%"}}/>
            </div>
          </div>
          </>}
        </div>

        {/* Action buttons */}
        <div style={{display:"flex",gap:6}}>
          <button onClick={handleApply} disabled={applying} style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",background:"linear-gradient(135deg,#6366f1,#a855f7)",color:"#fff",fontSize:12,fontWeight:700,cursor:applying?"wait":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:applying?.7:1}}>
            {applying?<><div className="spinner" style={{width:14,height:14}}/> Applico...</>:<><Icons.Check size={14}/> Applica modifiche</>}
          </button>
          <button onClick={()=>setLayers(makeDefaults())} style={{padding:"10px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,fontWeight:600,cursor:"pointer"}}>
            Reset
          </button>
        </div>
      </div>}
      </div>
    </div>
  );
}

// ─── Post Detail ───────────────────────────────────────────────
function PostDetail({post,client,geminiKey,onBack,onUpdate,onDelete,onCopy}){
  const[editing,setEditing]=useState(false);
  const[editBody,setEditBody]=useState(post.body);
  const[imgLoading,setImgLoading]=useState(false);
  const[imgError,setImgError]=useState("");
  const[imageConfirmed,setImageConfirmed]=useState(!!post.imageConfirmed);
  const[viewFile,setViewFile]=useState(null);
  const statusColors={bozza:"#f59e0b",approvato:"#10b981",pubblicato:"#8b5cf6"};

  useEffect(()=>{setEditBody(post.body);},[post.body]);

  const[selectedSize,setSelectedSize]=useState("1080x1080");
  const IMG_SIZES=[{label:"1080×1080",w:1080,h:1080,ratio:"1:1"},{label:"1080×1350",w:1080,h:1350,ratio:"4:5"},{label:"1080×1920",w:1080,h:1920,ratio:"9:16"}];
  const[bgProposals,setBgProposals]=useState([]);
  const[selectedBgIdx,setSelectedBgIdx]=useState(null);
  const[bgGenerating,setBgGenerating]=useState(false);
  const[bgProgress,setBgProgress]=useState(0);

  const handleGenerateBackgrounds=async(size)=>{
    const sz=size||selectedSize;
    const sizeObj=IMG_SIZES.find(s=>s.label===sz)||IMG_SIZES[0];
    if(!geminiKey){setImgError("Inserisci la API Key Gemini nelle impostazioni.");return;}
    setBgGenerating(true);setImgError("");setSelectedSize(sz);setBgProposals([]);setSelectedBgIdx(null);setBgProgress(0);
    try{
      const refImages=[];
      let canvaRefLoaded=0;

      // PRIORITY 0: Canva design references — auto-load from CANVA_DESIGNS_CACHE
      const clientKey=client?.name?.toLowerCase().trim()||"";
      const canvaDesigns=CANVA_DESIGNS_CACHE[clientKey]||[];
      if(canvaDesigns.length>0){
        setImgError("⏳ Caricamento stile da Canva...");
        // Prefer pageThumb array (multiple page thumbnails from same design) for richer style refs
        const firstWithPages=canvaDesigns.find(d=>d.pageThumb&&d.pageThumb.length>0);
        const thumbUrls=firstWithPages?.pageThumb?.slice(0,4)||canvaDesigns.slice(0,4).map(d=>d.thumb);
        const canvaPromises=thumbUrls.map(url=>
          imageUrlToBase64(url).catch(e=>{console.warn("[SocialDash] Failed to load Canva ref:",url?.substring(0,80),e.message);return null;})
        );
        const canvaB64=await Promise.all(canvaPromises);
        canvaB64.forEach(b=>{ if(b&&refImages.length<4){refImages.push(b);canvaRefLoaded++;} });
        console.log("[SocialDash] Loaded",canvaRefLoaded,"of",thumbUrls.length,"Canva design references for",client.name);
        if(canvaRefLoaded===0) console.warn("[SocialDash] WARNING: No Canva refs loaded! URLs may be expired. Thumb domain:",thumbUrls[0]?.substring(0,40));
      }

      // PRIORITY 1: User-selected images from Gallery
      const userSelected=window.__selectedGalleryBase64;
      if(userSelected&&userSelected.length>0){
        refImages.push(...userSelected.slice(0,3));
      }
      // PRIORITY 2: Auto pre-cached base64 from Gallery
      else if(refImages.length<3){
        const preCache=window.__galleryBase64Cache?.[client?.id];
        if(preCache&&preCache.length>0){
          preCache.slice(0,3-refImages.length).forEach(b=>refImages.push(b));
        } else if(client?.id){
          const siteImgs=scrapedImagesCache[client.id+"_site"]||[];
          const driveImgs=scrapedImagesCache[client.id+"_drive"]||[];
          for(const imgUrl of [...driveImgs,...siteImgs].slice(0,4)){
            if(refImages.length>=5)break;
            const b64=await imageUrlToBase64(imgUrl);
            if(b64) refImages.push(b64);
          }
        }
      }

      // PRIORITY 3: Stock photos fallback — if still no reference images
      if(refImages.length===0&&client){
        setImgError("⏳ Nessuna foto cliente — cerco foto stock...");
        const stockCache=scrapedImagesCache[client.id+"_stock"]||[];
        let stockUrls=stockCache;
        if(stockUrls.length===0){
          const queries=getStockPhotoQueries(client);
          for(const q of queries.slice(0,2)){
            try{const photos=await searchStockPhotos(q,6);stockUrls.push(...photos);}catch(e){}
          }
          if(stockUrls.length>0) scrapedImagesCache[client.id+"_stock"]=[...new Set(stockUrls)];
        }
        for(const imgUrl of stockUrls.slice(0,3)){
          if(refImages.length>=3) break;
          const b64=await imageUrlToBase64(imgUrl);
          if(b64) refImages.push(b64);
        }
        if(refImages.length>0) console.log("[SocialDash] Using",refImages.length,"stock photos as reference for",client.name);
      }

      const canvaStyleNote=canvaRefLoaded>0?`\n\n🎨 CRITICAL STYLE REFERENCE: The first ${canvaRefLoaded} reference images are existing designs from this brand's Canva project. You MUST closely replicate their visual structure, layout composition, graphic style, color palette, and design language. Create a NEW unique design that looks like it belongs to the SAME brand campaign — same geometric elements, same spacing, same graphic treatment — but with DIFFERENT imagery and content. Think of it as designing the next post in the same series.`:"";
      const refStyle=post.designLayers?.referenceDesc?` Additional style notes: "${post.designLayers.referenceDesc}".`:"";
      const basePrompt=`⚠️ MANDATORY IMAGE DIMENSIONS: Generate this image at EXACTLY ${sizeObj.w}x${sizeObj.h} pixels (${sizeObj.ratio} aspect ratio). This is non-negotiable.\n\n${post.imagePrompt}${canvaStyleNote}${refStyle}\n\nIMPORTANT: Generate ONLY the background/visual design WITHOUT any text overlay. Do NOT include any titles, headlines, captions, watermarks or text of any kind in the image. The text will be added separately.\n\nREMINDER: The output image MUST be ${sizeObj.ratio} (${sizeObj.w}×${sizeObj.h}px). ${sizeObj.ratio==="4:5"?"Portrait orientation.":sizeObj.ratio==="9:16"?"Vertical story format.":"Perfect square."}`;

      const variations=[
        "Style direction: warm, inviting tones with soft lighting",
        "Style direction: cool, professional tones with clean composition",
        "Style direction: dramatic contrast with bold visual elements",
        "Style direction: minimalist and spacious with subtle gradients",
        "Style direction: vibrant, saturated colors with dynamic energy",
        "Style direction: elegant, refined with premium sophistication"
      ];

      const results=[];
      // Generate in batches of 2 to avoid rate limits
      for(let batch=0;batch<3;batch++){
        const promises=variations.slice(batch*2,batch*2+2).map((v,i)=>
          generateImageWithGemini(geminiKey,basePrompt+"\n\n"+v,refImages.length>0?refImages:null)
            .then(url=>({ok:true,url,idx:batch*2+i}))
            .catch(e=>({ok:false,error:e.message,idx:batch*2+i}))
        );
        const batchResults=await Promise.all(promises);
        batchResults.forEach(r=>{
          results[r.idx]=r;
          if(r.ok) setBgProposals(prev=>{const next=[...prev];next[r.idx]=r.url;return next;});
        });
        setBgProgress(Math.min((batch+1)*2,6));
      }

      const successCount=results.filter(r=>r.ok).length;
      if(successCount===0) throw new Error("Nessuno sfondo generato. Riprova.");
      setImgError("");
    }catch(e){
      const msg=e.message;
      if(msg.includes("429")||msg.includes("RESOURCE_EXHAUSTED"))setImgError("Quota esaurita. Attendi qualche minuto e riprova.");
      else setImgError(msg);
    }
    finally{setBgGenerating(false);}
  };

  const handleSelectBackground=async(bgUrl,idx)=>{
    setSelectedBgIdx(idx);
    setImgLoading(true);setImgError("⏳ Applicazione testo sullo sfondo...");
    try{
      const sizeObj=IMG_SIZES.find(s=>s.label===selectedSize)||IMG_SIZES[0];
      const templateId=post.graphicStyle?.includes("template:")?post.graphicStyle.split("template:")[1]?.trim():(post.designLayers?.template||"bold-center");
      const textConfig={
        headline:post.slogan||post.theme||post.designLayers?.headline||"",
        tagline:post.cta||post.designLayers?.cta||"",
        brand:client?.name||post.designLayers?.brandName||"",
        fontHeading:(client?.canvaBrandKit?getBrandKitFonts(client).heading:null)||post.fontHeading||"Montserrat",
        fontBody:(client?.canvaBrandKit?getBrandKitFonts(client).body:null)||post.fontBody||"Open Sans",
        colors:client?.palette?.colors||["#212529","#F8F9FA","#6366f1"],
        template:templateId
      };
      const finalImg=await compositeGraphic(bgUrl,textConfig,sizeObj.w,sizeObj.h);
      setImageConfirmed(false);
      onUpdate({generatedImage:finalImg,generatedBg:bgUrl,imageSize:selectedSize,imageConfirmed:false});
      setImgError("");
    }catch(e){setImgError("Errore composizione: "+e.message);}
    finally{setImgLoading(false);}
  };

  const handleRegenerateWithText=async()=>{
    if(post.generatedBg){
      await handleSelectBackground(post.generatedBg,selectedBgIdx);
    } else {
      handleGenerateBackgrounds(selectedSize);
    }
  };

  const handleDownloadImage=()=>{
    if(!post.generatedImage)return;
    const a=document.createElement("a");a.href=post.generatedImage;a.download=`${client?.name||"post"}-${post.date}-${post.platform}.png`;a.click();
  };

  return(
    <div>
      <IconBtn icon={Icons.ChevLeft} label="Torna ai post" onClick={onBack} style={{marginBottom:16}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:20}}>
        <div style={{background:"#fff",borderRadius:16,padding:28,border:"1px solid #e2e8f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Badge color="#6366f1">{post.type}</Badge>
              <Badge color={statusColors[post.status]}>{post.status.charAt(0).toUpperCase()+post.status.slice(1)}</Badge>
            </div>
            <div style={{display:"flex",gap:6}}>
              <IconBtn icon={Icons.Copy} label="Copia" onClick={()=>onCopy(post.body)} style={{color:"#6366f1",border:"1px solid #c7d2fe"}}/>
              <IconBtn icon={Icons.Trash} label="Elimina" onClick={onDelete} style={{color:"#ef4444",border:"1px solid #fecaca"}}/>
            </div>
          </div>
          <div style={{fontSize:13,color:"#64748b",marginBottom:12,display:"flex",alignItems:"center",gap:6}}><Icons.Clock size={14}/> {post.date}</div>

          {/* Selected/scraped image above copy */}
          {(imageConfirmed&&post.generatedImage)||(post.scrapedImage&&!post.generatedImage)?<div style={{marginBottom:16,borderRadius:12,overflow:"hidden",border:post.generatedImage?"2px solid #10b981":"2px solid #6366f1",position:"relative"}}>
            <img src={post.generatedImage||post.scrapedImage} style={{width:"100%",display:"block",maxHeight:300,objectFit:"cover"}} alt="Post" onError={e=>{e.target.parentElement.style.display="none";}}/>
            <div style={{position:"absolute",top:8,right:8,background:post.generatedImage?"#10b981":"#6366f1",color:"#fff",fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:6,display:"flex",alignItems:"center",gap:4}}>
              {post.generatedImage?<><Icons.Check size={10}/> Immagine generata</>:<><Icons.Image size={10}/> Dal sito web</>}
            </div>
          </div>:null}

          {editing?<div>
            <textarea value={editBody} onChange={e=>setEditBody(e.target.value)} style={{width:"100%",minHeight:200,padding:12,borderRadius:10,border:"1px solid #e2e8f0",fontSize:14,lineHeight:1.6,resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <IconBtn icon={Icons.Check} label="Salva" onClick={()=>{onUpdate({body:editBody});setEditing(false);}} style={{background:"#6366f1",color:"#fff",border:"none"}}/>
              <IconBtn icon={Icons.X} label="Annulla" onClick={()=>{setEditBody(post.body);setEditing(false);}}/>
            </div>
          </div>
          :<div onClick={()=>setEditing(true)} style={{whiteSpace:"pre-wrap",fontSize:14,lineHeight:1.7,color:"#334155",background:"#f8fafc",borderRadius:12,padding:20,cursor:"pointer",border:"1px dashed #e2e8f0"}}>
            {post.body}<div style={{fontSize:11,color:"#94a3b8",marginTop:8}}>Clicca per modificare</div>
          </div>}
          {/* ── Quick-insert contact buttons ── */}
          {(client?.address||client?.addresses?.length||client?.phone||client?.phones?.length||client?.website||client?.email)&&<div style={{marginTop:16}}>
            <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:8}}>Aggiungi info al copy:</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {(client.addresses?.length?client.addresses:[client.address]).filter(Boolean).map((addr,ai)=>
                <button key={"a"+ai} onClick={()=>{const newBody=post.body+"\n\n📍 "+addr;onUpdate({body:newBody});setEditBody(newBody);}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:"#475569",fontWeight:500,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background="#f0f4ff";e.currentTarget.style.borderColor="#6366f1";}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#e2e8f0";}}>
                  <span>📍</span>{addr}
                </button>
              )}
              {(client.phones?.length?client.phones:[client.phone]).filter(Boolean).map((ph,pi)=>
                <button key={"p"+pi} onClick={()=>{const newBody=post.body+"\n📞 "+ph;onUpdate({body:newBody});setEditBody(newBody);}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:"#475569",fontWeight:500,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background="#f0fdf4";e.currentTarget.style.borderColor="#10b981";}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#e2e8f0";}}>
                  <span>📞</span>{ph}
                </button>
              )}
              {client.website&&<button onClick={()=>{const newBody=post.body+"\n🌐 "+client.website;onUpdate({body:newBody});setEditBody(newBody);}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:"#475569",fontWeight:500,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background="#fef3c7";e.currentTarget.style.borderColor="#f59e0b";}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#e2e8f0";}}>
                <span>🌐</span>{client.website}
              </button>}
              {client.email&&<button onClick={()=>{const newBody=post.body+"\n✉️ "+client.email;onUpdate({body:newBody});setEditBody(newBody);}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5,color:"#475569",fontWeight:500,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background="#fdf2f8";e.currentTarget.style.borderColor="#ec4899";}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#e2e8f0";}}>
                <span>✉️</span>{client.email}
              </button>}
            </div>
          </div>}

          <div style={{marginTop:20,display:"flex",gap:8}}>
            {["bozza","approvato","pubblicato"].map(s=><IconBtn key={s} label={s.charAt(0).toUpperCase()+s.slice(1)} active={post.status===s} onClick={()=>onUpdate({status:s})}/>)}
          </div>
        </div>

        {/* ── Sidebar ── */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Immagine generata / genera */}
          <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #e2e8f0"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <Icons.Image size={16} color="#6366f1"/>
                <h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Grafica post</h4>
              </div>
              {post.generatedImage&&<IconBtn icon={Icons.Download} label="Scarica" onClick={handleDownloadImage} size={14} style={{padding:"4px 8px",fontSize:11}}/>}
            </div>

            {post.generatedImage?
              <div>
                {/* Image Editor — replaces the main image when open */}
                <ImageEditor post={post} client={client} onUpdate={onUpdate} selectedSize={selectedSize} IMG_SIZES={IMG_SIZES} renderMainImage={(editorOpen)=>(
                  !editorOpen&&<img src={post.generatedImage} style={{width:"100%",borderRadius:10,marginBottom:8,border:imageConfirmed?"3px solid #10b981":"none"}} alt="Generated"/>
                )}/>
                {/* Action buttons: Rigenera / Usa questa / Cambia sfondo */}
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <button onClick={()=>handleRegenerateWithText()} disabled={imgLoading}
                    style={{flex:1,padding:"10px 0",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#6366f1",fontSize:12,fontWeight:600,cursor:imgLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:imgLoading?0.5:1}}>
                    <Icons.Sparkles size={14}/> Rigenera
                  </button>
                  {!imageConfirmed?
                    <button onClick={()=>{setImageConfirmed(true);onUpdate({imageConfirmed:true});}}
                      style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      <Icons.Check size={14}/> Usa questa immagine
                    </button>
                  : <button onClick={()=>{setImageConfirmed(false);onUpdate({imageConfirmed:false});}}
                      style={{flex:1,padding:"10px 0",borderRadius:8,border:"1px solid #fecaca",background:"#fff",color:"#ef4444",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      <Icons.X size={14}/> Deseleziona
                    </button>
                  }
                </div>
                <button onClick={()=>{onUpdate({generatedImage:null,generatedBg:null});setBgProposals([]);setSelectedBgIdx(null);}} disabled={imgLoading} style={{width:"100%",padding:"8px 0",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:12,fontWeight:600,cursor:imgLoading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:8,opacity:imgLoading?0.5:1}}>
                  ← Cambia sfondo
                </button>
                {imageConfirmed&&<div style={{background:"#f0fdf4",borderRadius:8,padding:8,display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <Icons.Check size={14} color="#10b981"/>
                  <span style={{fontSize:11,color:"#166534",fontWeight:600}}>Immagine selezionata — visibile sopra al copy</span>
                </div>}
              </div>
            :<div>
              {/* Background proposals grid */}
              {bgProposals.length>0&&<div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:8}}>Scegli uno sfondo ({bgProposals.filter(Boolean).length}/6)</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {[0,1,2,3,4,5].map(i=>{
                    const bg=bgProposals[i];
                    return <div key={i} onClick={()=>bg&&handleSelectBackground(bg,i)} style={{
                      aspectRatio:selectedSize==="1080x1080"?"1":"1080/1350",
                      borderRadius:10,overflow:"hidden",border:selectedBgIdx===i?"3px solid #6366f1":"2px solid #e2e8f0",
                      cursor:bg?"pointer":"default",background:bg?`url(${bg}) center/cover`:"#f1f5f9",
                      display:"flex",alignItems:"center",justifyContent:"center",
                      transition:"all .2s",opacity:imgLoading&&selectedBgIdx===i?0.6:1
                    }}
                    onMouseOver={e=>{if(bg)e.currentTarget.style.transform="scale(1.03)";}}
                    onMouseOut={e=>{e.currentTarget.style.transform="scale(1)";}}
                    >
                      {!bg&&(bgGenerating?<div className="spinner" style={{width:20,height:20,borderTopColor:"#6366f1",borderColor:"#6366f120"}}/>:<span style={{fontSize:10,color:"#94a3b8"}}>—</span>)}
                      {imgLoading&&selectedBgIdx===i&&<div style={{background:"rgba(0,0,0,0.5)",width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner" style={{width:20,height:20,borderTopColor:"#fff",borderColor:"rgba(255,255,255,0.2)"}}/></div>}
                    </div>;
                  })}
                </div>
                <button onClick={()=>handleGenerateBackgrounds(selectedSize)} disabled={bgGenerating} style={{width:"100%",marginTop:8,padding:"8px 0",borderRadius:8,border:"1px solid #e2e8f0",background:"#fff",color:"#6366f1",fontSize:12,fontWeight:600,cursor:bgGenerating?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:bgGenerating?0.5:1}}>
                  <Icons.Sparkles size={14}/> Rigenera 6 sfondi
                </button>
              </div>}

              {/* Size buttons and placeholder */}
              {bgProposals.length===0?<div style={{background:"linear-gradient(135deg,"+(client?.palette?.colors?.[0]||"#6366f1")+"20,"+(client?.palette?.colors?.[1]||"#a855f7")+"20)",borderRadius:10,padding:20,minHeight:120,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,marginBottom:8}}>
                {bgGenerating?<><div className="spinner" style={{borderTopColor:client?.palette?.colors?.[0]||"#6366f1",borderColor:(client?.palette?.colors?.[0]||"#6366f1")+"30"}}/><span style={{fontSize:12,color:"#64748b"}}>Generazione {bgProgress}/6...</span></>
                :<><Icons.Sparkles size={28} color={client?.palette?.colors?.[0]||"#6366f1"}/><span style={{fontSize:12,color:"#64748b",textAlign:"center"}}>Genera 6 sfondi proposti</span></>}
              </div>:""}

              {/* Size buttons */}
              <div style={{display:"flex",gap:6,marginBottom:8}}>
                {IMG_SIZES.map(sz=><button key={sz.label} onClick={()=>!bgGenerating&&handleGenerateBackgrounds(sz.label)} disabled={bgGenerating} style={{flex:1,padding:"8px 4px",borderRadius:8,border:selectedSize===sz.label?"2px solid #6366f1":"1px solid #e2e8f0",background:selectedSize===sz.label?"#eef2ff":"#fff",color:selectedSize===sz.label?"#6366f1":"#64748b",fontSize:11,fontWeight:600,cursor:bgGenerating?"not-allowed":"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,opacity:bgGenerating?.5:1}}>
                  <div style={{width:sz.ratio==="1:1"?20:sz.ratio==="4:5"?18:14,height:sz.ratio==="1:1"?20:sz.ratio==="4:5"?22:26,border:"2px solid "+(selectedSize===sz.label?"#6366f1":"#94a3b8"),borderRadius:3}}/>
                  <span>{sz.label}</span>
                </button>)}
              </div>
            </div>}

            {imgError&&<p style={{fontSize:11,color:"#ef4444",marginTop:6}}>{imgError}</p>}
            <p style={{fontSize:10,color:"#94a3b8",marginTop:6,lineHeight:1.4}}>{post.imageSuggestion}</p>
          </div>

          {/* Icone — Iconify integration */}
          <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #e2e8f0"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Icons.Sparkles size={16} color="#6366f1"/><h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Icone per il post</h4><span style={{fontSize:10,color:"#94a3b8",marginLeft:"auto"}}>powered by Iconify</span></div>
            <IconPicker color={client?.palette?.colors?.[0]||"#6366f1"} onSelect={async(iconName)=>{
              const color=client?.palette?.colors?.[0]||"#6366f1";
              const svg=await getIconSvg(iconName,color,128);
              if(svg){
                const img=await iconSvgToImage(svg,128);
                if(img){
                  const canvas=document.createElement("canvas");canvas.width=128;canvas.height=128;
                  const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,128,128);
                  const dataUrl=canvas.toDataURL("image/png");
                  // Save icon to post for use in composite
                  const icons=[...(post.icons||[]),{name:iconName,dataUrl,color}];
                  onUpdate({icons});
                }
              }
            }}/>
            {post.icons?.length>0&&<div style={{marginTop:10}}>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:6}}>Icone selezionate:</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {post.icons.map((ic,i)=><div key={i} style={{position:"relative",width:48,height:48,borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:"#f8fafc"}}>
                  <img src={ic.dataUrl} style={{width:32,height:32}}/>
                  <button onClick={()=>{const icons=[...post.icons];icons.splice(i,1);onUpdate({icons});}} style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#ef4444",color:"#fff",border:"none",fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                </div>)}
              </div>
            </div>}
          </div>

          {/* Materiali cliente */}
          {client?.files?.length>0&&<div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #e2e8f0"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Icons.File size={16} color="#f59e0b"/><h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Materiali cliente</h4></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {client.files.map(f=><div key={f.id} onClick={()=>setViewFile(f)} style={{cursor:"pointer",borderRadius:8,border:"1px solid #e2e8f0",overflow:"hidden"}}>
                {f.type?.startsWith("image/")?<img src={f.dataUrl} style={{width:"100%",height:60,objectFit:"cover"}}/>
                :<div style={{height:60,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#fef2f2"}}><Icons.File size={20} color="#ef4444"/><span style={{fontSize:8,marginTop:2}}>PDF</span></div>}
                <div style={{padding:"3px 4px",fontSize:9,color:"#64748b",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.name}</div>
              </div>)}
            </div>
          </div>}

          {/* Hashtags */}
          <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #e2e8f0"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Icons.Hash size={16} color="#6366f1"/><h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Hashtag</h4></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{post.hashtags.map(h=><Badge key={h} color="#6366f1" style={{fontSize:11}}>{h}</Badge>)}</div>
            <button onClick={()=>onCopy(post.hashtags.join(" "))} style={{marginTop:10,background:"none",border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",color:"#6366f1",fontWeight:600}}>Copia tutti gli hashtag</button>
          </div>

          {/* CTA */}
          <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #e2e8f0"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><Icons.Target size={16} color="#10b981"/><h4 style={{margin:0,fontSize:14,fontWeight:700,color:"#1e293b"}}>Call to Action</h4></div>
            <p style={{fontSize:14,fontWeight:600,color:"#10b981",margin:0}}>{post.cta}</p>
          </div>
        </div>
      </div>

      {/* ── File Preview Modal ── */}
      {viewFile&&<div onClick={()=>setViewFile(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:40}}>
        <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:20,maxWidth:700,maxHeight:"90vh",overflow:"auto",position:"relative"}}>
          <button onClick={()=>setViewFile(null)} style={{position:"absolute",top:12,right:12,background:"#f1f5f9",border:"none",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
          <h4 style={{margin:"0 0 12px",fontSize:14,fontWeight:700}}>{viewFile.name}</h4>
          {viewFile.type?.startsWith("image/")?<img src={viewFile.dataUrl} style={{width:"100%",borderRadius:8}}/>
          :<div style={{textAlign:"center",padding:40}}><Icons.File size={48} color="#ef4444"/><p style={{color:"#64748b",marginTop:8}}>Anteprima PDF non disponibile nel browser.<br/>Il file è stato caricato correttamente.</p></div>}
        </div>
      </div>}
    </div>
  );
}

// ─── Client Edit View ──────────────────────────────────────────
function ClientEditView({client,onUpdate,onDelete,onBack,labelStyle,inputStyle,canvaBrandKitsDyn,refreshCanvaBrandKits,canvaLoading}){
  const logoRef=useRef(null);
  const[saved,setSaved]=useState(false);

  const handleField=(key,val)=>{onUpdate({[key]:val});};

  const handleLogo=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      resizeImageBase64(ev.target.result,256).then(resized=>{
        onUpdate({logo:resized,logoName:file.name});
      });
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };
  const removeLogo=()=>onUpdate({logo:null,logoName:null});

  const handlePaletteColors=(colorsStr)=>{
    const hexes=colorsStr.match(/#[0-9A-Fa-f]{3,8}/g);
    if(hexes&&hexes.length>0){
      const cols=hexes.slice(0,4);
      while(cols.length<4)cols.push(cols[cols.length-1]||"#6366f1");
      onUpdate({palette:{name:"Custom",colors:cols}});
    }
  };

  const flash=()=>{setSaved(true);setTimeout(()=>setSaved(false),1500);};

  const sectionStyle={background:"#fff",borderRadius:16,padding:24,border:"1px solid #e2e8f0",marginBottom:16};
  const sectionTitle=(icon,title,color)=><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>{icon}<h3 style={{margin:0,fontSize:16,fontWeight:700,color:"#1e293b"}}>{title}</h3></div>;

  return(
    <div>
      {saved&&<div style={{position:"fixed",top:20,right:20,background:"#10b981",color:"#fff",padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:999,boxShadow:"0 4px 12px rgba(0,0,0,.15)"}}>Salvato!</div>}

      {/* Back button */}
      {onBack&&<button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#6366f1",fontSize:13,fontWeight:600,cursor:"pointer",padding:"0 0 12px",marginBottom:4}} onMouseEnter={e=>e.currentTarget.style.opacity=".7"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
        ← Torna a Genera Post
      </button>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          {/* Logo display */}
          {hasLogo(client.logo)?<img src={client.logo} style={{width:56,height:56,borderRadius:14,objectFit:"contain",border:"2px solid #e2e8f0",background:"#fff"}}/>
          :<div style={{width:56,height:56,borderRadius:14,background:"linear-gradient(135deg,"+(client.palette?.colors?.[0]||"#6366f1")+","+(client.palette?.colors?.[1]||"#a855f7")+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:"#fff"}}>{client.name?.charAt(0)||"?"}</div>}
          <div>
            <h2 style={{margin:0,fontSize:24,fontWeight:700,color:"#1e293b"}}>{client.name}</h2>
            <p style={{margin:"2px 0 0",fontSize:13,color:"#94a3b8"}}>{client.sector} · {client.tone}</p>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{flash();}} style={{padding:"8px 20px",borderRadius:10,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#6366f1,#a855f7)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8,transition:"all .2s"}}>
            {saved?<><Icons.Check size={16}/> Salvato!</>:<><Icons.Check size={16}/> Salva</>}
          </button>
          <IconBtn icon={Icons.Trash} label="Elimina cliente" onClick={onDelete} style={{color:"#ef4444",border:"1px solid #fecaca"}}/>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {/* ── Info base ── */}
        <div style={sectionStyle}>
          {sectionTitle(<Icons.Users size={18} color="#6366f1"/>,"Informazioni base")}
          <label style={labelStyle}>Nome brand</label>
          <input style={inputStyle} value={client.name||""} onChange={e=>{handleField("name",e.target.value);flash();}}/>
          <label style={labelStyle}>Settore</label>
          <input style={inputStyle} value={client.sector||""} onChange={e=>{handleField("sector",e.target.value);flash();}}/>
          <label style={labelStyle}>Tono di voce</label>
          <select style={inputStyle} value={client.tone||"Professionale"} onChange={e=>{handleField("tone",e.target.value);flash();}}>
            {TONES.map(t=><option key={t}>{t}</option>)}
          </select>
          <label style={labelStyle}>Target / Pubblico</label>
          <input style={inputStyle} value={client.target||""} onChange={e=>{handleField("target",e.target.value);flash();}}/>
          <label style={labelStyle}>Descrizione / Bio brand</label>
          <textarea style={{...inputStyle,height:80,resize:"vertical"}} value={client.description||""} onChange={e=>{handleField("description",e.target.value);flash();}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <label style={labelStyle}>Totale Post previsti</label>
              <input type="number" min={0} style={inputStyle} value={client.totalPosts||""} onChange={e=>{handleField("totalPosts",+e.target.value||0);flash();}} placeholder="Es. 48"/>
            </div>
            <div>
              <label style={labelStyle}>Totale ADV previste</label>
              <input type="number" min={0} style={inputStyle} value={client.totalAds||""} onChange={e=>{handleField("totalAds",+e.target.value||0);flash();}} placeholder="Es. 12"/>
            </div>
          </div>
        </div>

        {/* ── Logo & Visual Identity ── */}
        <div style={sectionStyle}>
          {sectionTitle(<Icons.Image size={18} color="#a855f7"/>,"Logo & Visual Identity")}
          {/* Logo upload */}
          <label style={labelStyle}>Logo del brand</label>
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20}}>
            {hasLogo(client.logo)?<div style={{position:"relative"}}>
              <img src={client.logo} style={{width:80,height:80,borderRadius:12,objectFit:"contain",border:"2px solid #e2e8f0",background:"#f8fafc"}}/>
              <button onClick={removeLogo} style={{position:"absolute",top:-6,right:-6,width:22,height:22,borderRadius:"50%",background:"#ef4444",border:"2px solid #fff",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            :<div onClick={()=>logoRef.current?.click()} style={{width:80,height:80,borderRadius:12,border:"2px dashed #e2e8f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#fafbfc",gap:4}} onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"} onMouseLeave={e=>e.currentTarget.style.borderColor="#e2e8f0"}>
              <Icons.Upload size={20} color="#94a3b8"/>
              <span style={{fontSize:10,color:"#94a3b8"}}>Carica logo</span>
            </div>}
            <input ref={logoRef} type="file" accept="image/*" onChange={handleLogo} style={{display:"none"}}/>
            <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>
              {hasLogo(client.logo)?<><strong>{client.logoName||"logo.png"}</strong><br/><span style={{color:"#94a3b8"}}>Clicca × per rimuovere</span></>
              :<>Carica il logo in formato<br/>PNG, JPG o SVG</>}
            </div>
          </div>

          {/* Palette */}
          <label style={labelStyle}>Palette colori</label>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            {(client.palette?.colors||[]).map((c,i)=><div key={i} style={{position:"relative",width:40,height:40,borderRadius:8,border:"2px solid #e2e8f0",overflow:"hidden",background:c}}>
              <input type="color" value={c} onChange={e=>{const cols=[...(client.palette?.colors||[])];cols[i]=e.target.value;handleField("palette",{name:"Custom",colors:cols});flash();}} style={{position:"absolute",inset:-4,width:"calc(100% + 8px)",height:"calc(100% + 8px)",cursor:"pointer",border:"none",padding:0}}/>
            </div>)}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input placeholder="Incolla HEX: #E63946, #F4845F, ..." id="editPasteColors" style={{...inputStyle,flex:1,marginBottom:0,fontSize:12}}/>
            <button onClick={()=>{const v=document.getElementById("editPasteColors").value;handlePaletteColors(v);flash();}} style={{padding:"8px 14px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>Applica</button>
          </div>
          {/* Preset quick-pick */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {COLOR_PALETTES.map(pal=><div key={pal.name} onClick={()=>{handleField("palette",pal);flash();}} style={{cursor:"pointer",padding:4,borderRadius:6,border:client.palette?.name===pal.name?"2px solid #6366f1":"1px solid #e2e8f0",display:"flex",gap:2}}>
              {pal.colors.map(c=><div key={c} style={{width:12,height:12,borderRadius:3,background:c}}/>)}
            </div>)}
          </div>
        </div>

        {/* ── Font & Stile ── */}
        <div style={sectionStyle}>
          {sectionTitle(<Icons.Edit size={18} color="#f59e0b"/>,"Font & Stile")}
          <label style={labelStyle}>Font titoli</label>
          <input style={inputStyle} value={client.fontHeading||""} onChange={e=>{handleField("fontHeading",e.target.value);flash();}} placeholder="Es. Montserrat, Playfair Display..."/>
          <label style={labelStyle}>Font corpo testo</label>
          <input style={inputStyle} value={client.fontBody||""} onChange={e=>{handleField("fontBody",e.target.value);flash();}} placeholder="Es. Open Sans, Poppins..."/>
          <label style={labelStyle}>Brand Kit Canva</label>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
            <select style={{...inputStyle,flex:1,marginBottom:0}} value={client.canvaBrandKit||""} onChange={e=>{handleField("canvaBrandKit",e.target.value);flash();}}>
              <option value="">— Nessun brand kit —</option>
              {(canvaBrandKitsDyn||CANVA_BRAND_KITS).map(bk=><option key={bk.id} value={bk.id}>{bk.name}</option>)}
            </select>
            {refreshCanvaBrandKits&&<button onClick={refreshCanvaBrandKits} disabled={canvaLoading} style={{padding:"8px 12px",borderRadius:10,border:"1px solid #c7d2fe",background:canvaLoading?"#f1f5f9":"#eef2ff",color:"#6366f1",fontSize:11,fontWeight:600,cursor:canvaLoading?"wait":"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}} title="Aggiorna lista brand kit da Canva">
              <Icons.RefreshCw size={13} style={canvaLoading?{animation:"spin 1s linear infinite"}:{}}/>{canvaLoading?"...":"Aggiorna"}
            </button>}
          </div>
          <label style={labelStyle}>Link progetto Canva</label>
          <input style={inputStyle} value={client.canvaLink||""} onChange={e=>{handleField("canvaLink",e.target.value);flash();}} placeholder="https://www.canva.com/design/..."/>
          <label style={labelStyle}>Stile Canva (note sullo stile visivo estratto dal progetto)</label>
          <textarea style={{...inputStyle,height:100,resize:"vertical",fontSize:12,lineHeight:1.5}} value={client.canvaStyle||""} onChange={e=>{handleField("canvaStyle",e.target.value);flash();}} placeholder={"Descrivi lo stile dei post esistenti: colori dominanti, tipo di font, tono del copy, stile grafico, CTA ricorrenti...\n\nEs: Sfondo rosso scuro, testo crema/beige con font bold display, tono amichevole/dialettale, CTA: 'prenota il tuo tavolo', 'ti aspettiamo'"}/>
          {client.canvaStyle&&<div style={{background:"#fef3c7",borderRadius:8,padding:10,marginTop:-8,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><Icons.Sparkles size={14} color="#f59e0b"/><span style={{fontSize:11,fontWeight:600,color:"#92400e"}}>Stile attivo</span></div>
            <p style={{fontSize:11,color:"#78350f",margin:0,lineHeight:1.4}}>Quando generi i post, il copy e le immagini AI saranno influenzati da queste note di stile.</p>
          </div>}
        </div>

        {/* ── Social & Contatti ── */}
        <div style={sectionStyle}>
          {sectionTitle(<Icons.Instagram size={18} color="#e1306c"/>,"Social & Contatti")}
          <label style={labelStyle}>Profilo Instagram</label>
          <input style={inputStyle} value={client.instagram||""} onChange={e=>{handleField("instagram",e.target.value);flash();}} placeholder="@nomebrand"/>
          <label style={labelStyle}>Pagina Facebook</label>
          <input style={inputStyle} value={client.facebook||""} onChange={e=>{handleField("facebook",e.target.value);flash();}} placeholder="facebook.com/nomebrand"/>
          <label style={labelStyle}>Indirizzo</label>
          {(()=>{
            const addrs=Array.isArray(client.addresses)&&client.addresses.length>0?client.addresses:(client.address?[client.address]:[""]);
            const update=(arr)=>{handleField("addresses",arr);handleField("address",arr[0]||"");flash();};
            return <>
              {addrs.map((a,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
                <input style={{...inputStyle,flex:1,marginBottom:0}} value={a} onChange={e=>{const n=[...addrs];n[i]=e.target.value;update(n);}} placeholder="Es. Via Torino 16, Lombardore (TO)"/>
                {addrs.length>1&&<button onClick={()=>{const n=addrs.filter((_,j)=>j!==i);update(n);}} style={{padding:"0 8px",borderRadius:8,border:"1px solid #fca5a5",background:"#fef2f2",color:"#ef4444",fontSize:16,cursor:"pointer",flexShrink:0}} title="Rimuovi">×</button>}
              </div>)}
              <button onClick={()=>update([...addrs,""])} style={{padding:"5px 12px",borderRadius:8,border:"1px dashed #c7d2fe",background:"#eef2ff",color:"#6366f1",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,marginBottom:12}}><Icons.Plus size={12}/> Aggiungi indirizzo</button>
            </>;
          })()}
          <label style={labelStyle}>Telefono</label>
          {(()=>{
            const phones=Array.isArray(client.phones)&&client.phones.length>0?client.phones:(client.phone?[client.phone]:[""]);
            const update=(arr)=>{handleField("phones",arr);handleField("phone",arr[0]||"");flash();};
            return <>
              {phones.map((p,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
                <input style={{...inputStyle,flex:1,marginBottom:0}} value={p} onChange={e=>{const n=[...phones];n[i]=e.target.value;update(n);}} placeholder="Es. +39 011 1234567"/>
                {phones.length>1&&<button onClick={()=>{const n=phones.filter((_,j)=>j!==i);update(n);}} style={{padding:"0 8px",borderRadius:8,border:"1px solid #fca5a5",background:"#fef2f2",color:"#ef4444",fontSize:16,cursor:"pointer",flexShrink:0}} title="Rimuovi">×</button>}
              </div>)}
              <button onClick={()=>update([...phones,""])} style={{padding:"5px 12px",borderRadius:8,border:"1px dashed #c7d2fe",background:"#eef2ff",color:"#6366f1",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,marginBottom:12}}><Icons.Plus size={12}/> Aggiungi telefono</button>
            </>;
          })()}
          <label style={labelStyle}>Sito web</label>
          <input style={inputStyle} value={client.website||""} onChange={e=>{handleField("website",e.target.value);flash();}} placeholder="Es. www.lasmorfia.it"/>
          <label style={labelStyle}>Email</label>
          <input style={inputStyle} value={client.email||""} onChange={e=>{handleField("email",e.target.value);flash();}} placeholder="Es. info@lasmorfia.it"/>
          {/* Google Drive */}
          <label style={labelStyle}>Cartella Google Drive</label>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <input style={{...inputStyle,flex:1,marginBottom:0,fontSize:12}} value={client.driveFolder||""} onChange={e=>{handleField("driveFolder",e.target.value);flash();}} placeholder="Incolla il link della cartella Drive del cliente..."/>
            {client.driveFolder&&<a href={client.driveFolder} target="_blank" style={{padding:"8px 12px",borderRadius:8,background:"#4285f4",color:"#fff",fontSize:11,fontWeight:600,textDecoration:"none",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
              <Icons.Eye size={14}/> Apri
            </a>}
          </div>
          {/* Servizi acquistati */}
          <label style={labelStyle}>Servizi acquistati</label>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {["Meta","LinkedIn","Google Ads"].map(svc=>{
              const services=client.services||[];
              const active=services.includes(svc);
              return <button key={svc} onClick={()=>{
                const next=active?services.filter(s=>s!==svc):[...services,svc];
                handleField("services",next);flash();
              }} style={{padding:"8px 18px",borderRadius:10,border:active?"2px solid #6366f1":"1px solid #e2e8f0",background:active?"#eef2ff":"#fff",color:active?"#4f46e5":"#64748b",fontSize:13,fontWeight:active?700:500,cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",gap:6}}>
                {svc==="Meta"&&<svg width="16" height="16" viewBox="0 0 24 24" fill={active?"#1877F2":"#94a3b8"}><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/></svg>}
                {svc==="LinkedIn"&&<svg width="16" height="16" viewBox="0 0 24 24" fill={active?"#0A66C2":"#94a3b8"}><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>}
                {svc==="Google Ads"&&<svg width="16" height="16" viewBox="0 0 24 24" fill={active?"#FBBC04":"#94a3b8"}><path d="M3.2 14.6l4.8-8.3c.6-1 1.9-1.4 2.9-.8l4.8 2.8c1 .6 1.4 1.9.8 2.9l-4.8 8.3c-.6 1-1.9 1.4-2.9.8L4 17.5c-1-.6-1.4-1.9-.8-2.9z"/><circle cx="18" cy="6" r="3.5" fill={active?"#4285F4":"#94a3b8"}/><path d="M2 18.5a3.5 3.5 0 107 0 3.5 3.5 0 10-7 0z" fill={active?"#34A853":"#94a3b8"}/></svg>}
                {svc}
              </button>;
            })}
          </div>
          {(client.services||[]).length>0&&<div style={{background:"#eef2ff",borderRadius:8,padding:10,marginTop:-12,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
            <Icons.Check size={14} color="#6366f1"/>
            <span style={{fontSize:11,color:"#4338ca"}}>Servizi attivi: {(client.services||[]).join(", ")}</span>
          </div>}
          {/* Materiali upload */}
          <FileUploader files={client.files||[]} onChange={(newFiles)=>{handleField("files",newFiles);flash();}} labelStyle={labelStyle}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SocialDashboard/>);
</script>
</body>
